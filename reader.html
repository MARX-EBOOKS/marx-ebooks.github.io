<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文库阅读器</title>
<link rel="stylesheet" type="text/css" href="reader.css"/>
</head>
<body>

<div id="progress-bar"></div>

<nav id="navbar">
  <div class="nav-left">
    <button class="nav-btn active" id="sidebar-toggle" title="目录">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a id="nav-logo" href="reader.html">
      <img src="favicon.ico"/>
      <span class="logo-text">MLCLASSIC</span>
    </a>
  </div>

  <div id="nav-actions">
    <!-- 桌面端工具栏 -->
    <div class="desktop-tools">
      <!-- 字号控制组：减号 + 滑块 + 加号 -->
      <div class="font-control-group">
        <button class="nav-btn font-btn" id="font-dec-btn" title="缩小字体">A−</button>
        <input type="range" id="font-slider" min="0.8" max="1.4" step="0.05" value="1" title="字号调整">
        <button class="nav-btn font-btn" id="font-inc-btn" title="放大字体">A+</button>
      </div>
      
      <button class="nav-btn active" id="remember-btn" title="记忆阅读位置">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="nav-btn" id="theme-btn" title="切换主题">
        <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- 搜索框 -->
    <div id="search-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="搜索…" autocomplete="off">
    </div>

    <!-- 移动端三点菜单按钮 -->
    <button class="nav-btn mobile-menu-btn" id="mobile-menu-toggle" title="更多">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="6" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="18" r="1"/></svg>
    </button>
  </div>
</nav>

<!-- 移动端聚合菜单 -->
<div id="mobile-menu" class="mobile-dropdown">
  <div class="mobile-menu-header">字号调整</div>
  <div class="mobile-font-slider-wrapper">
    <button class="font-adjust-btn" id="mobile-font-dec">−</button>
    <input type="range" id="mobile-font-slider" min="0.8" max="1.4" step="0.05" value="1">
    <button class="font-adjust-btn" id="mobile-font-inc">+</button>
  </div>
  <div class="mobile-divider"></div>
  <div class="mobile-menu-item" id="mobile-remember">
    <span>记忆阅读位置</span>
    <span class="toggle-indicator" id="mobile-remember-indicator">●</span>
  </div>
  <div class="mobile-menu-item" id="mobile-theme">
    <span>深色模式</span>
    <span class="toggle-indicator" id="mobile-theme-indicator">○</span>
  </div>
</div>

<div id="sidebar-backdrop"></div>
<div id="search-overlay"></div>

<div id="shell">
  <aside id="lsidebar"><div id="nav-tree"></div></aside>
  <main id="main">
    <div id="welcome">
      <h1>马克思恩格斯文库</h1>
      <p>MEW · MECW · LPSS<br>从左侧目录选择文献，或在搜索框中输入关键词。</p>
      <div class="library-grid" id="library-cards"></div>
    </div>
    <div id="loading" style="display:none">
      <div class="spinner"></div>
      <div class="loading-text">正在加载文档…</div>
    </div>
    <div id="doc-view" style="display:none">
      <header id="doc-header">
        <!-- 路径栏：文集 › 卷 › 文件名 › Title（过长省略末尾） -->
        <div id="doc-pathbar">
          <span id="doc-collection"></span>
          <span class="sep">›</span>
          <span id="doc-volume"></span>
          <span class="sep" id="doc-sep-2">›</span>
          <span id="doc-filename"></span>
          <span class="sep" id="doc-sep-3">›</span>
          <span id="doc-title-display" title=""></span>
        </div>
      </header>
      <div id="content"></div>
      <nav id="doc-footer">
        <div class="doc-nav-btn" id="prev-btn" style="display:none"><span class="dir">← 上一篇</span><span class="doc-name" id="prev-name"></span></div>
        <div class="doc-nav-btn next" id="next-btn" style="display:none"><span class="dir">下一篇 →</span><span class="doc-name" id="next-name"></span></div>
      </nav>
    </div>
  </main>
  <aside id="rsidebar">
    <div id="toc-label">本页目录</div>
    <nav id="toc-list"></nav>
  </aside>
</div>

<div id="fn-tooltip"></div>
<script src="libmap.js"></script>
<script src="reader.js"></script>
</body>
</html>
