<h1>俄共（布）中央政治局关于坦波夫省的收购工作的决定草案<sup><a href="#006-z69" id="006-zref69"><b>69</b></a></sup></h1>
<p>　　3月19日</p>
<p class="date">征求政治局各委员意见</p>
<p>　　为撤销中央关于在坦波夫省完全停止收购的决定，兹决定：</p>
<p>　　在坦波夫省只允许收购大量饲料，并且只供在当地剿匪的军队之需。</p>
<p class="rt">列宁</p>
