<h1>
致军事革命委员会</h1>
<p class="date">（11月9日和12月5日〔11月22日和12月18日〕之间）</p>
<p>　　军事革命委员会是否已发出文件，要求酒精和酒不受损失，立即销往斯堪的纳维亚？<sup><a href="#z7" id="zref7"><b>7</b></a></sup></p>
<p>　　立即写一个这样的文件。</p>
<p>　　列宁</p>
<p>　　载于1960年《苏共历史问题》杂志第3期
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref7" id="z7"><b>7</b></a> 指征用酒库时封存的酒和酒精。军事革命委员会1917年11月9日（22日）会议通过如下决定：“将征用的酒（3万桶）运往国外。”——7。</div></aside></body>
