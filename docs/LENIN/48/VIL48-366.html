<h1>
给南方面军革命军事委员会的电报</h1>
<p>
　　1919年6月14日密码</p>
<p>　　科兹洛夫</p>
<p>　　南方面军革命军事委员会</p>
<p>　　是否在采取一切措施支援察里津？那里要15000名步兵和4000名骑兵。必须保住察里津。请报告已经和正在采取什么措施。</p>
<p>　　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
