<h1>
致人民委员会报刊局</h1>
<p class="date">（1918年4月27日）</p>
<p>　　致报刊局</p>
<p>　　阿克雪里罗得同志：</p>
<p>　　务请帮助来人龚贝格同志收集有关我国革命的一切材料（出版物）。此事有重大的社会意义，因为向美国和全世界报道都要依靠这些材料。</p>
<p>　　敬礼！</p>
<p>　　列宁</p>
<p>　　载于1959年《列宁文集》俄文版第36卷
</p>
