<h1>致莉·亚·福季耶娃</h1>
<p class="date">（1918年3月25日和1919年9月之间）</p>
<p>　　没有把您“打蒙”，而是对您太客气了。</p>
<p>　　（1）通知所有秘书，在人民委员会开会时只许递字条，禁止谈话；让他们在通知上签字。</p>
<p>　　（2）将同样的通知张贴在秘书室里。</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
