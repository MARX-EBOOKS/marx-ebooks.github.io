<h1>
☆致海军革命委员会</h1>
<p class="date-l">　　1918年1月15日</p>
<p>　　请采取紧急措施，立即调2000名水兵归捷尔－阿鲁琼扬茨同志指挥，以便对资产阶级的拉达采取军事行动。<sup><a href="#z49" id="zref49"><b>49</b></a></sup></p>
<p>　　列宁</p>
<p>　　载于1924年在列宁格勒出版的《列宁与红海军》一书
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref49" id="z49"><b>49</b></a> 姆·卡·捷尔－阿鲁琼扬茨当时是最高总司令大本营革命野战司令部参谋长，负责组建部队同乌克兰中央拉达进行斗争。——55。</div></aside></body>
