<h1>
☆致司法人民委员部</h1>
　　（4月15日）
<p>　　请司法人民委员部部务委员（最好是全体）到我这里来（日期和时间另行商定），座谈在下列几方面做了哪些工作：</p>
<p>　　（1）出版《法令汇编》，</p>
<p>　　（2）编纂法典，</p>
<p>　　（3）更迅速更无情地审判资产阶级和贪污犯等，</p>
<p>　　（4）向居民，向工人和贫苦农民宣传法律，</p>
<p>　　（ａ）通过印刷品，</p>
<p>　　（ｂ）通过讲演（或举办训练班等等），</p>
<p>　　（5）吸收贫民参加审判工作（做陪审员）和侦查工作，</p>
<p>　　（6）使用施雷德尔等人的力量。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1933年《列宁文集》俄文版第21卷
</p>
