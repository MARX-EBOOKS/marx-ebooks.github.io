<h1>给约·约·瓦采季斯的电报</h1>
<p class="date">（1918年11月15日）</p>
<p>　　急</p>
<p>　　立即拍发</p>
<p>　　谢尔普霍夫</p>
<p>　　总司令瓦采季斯</p>
<p>　　抄送：托洛茨基</p>
<p>　　请批准被占领地区中央局<sup><a href="#196-bz1" id="196-bzref1">FN1</a></sup>关于组建波兰突击营和立陶宛突击营的方案，特别是关于南方战线西方旅的方案。我提请托洛茨基注意我们的决定。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#196-bzref1" id="196-bz1">FN1</a> 指俄共（布）中央所属被占领地区共产党组织中央局。——编者注<br>
</p>
