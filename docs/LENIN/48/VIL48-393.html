<h1>
给约·约·瓦采季斯和卡·克·达尼舍夫斯基的电报<sup><a href="#z608" id="zref608"><b>608</b></a></sup></h1>
<p class="date">（10月15日）</p>
<p>　　阿尔扎马斯</p>
<p>　　共和国革命军事委员会</p>
<p>　　瓦采季斯、达尼舍夫斯基</p>
<p>　　兹命令采取最紧急的措施援助察里津。报告执行情况。</p>
<p>　　列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　载于1936年《党的工作者》杂志（斯大林格勒）第16—17期合刊
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 签署该电的还有雅·米·斯维尔德洛夫。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref608" id="z608"><b>608</b></a> 这份电报是列宁在收到第10集团军司令克·叶·伏罗希洛夫和察里津苏维埃主席谢·康·米宁的求援电报后拍发的。来电说，敌人在察里津战线的中部和北部地段大举进攻，企图在南部切断伏尔加河，占领察里津。——745。</div></aside></body>
