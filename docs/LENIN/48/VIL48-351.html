<h1>
致列·米·卡拉汉</h1>
<p class="date">（6月2日）</p>
<p>　　卡拉汉同志：现送还契切林的简短的电讯稿。<sup><a href="#z557" id="zref557"><b>557</b></a></sup></p>
<p>　　同意。</p>
<p>　　请把该稿分发我们的各报社和罗斯塔社，作为修版样本。</p>
<p>　　列宁
</p>
