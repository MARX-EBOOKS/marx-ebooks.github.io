<h1>
致军用汽油总库主任</h1>
<p class="date">（1918年8月15日）</p>
<p>　　请拨给财政人民委员部部务委员泽米特同志汽车用油。务请立即办理。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）
</p>
