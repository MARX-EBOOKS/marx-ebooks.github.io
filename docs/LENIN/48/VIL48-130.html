<h1>致斯·格·邵武勉</h1>
<p class="date-l">　　1918年6月29日</p>
<p>　　亲爱的邵武勉同志：</p>
<p>　　向您致以崇高的敬意和良好的祝愿！</p>
<p>　　斯大林在察里津。来信最好通过斯大林转。</p>
<p>　　敬礼！</p>
<p>　　您的　列宁</p>
<p>　　发往巴库</p>
<p>　　1938年发表
</p>
