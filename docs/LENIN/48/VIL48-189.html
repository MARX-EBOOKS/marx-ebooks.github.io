<h1>致米·费·弗拉基米尔斯基</h1>
<p class="date">（1918年10月27日）</p>
<p>　　致弗拉基米尔斯基同志</p>
<p>　　（或莫斯科苏维埃主席团其他成员）</p>
<p>　　来人是维堡区的同志们。<sup><a href="#189-z300" id="189-zref300"><b>300</b></a></sup>务请立即接待。此外，他们注意到进苏维埃手续过繁，检查人员非常挑剔，还要填写完全不必要的特别出入证。能不能把这一套简化一下？</p>
<p>　　敬礼！</p>
<p>　　列宁</p>
<p>　　载于1924年波涛出版社出版的《关于伊里奇（论文、回忆录、文件和材料汇编）》
</p>
