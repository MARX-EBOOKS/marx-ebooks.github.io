<h1>
给西伯利亚苏维埃中央执行委员会的电报</h1>
<p class="date">（5月8日）</p>
<p>　　伊尔库茨克</p>
<p>　　西伯利亚苏维埃中央执行委员会</p>
<p>　　抄送：普罗科皮耶夫</p>
<p>　　普罗科皮耶夫等人不断给拉林发来急电要钱。</p>
<p>　　我声明，我4月23日发的列有准确数字的电报<sup><a href="#bz1" id="bzref1">FN1</a></sup>，至今未得到答复。我声明，对于干什么花了好几亿，为什么定额之外还需要钱以及需要多少的问题不作回答，这种工作态度是不能容许的。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第21卷
</p>
