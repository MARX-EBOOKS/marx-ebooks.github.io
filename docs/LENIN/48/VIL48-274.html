<h1>
给秘书的指示</h1>
<p class="date">（3月8日）</p>
<p>　　收到肃反委员会主席的答复时，请提醒我。</p>
<p>　　（事后把全部材料交给杂文作家。）<sup><a href="#z450" id="zref450"><b>450</b></a></sup></p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref450" id="z450"><b>450</b></a> 这个指示写在察里津红军战士米宁请求释放瓦·佩尔希科娃的来电上。关于这个问题，参看本卷第606号文献和注448。——525。</div></aside></body>
