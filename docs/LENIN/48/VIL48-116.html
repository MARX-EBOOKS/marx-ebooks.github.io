<h1>
致亚·格·普拉夫金</h1>
　　（6月12日）
<p>　　我们派您（持内务人民委员部的委托书，由我签字）到以下各省：</p>
<p>　　图拉省</p>
<p>　　奥廖尔省</p>
<p>　　沃罗涅日省等</p>
<p>　　去整顿秩序。</p>
<p>　　明天晚上应该启程。</p>
<p>　　行前您应同有关人员谈一谈（明天上午）：</p>
<p>　　同斯维尔德洛夫（谈图拉苏维埃及帕纽什金），</p>
<p>　　同我（谈上述问题以及粮食任务和军事任务）</p>
<p>　　同托洛茨基</p>
<p>　　同瞿鲁巴</p>
<p>　　同涅夫斯基。
</p>
</body>
