<h1>
☆致赤卫队司令部</h1>
　　（1月3日〔16日〕）
<p>　　人民委员会命令赤卫队司令部拨给塔夫利达宫特别内卫队叁拾（30）支左轮手枪。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
