<h1>给И.В.利托林的电报</h1>
<p class="date">（1919年5月13日）</p>
<p>　　诺夫哥罗德</p>
<p>　　省粮食委员利托林</p>
<p>　　抄送：省执行委员会和省肃反委员会</p>
<p>　　为什么没有遵照瞿鲁巴4月26日的命令，立即陈述征用手工业生产合作总社房舍和家什的理由？我要求三个受电单位都立即陈述理由并电复。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第24卷
</p>
