<h1>
给格·雅·索柯里尼柯夫的电报
</h1>
　　（6月6日）
<p>　　科兹洛夫</p>
<p>　　南方面军革命军事委员会</p>
<p>　　索柯里尼柯夫，或发往他的所在地</p>
<p>　　要全力以赴加速平息叛乱，否则由于南方被突破，很可能酿成大祸。已给你们派去一些军校学员和一个炮兵连。要更经常地报告情况。</p>
<p>　　列宁</p>
<p>　　    载于1938年2月23日《真理报》第53号
</p>
