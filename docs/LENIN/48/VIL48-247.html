<h1>
给列·达·托洛茨基的电报</h1>
<p class="date-l">　　1919年1月27日</p>
<p>　　阿尔扎马斯</p>
<p>　　托洛茨基，或发往他的所在地</p>
<p>　　抄送：古谢夫</p>
<p>　　我们收到了古谢夫的来信<sup><a href="#z400" id="zref400"><b>400</b></a></sup>，完全同意他的意见，务请同他详谈，并把你们的决定通知我们。</p>
<p>　　列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 签署该电的还有雅·米·斯维尔德洛夫。——俄文版编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref400" id="z400"><b>400</b></a> 谢·伊·古谢夫当时任东方面军革命军事委员会委员。他在来信中建议给交通人民委员部和粮食人民委员部下命令，要它们利用东方面军军事交通局的人力物力将伏尔加—布古利马铁路沿线的粮食运往莫斯科和彼得格勒。——481。<br>
</p>
