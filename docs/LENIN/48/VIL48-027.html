<h1>
致雅·米·斯维尔德洛夫</h1>
<p class="date-l">　　1917年12月31日</p>
<p>　　斯维尔德洛夫同志：请就中央执行委员会派代表团出国问题同加涅茨基谈一下。<sup><a href="#z36" id="zref36"><b>36</b></a></sup></p>
<p>　　列宁</p>
<p>　　（您可否还查问一下：中央执行委员会国际部在巴索克——美列涅夫斯基问题上做了些什么？）
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref36" id="z36"><b>36</b></a> 全俄中央执行委员会国际部派代表团出国，是为了同各兄弟的社会主义政党建立联系。雅·米·斯维尔德洛夫在全俄苏维埃第三次代表大会上作全俄中央执行委员会总结报告时曾谈及此事。——38。</div></aside></body>
