<h1>
给瓦·卢·帕纽什金的电报</h1>
　　（8月5日）
<p>　　叶列茨</p>
<p>　　军事特派员帕纽什金分队长</p>
<p>　　您的分队迟迟不启程，使我感到诧异。请电告为何拖延和何时出发。应尽快出发。<sup><a href="#162-z216" id="162-zref216"><b>216</b></a></sup></p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
