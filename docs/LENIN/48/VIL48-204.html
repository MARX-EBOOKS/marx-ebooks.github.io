<h1>
给亚·加·施略普尼柯夫的电报<sup><a href="#z322" id="zref322"><b>322</b></a></sup></h1>
<p class="date-l">　　1918年11月29日</p>
<p>　　阿斯特拉罕</p>
<p>　　人民委员施略普尼柯夫</p>
<p>　　您的所有要求我将转告有关方面。不要着急。我的信即刻派信使送上。</p>
<p>　　列宁
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref322" id="z322"><b>322</b></a> 这份电报是列于对亚·加·施略普尼柯夫当天来电的答复。来电再次请求对支援武器装备一事给予答复。文中提到的信见上一号文献。——412。<br>
</p>
