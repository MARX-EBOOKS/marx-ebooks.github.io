<h1>
给格·叶·季诺维也夫的电报</h1>
<p class="date-l">　　1919年2月13日</p>
<p>　　彼得格勒</p>
<p>　　斯莫尔尼</p>
<p>　　季诺维也夫</p>
<p>　　要求芬兰人释放莫里斯·莱特伊仁一事办得怎样了？<sup><a href="#z417" id="zref417"><b>417</b></a></sup>无论如何要设法使他获释。芬兰人的行为令人气愤。请来电。</p>
<p>　　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第24卷
</p>
