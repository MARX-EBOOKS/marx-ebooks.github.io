<h1>致陆军人民委员部</h1>
<p class="date">（不早于7月13日）</p>
<p>　　高加索政治委员伊万诺夫在这里（他从阿斯特拉罕—巴库—察里津来），看来他是一员优秀的干将，有能力真正扑灭富农的暴动。</p>
<p>　　他渴望到捷克斯洛伐克战线去。</p>
<p>　　他请求给他500人。</p>
<p>　　能否迅速满足他的请求？</p>
<p>　　能满足到什么程度？</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
