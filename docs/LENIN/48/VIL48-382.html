<h1>
☆致陆军人民委员尼·伊·波德沃伊斯基</h1>
<p>　　1918年1月22日  通令</p>
<p>　　人民委员会命令您每次发出现款时，都要采取一切措施使此款切实送到指定地点。要通过电报向各枢纽站查问情况，追踪送款列车。</p>
<p>　　必须在会计部门附设监督机构，监督国库执行拨款通知书的情况，监督国家银行根据凭单发出纸币的情况，等等，以便使纸币以最快速度发至各地。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 同样内容的信件由列宁签署后分别发给了工商业人民委员亚·加·施略普尼柯夫和内务人民委员格·伊·彼得罗夫斯基。——俄文版编者注</div></aside></body>
