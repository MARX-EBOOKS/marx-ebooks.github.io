<h1></h1>
<p class="date">（23）</p>
<p>　　致莫·索·乌里茨基</p>
<p>　　（11月27日〔12月10日〕）</p>
<p>　　乌里茨基同志：</p>
<p>　　简单写几句告诉我，立宪会议有什么新情况。</p>
<p>　　您知道我们已经释放被捕者了吗？</p>
<p>　　是否已采取措施不放他们进入楼内<sup><a href="#015-z18" id="015-zref18"><b>18</b></a></sup>？</p>
<p>　　您是否就逮捕他们一事写一份总结（原因、意义及益处）。</p>
<p>　　列宁</p>
<p>　　载于1931年《列宁文集》俄文版第18卷</p>
<p>　　译自《列宁全集》俄文第5版第50卷第13页
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#015-zref18" id="015-z18"><b>18</b></a> 指塔夫利达宫。——19。<br>
</p>
