<h1>致卡·胡斯曼</h1>
<p class="date">（1910年8月10日）</p>
<p>
　　亲爱的胡斯曼同志：</p>
<p>　　由于我们报告的耽搁而给您带来那么多麻烦，我感到十分抱歉。我正在尽一切可能加快印刷速度，但这并不取决于我。我最后的一个希望是，报告将在代表大会开始之前印好，我能把它直接送往哥本哈根。</p>
<p>　　谢谢您提供的情况和寄来的第3号公报。哥本哈根再见！</p>
<p>　　尊敬您的尼·列宁</p>
<p>　　从波尔尼克（法国）发往布鲁塞尔</p>
<p>　　原文是法文</p>
<p>　　载于1962年《苏维埃俄罗斯世界手册》杂志第4期</p>
<p>　　译自《列宁全集》俄文第5版第47卷第262页
</p>
