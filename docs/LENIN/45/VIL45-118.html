<h1>
给达维德松的信的草稿</h1>
<div class="date">（1905年1月30日）</div>
　　1905年1月30日于普拉滕街33号
<p>　　苏黎世达维德松先生</p>
<p>　　（用化学药剂写）</p>
<p>　　在他要关系时，他们是否会给他呢？</p>
<p>　　他本人将在幕后时而与这一派，时而与另一派（孟什维克或布尔什维克）协作。</p>
<p>　　他还将在苏黎世呆5—6天。</p>
<p>　　写于日内瓦</p>
<p>　　载于1934年《列宁文集》俄文版第26卷</p>
<p>　　译自《列宁全集》俄文第5版第47卷第308页
</p>
