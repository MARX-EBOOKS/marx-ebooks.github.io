<h1>86.致尼·彼·哥尔布诺夫</h1>
<p class="date">（1月6日）</p>
<p>
　　哥尔布诺夫同志：</p>
<p>　　应当</p>
<p>　　（1）交给人译成德文（高质量的），</p>
<p>　　（2）检查一下（找谢马什柯和米·尼·波克罗夫斯基或者通过他们），能不能补充上：</p>
<p>　　巴甫洛夫并没有要求走（他并不想走，是吗？），</p>
<p>　　我们给了他一些什么优待。</p>
<p>　　鉴于他们可能公开发表我的信，最好能把这两点加进去。</p>
<p>　　您的　列宁</p>
<p>　　附言：所有这些文件都要还给我。</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
