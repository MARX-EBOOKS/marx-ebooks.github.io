<h1>
197.给彼得格勒防卫委员会的电报</h1>
<p class="date">（3月17日）</p>
<p>　　彼得格勒</p>
<p>　　防卫委员会</p>
<p>　　我们坚决要求，只要稍有可能，立即把伏罗希洛夫、巴拉诺夫、扎东斯基送莫斯科。请告知启程时间。</p>
<p>　　列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　载于1932年《列宁文集》俄文版第20卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 签署该电的还有米·瓦·伏龙芝，是由列宁代签的。——俄文版编者注</div></aside></body>
