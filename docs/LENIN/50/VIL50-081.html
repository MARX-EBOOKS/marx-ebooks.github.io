<h1>
167.给克·格·拉柯夫斯基的电报</h1>
<p class="date">1921年2月25日</p>
<p><sup><a href="#081-bz1" id="081-bzref1">FN1</a></sup></p>
<p>　　1921年2月25日直达电报</p>
<p>　　哈尔科夫</p>
<p>　　拉柯夫斯基</p>
<p>　　请向全乌克兰苏维埃第五次代表大会转达我最热烈的祝贺，并祝大会取得圆满成功。</p>
<p>　　苏维埃乌克兰的贫苦农民和工人的牢固联盟万岁！</p>
<p>　　列宁</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#081-bzref1" id="081-bz1">FN1</a> 参看《列宁全集》第2版第40卷第59页。——编者注<br>
</p>
