<h1>
403.致尼·亚·谢马什柯</h1>
<p class="date">（5月24日）</p>
<p>
　　谢马什柯同志：</p>
<p>　　有人告诉我，阿瓦涅索夫身体非常不好，据说是少一叶肺（？），还有其他的病，但他仍硬撑着。</p>
<p>　　请您指定几个十分可靠的教授，让他们提出一份书面意见（既要有诊断，也要有治疗措施）。</p>
<p>　　致共产主义的敬礼！</p>
<p>　　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第23卷
</p>
