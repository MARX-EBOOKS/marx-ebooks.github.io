<h1>
191.致约·维·斯大林和烈·波·加米涅夫</h1>
<p class="date">（3月10日）</p>
<p>　　致斯大林和加米涅夫</p>
<p>　　刚才我同季诺维也夫谈过。他说：要么派一些普通兵员补充到部队里去，要么派几个象伏罗希洛夫（如果能让他去的话）这样的能起到很大作用的人去。<sup><a href="#z175" id="zref175"><b>175</b></a></sup></p>
<p>　　他说派其他的人去没有必要，因为一个普通的代表去了也没有什么用。</p>
<p>　　特此告知。</p>
<p>　　列宁</p>
<p>　　载于1932年《列宁文集》俄文版第20卷
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref175" id="z175"><b>175</b></a> 这里说的是派遣俄共（布）第十次代表大会的代表去镇压喀琅施塔得的反革命叛乱一事。——160。<br>
</p>
