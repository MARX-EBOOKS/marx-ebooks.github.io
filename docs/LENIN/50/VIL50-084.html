<h1>
173.致尼·彼·哥尔布诺夫</h1>
<p class="date">（2月底—3月初）</p>
<p>　　一小时以前，我和瞿鲁巴谈过话，他对我说</p>
<p>　　（1）他正在采取紧急措施</p>
<p>　　（2）他收到了从乌法、维亚特卡和其他城市发来的许多电报，<sup><a href="#z156" id="zref156"><b>156</b></a></sup>粮食正在装车并已开始往彼得格勒发运</p>
<p>　　（3）他已经把这些电报转发给彼得格勒。<sup><a href="#z157" id="zref157"><b>157</b></a></sup></p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref156" id="z156"><b>156</b></a> 看来，是指收到的对由列宁和尼·巴·布留哈诺夫签署发给许多城市的电报（见本卷《附录》第16号文献）的复电。——146。</div>
<div><a href="#zref157" id="z157"><b>157</b></a> 尼·彼·哥尔布诺夫向列宁提出下述书面问题：“季诺维也夫问，是否能支援粮食？”列宁的这张便条是对他的答复。——146。</div></aside></body>
