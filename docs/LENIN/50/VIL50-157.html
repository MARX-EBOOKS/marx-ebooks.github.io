<h1>325.给列·米·卡拉汉的批示和给维·列·柯普的电报</h1>
<p class="date">（4月23日）</p>
<p>
　　请用密码发出，并告诉我是什么时间发出的。</p>
<p>　　列宁</p>
<p>　　4月23日</p>
<p>　　致柯普</p>
<p>　　务请从速为什克洛夫斯基及其家属办理签证。领到签证后，请即通知我。</p>
<p>　　列宁
</p>
