<h1>
299.给格·康·奥尔忠尼启则的电报<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（4月17日）</p>
<p>　　密码</p>
<p>　　致奥尔忠尼启则</p>
<p>　　刚刚从斯大林那里得知，您和穆苏里同法国公司签订了5000万法郎的合同，并得知装载价值800万法郎货物的“柳西斯号”轮船已抵达。请告知是否属实并扼要汇报详情：你们那里谁主管对外贸易人民委员部？格鲁吉亚、亚美尼亚、阿塞拜疆在这方面是否已联合？同谢列布罗夫斯基是否已商妥？</p>
<p>　　列宁</p>
<p>　　发往埃里温</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 列宁在文献上方批示：“斯大林同志：如无反对意见，请发出（或委托斯克良斯基发出）。”——俄文版编者注<br>
</p>
