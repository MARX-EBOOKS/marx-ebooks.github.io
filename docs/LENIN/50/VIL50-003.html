<h1>
4.致扬·埃·鲁祖塔克、阿·伊·李可夫、米·巴·托姆斯基</h1>
<p class="date">（11月8日）</p>
<p>　　致鲁祖塔克</p>
<p>　　＋李可夫</p>
<p>　　托姆斯基</p>
<p>　　如果你们对工会运动的提纲不满意的话<sup><a href="#z4" id="zref4"><b>4</b></a></sup>，</p>
<p>　　立即</p>
<p>　　写出修改意见或另拟提纲。</p>
<p>　　急。</p>
<p>　　列宁
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref4" id="z4"><b>4</b></a> 看来，是指列宁1920年11月8日在俄共（布）中央全会上提出的提纲。列宁的决议草案《工会的任务及其实现的方法》就是以这份提纲为基础拟订的（见《列宁全集》第2版第40卷第11—12页）。——4。</div></aside></body>
