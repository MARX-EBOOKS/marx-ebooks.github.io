<h1>
79.给秘书的指示<sup><a href="#z75" id="zref75"><b>75</b></a></sup></h1>
<p class="date">（1920年底—1921年初）</p>
<p>　　（1）看一遍。</p>
<p>　　（2）如果需要的话，告诉尼·克·<sup><a href="#bz1" id="bzref1">FN1</a></sup>。</p>
<p>　　（3）尽力而为，并告诉我，要完全满足，还缺什么？</p>
<p>　　载于1933年《列宁文集》俄文版第23卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 指尼·尼·克列斯廷斯基。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref75" id="z75"><b>75</b></a> 这个指示是在收到老民意党人C.И博罗济奇（阿纳尼娜）的一封来信后写的。信中请求帮助她领到住房和部分家具。——69。</div></aside></body>
