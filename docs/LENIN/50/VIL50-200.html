<h1>
462.致格·李·什克洛夫斯基<sup><a href="#z420" id="zref420"><b>420</b></a></sup></h1>
<p class="date">（6月3日）</p>
<p>　　什克洛夫斯基同志：</p>
<p>　　很抱歉，无论今天还是明天我都没有时间。星期一也是从早晨起就有会。您最好写个便条来。</p>
<p>　　卢托维诺夫昨天来电报说：“什克洛夫斯基的出国签证已取到。”</p>
<p>　　敬礼！</p>
<p>　　列宁
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref420" id="z420"><b>420</b></a> 这张便条是为答复格·李·什克洛夫斯基请求接见而写的。看来列宁于6月3日曾同什克洛夫斯基谈过话（见本卷第464号文献）。——416。</div></aside></body>
