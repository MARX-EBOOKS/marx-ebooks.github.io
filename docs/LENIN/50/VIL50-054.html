<h1>
113.致舒·姆·马努恰里扬茨</h1>
<p class="date">（1月28日）</p>
<p>　　请弄到（一套）伊万诺沃-沃兹涅先斯克出的《工人边疆区报》。<sup><a href="#z105" id="zref105"><b>105</b></a></sup>（真正的无产阶级诗人小组。）</p>
<p>　　高尔基赞扬：日任 </p>
<p>　　阿尔塔蒙诺夫</p>
<p>　　谢苗诺夫斯基</p>
<p>　　载于1927年1月21日《真理报》第17号
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref105" id="z105"><b>105</b></a> 《工人边疆区报》（《Paбoчий　Kpaй》）是苏俄地方报纸，在伊万诺沃-沃兹涅先斯克出版。1917年11月创刊时叫《工人之城报》。1918年3月改称《工人边疆区报》。现为伊万诺沃州的州报。——96。</div></aside></body>
