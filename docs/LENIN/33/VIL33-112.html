<h1>人民委员会关于改善彼得格勒各监狱粮食状况的决定草案<sup><a href="#z146" id="zref146"><b>146</b></a></sup></h1>
<p class="date">（1918年1月23日〔2月5日〕）</p>
<p>　　人民委员会决定：</p>
<p>　　（1）采取紧急措施，迅速改善彼得格勒各监狱的粮食状况。委托司法人民委员和粮食人民委员处理。</p>
<p>　　　　 无条件地按各监狱供应表配给粮食。</p>
<p>　　（2）把三分之一到二分之一的囚犯急速转移到设在粮食情况好的地区的地方监狱。</p>
