<h1>人民委员会关于接收怠工者参加工作的手续的决定<sup><a href="#z153" id="zref153"><b>153</b></a></sup></h1>
<p class="date">（1918年1月31日〔2月13日〕）</p>
<p>　　人民委员会决定：</p>
<p>不同怠工者进行任何谈判。</p>
<p>　　对那些已完全服从并拥护苏维埃政权而又为有关部门的工作所必需的怠工者，各人民委员可以个别地接收参加工作。</p>
