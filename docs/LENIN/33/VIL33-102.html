<h1>人民委员会关于工资的决定草案<sup><a href="#101-z135" id="101-zref135"><b>135</b></a></sup></h1>
<p class="date">（1918年1月16日〔29日〕）</p>
<p>　　人民委员会暂时批准邮电人民委员部两个月的预算，以便立即着手对全国各地区、各行业的薪金和工资标准进行普遍的审查和平衡。</p>
<p>　　这次审查，委托劳动人民委员部同所有其他人民委员部和工人组织协商进行。</p>

<a href="#101-zref135" id="101-z135"><b>135</b></a> 这个决定草案是列宁为人民委员会1918年1月16日（29日）会议研究邮电职员工资问题而写的。决定草案被会议通过。——317。<br>
</p>
