<h1>
经济措施纲要草稿
</h1>
<p class="date">（不早于1917年11月27日〔12月10日〕）</p><br>
<p>  银行国有化</p>
<p>  货币回笼</p>
<p>  大额票面的新币</p>
<p>  是采取革命措施使工厂转向有益的生产</p>
<p>  用强迫参加消费合作社的办法使消费集中</p>
<p>  国家垄断对外贸易</p>
<p>  工业国有化</p>
<p>  公债。</p>
