<h1>给《火星报》编辑部的信的内容要点<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（1903年11月7日和19日〔11月―20日和12月2日〕之间）</p>
<h3 id="h37-0">评《火星报》第52号上格·瓦·普列汉诺夫的文章《不该这么办》</h3>
<p>　　多一些光：讨论“不彻底性”和“细小的分歧”</p>
<p>　　领袖们的“失败”；选择领袖必须是自觉的</p>
<p>　　类似日内瓦的泥潭；蛤蟆的鼓噪还不=“分裂”</p>
<p>　　每个人都应当“各得其所”。抒情的小提琴和狂暴的大提琴；独裁的指挥捧</p>
<p>　　中央机关报的“热情欢迎”。</p>
