<h1>致俄国社会民主工党中央机关报编辑部</h1>
<p class="date">（1903年11月5日〔18日〕）</p>
<p>　　尊敬的同志：请在《火星报》上登载以下的声明：</p>
<p>　　“从1903年11月1日（公历）起，尼·列宁不再在《火星报》编辑部工作。”</p>
<p>　　致社会民主主义的敬礼！</p>
<p class="rt">尼·列宁</p>
