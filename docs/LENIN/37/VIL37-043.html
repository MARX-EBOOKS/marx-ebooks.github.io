<h1>给共和国革命军事委员会副主席的指令</h1>
<p>　　
1919年10月24日</p>
<div style="text-align: center;">由<b>斯大林</b>发出<br>
（<b><u>火速</u>解决</b>）</div>
<p>　　（1）把已应征的拉脱维亚人编入拉脱维亚师各后备营</p>
<p>　　　　（督促彼得松；向他重申命令）。</p>
<p>　　（2）总司令已答应把土耳其斯坦骑兵旅调往科兹洛夫。</p>
<p>　　　　检查。督促。</p>
<p>　　（3）总司令已答应给第8集团军调去8个营。</p>
<p>　　　　督促。</p>
<p>　　　　<u><b>指定负责人</b></u>。</p>
<p>　　（4）总司令已答应从卡卢加抽调部队增援第45师。</p>
<p>　　　　检查。督促。</p>
<p>　　　　<b>指定负责人</b>。</p>
