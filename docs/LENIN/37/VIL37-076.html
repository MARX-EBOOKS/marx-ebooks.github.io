<h1>在全俄东部各民族共产党组织第二次代表大会部分代表的会议上作的笔记</h1>
<p class="date">1919年11月21日的会议</p>
<p>（A）基本任务:东部各共产主义组织和共产党的原则性意义。</p>
<p>（B）党的组织问题。</p>
<p>（C）国家行政问题。</p>
<p>地域原则和超地域原则相结合</p>
<p>＋与俄罗斯族的劳动群众最紧密的联盟。</p>
<p>（E）每个民族的具体问题，与其发展程度、特点等相适应。</p>
<p>＋超地域性？</p>
<p>（F）为反对各民族的官僚、封建主、资产阶级而同每个民族的贫苦农民、劳动者、被剥削者联系的方法和措施。</p>
