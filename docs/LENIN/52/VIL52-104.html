<h1>
致米·格·茨哈卡雅<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（12月6日）</p>
<p>　　亲爱的米哈同志：</p>
<p>　　关于马哈拉泽的信已收到。很遗憾，我不能同您谈了。我很疲劳，生病了。马上就要走。请原谅我，并请代我衷心问候菲力浦·马哈拉泽同志。</p>
<p>　　您的列宁</p>
<p>　　12月6日</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第54卷第66页
</p>
