<h1>
给费·阿·罗特施坦的电报</h1>
<p class="date">（12月7日）</p>
<p>　　致罗特施坦（经帕·彼·哥尔布诺夫转）</p>
<p>　　请您照顾一下瓦拉·阿尔曼德，如果需要，就派人送她到这里来，供给她防寒衣服。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　列宁</p>
<p>　　1921年12月7日</p>
<p>　　于莫斯科克里姆林宫</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第54卷第67页
</p>
