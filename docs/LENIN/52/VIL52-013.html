<h1>
致瓦·亚·斯莫尔亚尼诺夫</h1>
<p class="date">（11月9日）</p>
<p>　　斯莫尔亚尼诺夫同志：</p>
<p>　　请阅，阅毕送还阿瓦涅索夫。</p>
<p>　　第一份图表（顿涅茨克煤炭装车情况）应作为向劳动国防委员会呈送图表的范本<sup><a href="#bz1" id="bzref1">FN1</a></sup>。</p>
<p>　　不过：</p>
<p>　　1.所有图表都应放在文件夹里，而不要卷起来；</p>
<p>　　2.因而图表应小些；</p>
<p>　　3.图表上的指示线应不＞3<sup><a href="#bz2" id="bzref2">FN2</a></sup>。</p>
<p>　　列宁</p>
<p>　　1921年11月9日</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第54卷第8页
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 参看《列宁全集》第2版第42卷第210、501—504页。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 意为不多于3。——编者注<br>
</p>
