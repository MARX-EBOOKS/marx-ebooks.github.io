<h1>
致阿·萨·叶努基泽</h1>
<p class="date">（3月13日）</p>
<p>　　叶努基泽同志：</p>
<p>　　请您给哥尔布诺夫同志写几句，让他打电话转告我，给国家计划委员会委员的那两套住房究竟安排好没有；关于这件事我给您写过信，您答复说已经采取了一切措施。</p>
<p>　　拨给国家计划委员会两套住房是十分必要的。<sup><a href="#z387" id="zref387"><b>387</b></a></sup></p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　译自《列宁全集》俄文第5版第54卷第206—207页
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref387" id="z387"><b>387</b></a>
1922年3月14日，阿·萨·叶努基泽通知人民委员会办公厅主任尼·彼·哥尔布诺夫说，由于住房情况十分紧张，只能给斯·古·斯特卢米林增加一个房间。<br>　　参看本卷第301号文献。——348。<br>
</p>
