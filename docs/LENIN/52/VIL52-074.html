<h1>
致对外贸易人民委员部</h1>
<p class="date">（12月2日）</p>
<p>　　对外贸易人民委员部</p>
<p>　　抄送皮达可夫同志阅</p>
<p>　　我要求为顿涅茨煤田中央煤炭工业管理局开列供应下列器材的外国（德、美、英）公司名单：</p>
<p>　　（1）一般矿山设备，</p>
<p>　　（2）钢丝绳，</p>
<p>　　（3）水泵，</p>
<p>　　（4）电工器材，</p>
<p>　　（5）割煤机，传送带等，</p>
<p>　　（6）各种工具，</p>
<p>　　（7）一般金属制品，特别是铁丝。</p>
<p>　　请将执行情况报告人民委员会办公厅主任哥尔布诺夫同志。人民委员会主席</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第54卷第47—48页
</p>
