<h1>
致尼·彼·哥尔布诺夫</h1>
<p class="date">（11月27日）</p>
<p>　　哥尔布诺夫同志：请您亲自监督此事。请派一名自行车通讯员去格·马·克尔日扎诺夫斯基处，把我就哈尔科夫的“发现”和丘巴尔的意见写的两封短信<sup><a href="#bz1" id="bzref1">FN1</a></sup>取来。</p>
<p>　　列宁</p>
<p>　　11月27日</p>
<p>　　（附言：应该把发现人叫到这里来；让拉扎列夫见见他；送他去下诺夫哥罗德，如此等等。）</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第54卷第38页
</p>
