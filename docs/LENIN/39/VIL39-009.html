<h1>给阿塞拜疆苏维埃社会主义政府的电报</h1>
<p class="date">（1920年5月5日）<br>
巴库</p>
<p>　　人民委员会祝贺独立的阿塞拜疆共和国劳动群众获得解放，坚信独立的阿塞拜疆共和国在它的苏维埃政府的领导下，一定能同俄罗斯联邦一道，抗击东方被压迫民族的死敌帝国主义，保卫住自由和独立。</p>
<p>　　独立的阿塞拜疆苏维埃共和国万岁！</p>
<p>　　阿塞拜疆工农万岁！</p>
<p>　　阿塞拜疆和俄罗斯的工农联盟万岁！</p>
<p class="sign">人民委员会主席　弗·乌里扬诺夫（列宁）</p>
