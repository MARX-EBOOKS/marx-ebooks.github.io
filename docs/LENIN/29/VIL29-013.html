<h1>答瑞典社会民主党左派代表弗·斯特勒姆</h1>
<p class="date">（1917年3月31日〔4月13日〕）</p>
<blockquote>　　说弗雷德里克·斯特勒姆违背俄国人的愿望，没有让《社会民主党人报》<sup><a href="#z64" id="zref64"><b>64</b></a></sup>的代表出席会议，这是公然的捏造。列宁对斯特勒姆提出的问题回答说：</blockquote>
<p>　　<b>我们</b>完全不信任布兰亭先生。如果<b>你们</b>信任他，你们可以邀请他的代表。</p>
<table class="src rt"><tbody><tr><td>
载于1917年4月15日《政治报》第86号<br>
译自《列宁全集》俄文第5版第31卷第96页<br>
</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref64" id="z64"><b>64</b></a> 《社会民主党人报》（《Socialdemokraten》）是瑞典社会民主党的中央机关报（1889—1944年），卡·亚·布兰亭曾担任它的编辑。——95。<br>
</div></aside>
