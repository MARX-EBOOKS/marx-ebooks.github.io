<h1>
利沙加勒：《1871年公社史》
</h1>
<p>　　利沙加勒：《公社史》，1894，第193页(第17章的题词)：“如果法兰西民族完全由妇女构成，那将是一个多么令人畏惧的民族啊。”《The Daily News》<sup><a href="#bz1" id="bzref1">FN1</a></sup>1871年5月。</p>
<p>　　瑞士的新军事法于1907年11月3日通过：+329953</p>
