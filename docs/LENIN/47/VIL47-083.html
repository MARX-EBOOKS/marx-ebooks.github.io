<h1>
致格·李·什克洛夫斯基<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（9月26日）</p>
<p>　　亲爱的格·李·：</p>
<p>　　（1）请您给柳德米拉50法郎。等我到达后再同您结算。</p>
<p>　　（2）是否能再弄到5—10份《公报》（格里姆的）第1号？如果要不到，就请买5份。</p>
<p>　　从泽伦堡（瑞士）发往伯尔尼</p>
<p>　　载于1929年《列宁文集》俄文版第11卷</p>
<p>　　译自《列宁全集》俄文第5版第49卷第154页
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 这是写在娜·康·克鲁普斯卡娅信上的附笔。——俄文版编者注<br>
</p>
