<h1>
致卡·伯·拉狄克<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（11月13日以后）</p>
<p>　　亲爱的同志：</p>
<p>　　我终于找到了简要介绍我们宣言的那一号《哨兵报》。用完请退我。</p>
<p>　　可否将这样一篇东西用德文登出来？这个问题将反映出你们（即你们杂志<sup><a href="#z42" id="zref42"><b>42</b></a></sup>）的合法程度。</p>
<p>　　致以最崇高的敬意！</p>
<p>　　您的　列宁</p>
<p>　　译自《列宁文集》俄文版第37卷第29—30页
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 列宁在信的上方写着：伯尔尼迪斯泰尔路11号弗·乌里扬诺夫。——俄文版编者注</div></aside></body>
