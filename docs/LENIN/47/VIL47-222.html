<h1>
给莫·马·哈里东诺夫的电报
</h1>
<p class="date">（4月7日）</p>
<p>　　普拉滕应设法获准随身携带食品。明天12时，请用电话告知执行情况，12.11。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　乌里扬诺夫</p>
<p>　　从伯尔尼发往苏黎世</p>
<p>　　原文是德文</p>
<p>　　译自《列宁全集》俄文第5版第49卷第431页
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 数字表示电话号码。——编者注<br>
</p>
