<h1>
致伊·费·阿尔曼德
</h1>
<p class="date">（2月25日）</p>
<p>　　亲爱的朋友：请您尽快把小报译好。如果赶不出来，就请立即把俄文原稿的抄件寄给我，因为有便人要去德国。这是少有的机会，应该抓住，而捎信人很快就要动身。</p>
<p>　　叶·费·在哈尔科夫被搜查一事及“证件”问题已由委员会调查清楚！！</p>
<p>　　格里戈里从伯尔尼来信说，昨天对格里姆之流取得了巨大的胜利！乌拉！</p>
<p>　　要加紧做青年人的工作！对德罗的战斗进行得怎么样？全党表决的情况如何？</p>
<p>　　难道您不是把小报的法文和英文译稿各写成两份吗？</p>
<p>　　紧紧握手！</p>
<p>　　您的　列宁</p>
<p>　　从苏黎世发往克拉伦（瑞士）</p>
<p>　　译自《列宁全集》俄文第5版第49卷第391—392页
</p>
