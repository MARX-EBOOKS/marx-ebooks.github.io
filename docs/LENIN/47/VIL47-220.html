<h1>给维·阿·卡尔宾斯基的电报</h1>
<p class="date">（4月6日）</p>
<p>　　明天上午10时45分我们离开伯尔尼。请立即前来。</p>
<p>　　乌里扬诺夫</p>
<p>　　从伯尔尼发往日内瓦</p>
<p>　　原文是德文</p>
<p>　　载于1930年《列宁文集》俄文版第13卷</p>
<p>　　译自《列宁全集》俄文第5版第49卷第430页
</p>
