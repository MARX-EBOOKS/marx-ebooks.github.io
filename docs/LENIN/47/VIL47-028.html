<h1>致维·阿·卡尔宾斯基</h1>
<p class="date">（1月3日和9日之间）</p>
<p>　　亲爱的同志：</p>
<p>　　现将校样寄上。</p>
<p>　　为了早些见报，请立即出版这一号<sup><a href="#028-bz1" id="028-bzref1">FN1</a></sup>（不再寄上新的稿件了）。反正文章顺序已经编排好了，对吧？如果没有，请立即来信。</p>
<p>　　库兹马能应付得了每周出一号中央机关报吗？</p>
<p>　　下一号的稿件要什么时候寄？下一号已排版的有多少？</p>
<p>　　附言：日内瓦有没有可以查询拘押在德国的俄国战俘的机构？</p>
<p>　　敬礼！</p>
<p>　　您的　列宁</p>
<p>　　从伯尔尼发往日内瓦</p>
<p>　　载于1929年《列宁文集》俄文版第11卷</p>
<p>　　译自《列宁全集》俄文第5版第49卷第48页
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#028-bzref1" id="028-bz1">FN1</a> 《社会民主党人报》第36号。——编者注<br>
</p>
