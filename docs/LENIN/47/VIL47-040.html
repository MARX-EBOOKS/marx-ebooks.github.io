<h1>
致维·阿·卡尔宾斯基</h1>
<p class="date">（3月9日和23日之间）</p>
<p>　　亲爱的维·卡·：</p>
<p>　　校样马上寄上。请改正。</p>
<p>　　说真的，您不收抄写费，这样做可不好。第一，您未严格按照条件办事，这在同志之间实在是不应该的，您可是同意过把收费价格表寄来的啊！</p>
<p>　　第二，您现在究竟要逼我怎么办呢？</p>
<p>　　是要逼我今后不再寄东西给您抄写吗？</p>
<p>　　请您在不生气、不激动的时候想想这件事。我相信您会确认自己不对。不能这样呵！</p>
<p>　　致崇高的敬礼！</p>
<p>　　您的　列宁</p>
<p>　　从伯尔尼发往日内瓦</p>
<p>　　载于1929年《列宁文集》俄文版第13卷</p>
<p>　　译自《列宁全集》俄文第5版第49卷第69页
</p>
