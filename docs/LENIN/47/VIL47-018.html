<h1>
致维·阿·卡尔宾斯基
</h1>
<p class="date">（11月20日）</p>
<p>　　亲爱的维·卡·：</p>
<p>　　请安排再印1000份。然后要他们立即拆版，并请来信告我，下一号<sup><a href="#bz1" id="bzref1">FN1</a></sup>何时可以开始排版。该号已有一半脱稿。</p>
<p>　　敬礼！</p>
<p>　　您的　列宁</p>
<p>　　从伯尔尼发往日内瓦</p>
<p>　　载于1929年《列宁文集》俄文版第11卷</p>
<p>　　译自《列宁全集》俄文第5版第49卷第33页
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 《社会民主党人报》第34号。——编者注</div></aside></body>
