<h1>
致约翰奈斯·胡贝尔</h1>
　　（7月18日以前）
<p>　　圣加仑州罗尔沙赫基尔希街17号</p>
<p>　　律师胡贝尔博士</p>
<p>　　尊敬的同志：</p>
<p>　　兹竭诚推荐来人巴戈茨基同志，请给予指点。巴戈茨基同志很长时期以来一直都是俄国社会民主工党党员。</p>
<p>　　受俄国社会民主工党中央委员会委托</p>
<p>　　尼·列宁</p>
<p>　　泽伦堡（卢塞恩州）</p>
<p>　　弗拉·乌里扬诺夫</p>
<p>　　致党的敬礼！</p>
<p>　　弗拉·乌里扬诺夫</p>
<p>　　原文是德文</p>
<p>　　载于1973年《欧洲社会科学评论》（日内瓦）第13卷第29期</p>
<p>　　译自《列宁文集》俄文版第40卷第44—45页
</p>
