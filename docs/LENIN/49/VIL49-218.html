<h1>
给伊·捷·斯米尔加的电报</h1>
<p class="date">（8月18日）</p>
<p>　　密码</p>
<p>　　致斯米尔加</p>
<p>　　波兰人的进攻使我们必须加一把劲（哪怕是几天也好）。要尽一切可能去做。如果您认为有益的话，就向部队发出命令，说明他们现在作出十倍的努力，就能保证俄国获得对今后多年都有利的媾和条件。</p>
<p>　　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
