<h1>
致俄共（布）中央高加索局</h1>
<p class="date">（8月19日）</p>
<p>　　直达电报（密码）</p>
<p>　　中央高加索局</p>
<p>　　目前还要同波兰白军进行一场顽强的战斗。因此中央只能抽出有限的人员去弗兰格尔战线。中央高加索局应以弗兰格尔战线为主要任务，极严格地计算和分配力量。必须帮助加强政治部、特别部、各集团军的法庭，提高部队战斗力，要派优秀的共产党员。将采取的措施报告中央。</p>
<p>　　列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　8月19日</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
