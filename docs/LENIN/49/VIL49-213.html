<h1>
致埃·马·斯克良斯基</h1>
<p class="date">（8月12日）</p>
<p>　　是否需要指示斯米尔加，应（在粮食收完之后）征集所有的成年男子入伍？</p>
<p>　　需要。</p>
<p>　　既然布琼尼去南方，就得加强北方。
</p>
