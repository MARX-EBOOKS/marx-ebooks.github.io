<h1>
</h1>
<p class="date">（10月19日以后）</p>
<p>
　　急</p>
<p>　　致捷尔任斯基同志</p>
<p>　　博尔德列沃（坦波夫省拉斯卡佐沃）的工厂被匪徒占领了。</p>
<p>　　太不象话了。</p>
<p>　　我命令把坦波夫省这次失职的肃反人员（和省执行委员会人员）</p>
<p>　　（1）送交军事法庭，</p>
<p>　　（2）给科尔涅夫严重警告，</p>
<p>　　（3）立即派去最得力的人员，</p>
<p>　　（4）发电报给予申斥并作指示。</p>
<p>　　列宁
</p>
</body>
