<h1>
给约·维·斯大林的电报　
</h1>
<p class="date">（2月4日）</p>
<p>　　直达电报　 （密码）</p>
<p>　　致斯大林</p>
<p>　　如果在最近几周您能把全部精力集中用于支援高加索方面军，使西南方面军的利益服从于高加索方面军，中央就不坚持要您去。<sup><a href="#z488" id="zref488"><b>488</b></a></sup>阿尔然诺夫被派往沃罗涅日，以便加快部队的必要调动。请给他必要的协助，并将调动的情况准确地告诉我们。</p>
<p>　　国防委员会主席列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　1920年2月4日</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 签署该电的还有革命军事委员会主席列·达·托洛茨基。——俄文版编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref488" id="z488"><b>488</b></a> 指让斯大林前往高加索战线一事。——653。</div></aside></body>
