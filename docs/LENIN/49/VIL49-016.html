<h1>
给约·维·斯大林的电报</h1>
<p class="date">（7月15日）</p>
<p>　　西方面军革命军事委员会斯大林</p>
<p>　　第1号来信已收到。</p>
<p>　　吉季斯如尚未出发，明日一定出发。谢尔戈和索洛古布已经出发。谢尔盖·梅德维捷夫病了。斯米尔加已吩咐多给一些工作人员。对南线，我们正在采取措施。加米涅夫、斯米尔加、古谢夫和谢列布里亚科夫今天到那里去。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　祝贺攻克叶卡捷琳堡。</p>
<p>　　列宁</p>
<p>　　载于1959年《列宁文集》俄文版第36卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 该电除首尾两句外，列宁都画了着重线，并在页边注明：“密码”。——俄文版编者注</div></aside></body>
