<h1>给约·维·斯大林的电报</h1>
<p>　　莫斯科</p>
<p>　　1919年7月18日</p>
<p>　　西方面军革命军事委员会</p>
<p>　　斯大林</p>
<p>　　共和国革命军事委员会即将讨论您的请求。斯克良斯基说，如果还能从东线抽调，则应调往南线。明日斯米尔加和总司令<sup><a href="#020-z23" id="020-zref23"><b>23</b></a></sup>将从南线到这里来。<sup><a href="#020-bz1" id="020-bzref1">FN1</a></sup></p>
<p>　　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#020-bzref1" id="020-bz1">FN1</a> 列宁在电文上画了着重线，并在页边注明：“密码”。——俄文版编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#020-zref23" id="020-z23"><b>23</b></a> 当时共和国武装部队总司令是谢·谢·加米涅夫。——31。<br>
</p>
