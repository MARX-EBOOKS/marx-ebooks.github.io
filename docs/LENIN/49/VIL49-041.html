<h1>
给恩·奥新斯基的电报</h1>
<p class="date">（1919年8月26日）</p>
<p>　　图拉</p>
<p>　　执行委员会奥新斯基</p>
<p>　　抄送：兵器厂和弹药厂政治委员</p>
<p>　　不要强制动员兵器厂和弹药厂工人去从事其他任何工作，因为武器和弹药比什么都重要。报告执行情况。</p>
<p>　　国防委员会主席列宁</p>
<p>　　载于1933年《列宁文集》俄文版第24卷
</p>
