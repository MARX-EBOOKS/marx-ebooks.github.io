<h1>
致尼·尼·克列斯廷斯基<sup><a href="#242-z421" id="242-zref421"><b>421</b></a></sup></h1>
<p class="date">（不早于9月17日）</p>
<p>　　克列斯廷斯基同志：</p>
<p>　　此类东西最好直接送您，以免由我转递而耽误时间。</p>
<p>　　列宁
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#242-zref421" id="242-z421"><b>421</b></a> 这段批语写在远东共和国特命全权副代表Я.М.德沃尔金的公函上。公函附的一封电报汇报了远东共和国货币贬值的情况，并提出了在远东共和国使用苏维埃货币的办法。——550。<br>
</p>
