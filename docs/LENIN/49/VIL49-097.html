<h1>
致阿·雅·别连基
</h1>
<p class="date">（1919年12月11日）</p>
<p>　　致别连基同志</p>
<p>　　卢比扬卡街11号楼27室</p>
<p>　　别连基同志：向您郑重推荐来人罗维奥同志，他是芬兰共产党党员，党的老干部，请帮助他，此事我们已在电话中谈过了。</p>
<p>　　敬礼！</p>
<p>　　您的列宁</p>
<p>　　载于1933年《列宁文集》俄文版第24卷
</p>
