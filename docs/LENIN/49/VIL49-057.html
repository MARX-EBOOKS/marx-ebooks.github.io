<h1>
给格·叶·季诺维也夫的电报
</h1>
　　1919年10月2日
<p>　　彼得格勒</p>
<p>　　斯莫尔尼</p>
<p>　　季诺维也夫</p>
<p>　　来信收悉。对您和全体彼得格勒工人努力工作表示热烈的欢迎。我相信，你们会使动员达到最大的限度。</p>
<p>　　列宁</p>
<p>　　载于1919年10月3日《彼得格勒真理报》第223号
</p>
