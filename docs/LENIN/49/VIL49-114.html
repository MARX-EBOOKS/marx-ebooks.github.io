<h1>
致弗·德·邦契－布鲁耶维奇</h1>
<p class="date">（1920年1月4日）</p>
<p>　　亲爱的弗·德·：</p>
<p>　　＃</p>
<p>　　我的书籍由我个人付款。</p>
<p>　　您痊愈后，请支付</p>
<p>　　3200＋500（达里词典）／3700等等</p>
<p>　　并保存收据。</p>
<p>　　您的　列宁</p>
<p>　　附上4000卢布。</p>
<p>　　＃</p>
<p>　　人民委员会办公厅的书籍另当别论。</p>
<p>载于1926年《星火》杂志第13期
</p>
