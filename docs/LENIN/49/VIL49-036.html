<h1>
致叶·德·斯塔索娃<sup><a href="#z37" id="zref37"><b>37</b></a></sup></h1>
<p class="date">（8月13日）</p>
<p>　　叶列娜·德米特里耶夫娜：这是一位党的老干部。是个很可贵的人。请来信告知，您想把她安排到哪里。</p>
<p>　　列宁</p>
<p>　　8月13日</p>
<p>　　载于1933年《列宁文集》俄文版第24卷
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref37" id="z37"><b>37</b></a> 此件写在策·萨·博勃罗夫斯卡娅给列宁的信上。博勃罗夫斯卡娅是1898年入党的职业革命家，她在信中请列宁帮助给她安排一个工作。——62。</div></aside></body>
