<h1>☆致各级苏维埃机关和军事当局</h1>
<p class="date">（1919年10月27日）</p>
<p>　　来人波里斯·索洛蒙诺维奇·魏斯布罗德同志是我熟悉的一位医生，党的老干部，请给以充分信任和大力协助。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
