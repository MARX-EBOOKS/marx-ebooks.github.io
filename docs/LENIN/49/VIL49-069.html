<h1>
给列·达·托洛茨基和格·叶·季诺维也夫的电报<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<p class="date">（10月20日）</p>
<p>　　彼得格勒</p>
<p>　　托洛茨基、季诺维也夫</p>
<p>　　是否已采取措施在哈尔拉莫夫突击军队集群与第7集团军司令部之间建立可靠的无线电联系？这种联系是否有足够保障？对其他各军队集群也应如此。如需我们协助，请来电话。</p>
<p>　　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 文献上有埃·马·斯克良斯基的批注：“密码。通过直达电报立即发出。”——俄文版编者注<br>
</p>
