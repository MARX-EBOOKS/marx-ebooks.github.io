<h1>给格·康·奥尔忠尼启则的电报</h1>
<p class="date-l">　　1920年9月9日</p>
<p>　　    密码</p>
<p>　　高加索方面军革命军事委员会</p>
<p>　　奥尔忠尼启则</p>
<p>　　最迅速而彻底地消灭高加索和库班的一切土匪和白卫军残部，这是一件对全国有重大意义的事。请更经常、更准确地把情况告诉我。</p>
<p>　　列宁</p>
<p>　　载于1936年10月28日《真理报》第298号
</p>
