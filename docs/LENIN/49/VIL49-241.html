<h1>
致А.П.普拉东诺夫</h1>
　　（9月16日）
<p>　　致普拉东诺夫同志</p>
<p>　　我坚决要求立即给斯克沃尔佐夫同志安排住房。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）
</p>
