<h1>
致阿·莫·阿尼克斯特</h1>
　　（8月14日）
<p>　　致阿尼克斯特</p>
<p>　　必须同挪威的朗塞特同志明确商定：他（或者他们）要为外国工人提出什么条件。</p>
<p>　　列宁</p>
<p>　　8月14日
