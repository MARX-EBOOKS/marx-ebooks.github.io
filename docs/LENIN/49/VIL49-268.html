<h1>
致斯·伊·博京</h1>
<p class="date">（10月）</p>
<p>　　博京同志：</p>
<p>　　请您对所有的试验都作记录</p>
<p>　　（1）电流或电能的强度，</p>
<p>　　（2）在什么地方（距离多少俄丈）按照方案设置炸药筒，在障碍物前还是在障碍物后，</p>
<p>　　（3）在地面，在高处，在低处，在地下（深度），</p>
<p>　　（4）什么时间爆炸的，哪一些爆炸了，</p>
<p>　　（5）三个人都要在记录上签字，记录保留在您处，然后转交给我。</p>
<p>　　每次试验都要分别作记录（日期、钟点等等）。　</p>
<p>  您的　列宁
</p>
</body>
