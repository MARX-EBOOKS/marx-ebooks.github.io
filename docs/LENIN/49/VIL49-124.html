<h1>
在列·达·托洛茨基电报上的附言<sup><a href="#z159" id="zref159"><b>159</b></a></sup></h1>
<p class="date">（1月17日）</p>
<p>　　请伏龙芝同志按照托洛茨基的指示，发挥革命干劲，最大限度加速筑路工程和运油工作。收电后请告知。</p>
<p>　　人民委员会主席列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref159" id="z159"><b>159</b></a> 这是列宁在列·达·托洛茨基给土耳其斯坦方面军司令米·瓦·伏龙芝和第4集团军司令加·卡·沃斯卡诺夫的电报上加的附言。电报就第4集团军的力量部署问题作了指示。该集团军作为劳动军被调去修筑亚历山德罗夫盖—恩巴铁路，并把红库特—亚历山德罗夫盖铁路线改成宽轨。</div></aside></body>
