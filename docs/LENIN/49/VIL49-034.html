<h1>
给列·达·托茨基的电报
</h1>
<p class="date">（8月9日）</p>
<p>　　密码</p>
<p>　　致托洛茨基</p>
<p>　　抄送：拉柯夫斯基</p>
<p>　　中央政治局请您向所有负责干部传达中央的指令：尽一切可能守卫，坚守敖德萨和基辅，保持住它们之间以及它们和我们之间的联系，直至战到最后一滴血。这是关系到整个革命命运的问题。请记住：我们的援助不久就会到来。</p>
<p>　　代表中央政治局列宁<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 签署该电的还有列·波·加米涅夫和叶·德·斯塔索娃，由列宁代笔。——俄文版编者注</div></aside></body>
