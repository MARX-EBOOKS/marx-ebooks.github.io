<h1>
致小人民委员会</h1>
<p class="date">（9月29日）</p>
<p>　　我支持这个请求，因为我亲眼见到沃罗夫斯基生活艰难，有些同志也向我指出这一情况。<sup><a href="#z432" id="zref432"><b>432</b></a></sup></p>
<p>　　列宁</p>
<p>　　9月29日</p>
<p>　　载于1945年《列宁文集》俄文版第35卷
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref432" id="z432"><b>432</b></a> 这段批语写在人民委员会办公厅主任弗·德·邦契－布鲁耶维奇请求小人民委员会发给瓦·瓦·沃罗夫斯基补助金的报告上。——567。</div></aside></body>
