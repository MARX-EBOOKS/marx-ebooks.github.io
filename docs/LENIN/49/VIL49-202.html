<h1>
给伊·尼·斯米尔诺夫的电报
</h1>
<p class="date">（8月2日）</p>
<p>　　密码</p>
<p>　　直达电报</p>
<p>　　致西伯利亚革命委员会主席斯米尔诺夫</p>
<p>　　鄂木斯克</p>
<p>　　总司令要求西伯利亚提供弹药和枪支。对此项要求必须立即照办，不准拖延，要以最快的速度运到。请了解一下，这些东西如能多给，就多给一些。要检查执行情况。</p>
<p>　　列宁</p>
<p>　　载于1942年《列宁文集》俄文版第34卷
</p>
