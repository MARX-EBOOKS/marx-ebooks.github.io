<h1>人民委员会关于修缮大剧院的决定</h1>
<p>　　1921年6月30日</p>
<p class="date"><b>决定</b></p>
<p>　　人民委员会1921年6月30日会议决定：</p>
<p>　　从1921年预算内预贷三亿（300000000）卢布给最高国民经济委员会国家建筑工程总委员会，作为修缮大剧院的费用。</p>
<p class="rt">人民委员会主席<br>
　　<b>弗·乌里扬诺夫（列宁）</b></p>
