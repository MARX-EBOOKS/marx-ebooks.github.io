<h1>俄共（布）中央政治局关于社会保险的决定草案<sup><a href="#z100" id="zref100"><b>100</b></a></sup></h1>
<p class="date">（1921年10月10日）</p>
<p>	　　委托全俄工会中央理事会主席团会同最高国民经济委员会、卫生人民委员部和社会保障人民委员部研究解决在实行新经济政策条件下的工人保险问题。</p>
<table class="src rt"><tbody><tr><td>
载于1959年《列宁文集》俄文版第36卷<br>
	译自《列宁全集》俄文第5版第44卷第138页</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref100" id="z100"><b>100</b></a> 这个决定草案由俄共（布）中央政治局于1921年10月10日通过。11月15日，人民委员会批准了《关于从事雇佣劳动人员的社会保险的法令》。—— 162。<br></div></aside>
