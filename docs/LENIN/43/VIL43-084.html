<h1>致教育工作者代表大会<sup><a href="#z209" id="zref209"><b>209</b></a></sup></h1>
<p class="date">（1922年11月26日）</p>
<p>　　同志们，感谢你们的问候，祝你们能完成你们肩负的重大任务——培养建设新生活的青年一代。</p>
<p class="sign"><b>列宁</b></p>
<table class="src rt"><tbody><tr><td>
载于1922年12月《教育工作者》杂志第10期<br>
译自《列宁全集》俄文第5版第45卷第314页<br>
</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref209" id="z209"><b>209</b></a> 这是列宁给全俄教育工作者工会第四次代表大会的回信，于1922年11月26日上午在大会上宣读。代表大会选举列宁为名誉主席，并以50万教育工作者大军的名义向他发了致敬信。<br>
　　全俄教育工作者工会第四次代表大会于1922年11月21―26日在莫斯科举行。183名代表出席了大会。大会的中心议题是教育工作者的政治教育问题。——307。<br>
</div></aside>
