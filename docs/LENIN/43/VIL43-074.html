<h1>致国营“输电”发电站职工<sup><a href="#z191" id="zref191"><b>191</b></a></sup></h1>
<p class="date">（1922年11月7日）</p>
<p>亲爱的同志们：</p>
<p>　　在庆祝革命五周年的今天，我特别高兴地祝贺你们俱乐部的开幕，希望你们国营“输电”发电站职工能够同心协力把这个俱乐部办成对工人进行教育的最重要的阵地之一。</p>
<p class="sign"><b>弗·乌里扬诺夫（列宁）</b><br>
　　　1922年11月7日</p>

载于1945年《列宁文集》俄文版第35卷<br>
译自《列宁全集》俄文第5版第45卷第271页<br>
</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref191" id="z191"><b>191</b></a> 这是列宁给国营“输电”发电站职工的回信。该发电站的职工曾邀请他在十月革命五周年参加发电站俱乐部的开幕式，并发表讲话。该发电站现名克拉松发电站，罗·爱·克拉松是修建该发电站的工程师。——268。<br>
</div></aside>
