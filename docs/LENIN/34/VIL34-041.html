<h1>人民委员会关于动员工人同饥荒作斗争的决定草案<sup><a href="#z135" id="zref135"><b>135</b></a></sup></h1>
<p class="date">（1918年5月9日）</p>
<p>　　委托劳动人民委员部采取最紧急的措施，以便和工会协同一致并在粮食人民委员部的绝对领导下，动员尽可能多的先进的、有组织的觉悟工人支援贫苦农民同财主－富农的斗争，无情镇压粮食投机活动和破坏粮食垄断的活动。</p>

载于1931年《列宁文集》俄文版第18卷<br>
