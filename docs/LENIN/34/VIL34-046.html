<h1>《当前的主要任务》小册子序言</h1>
<p class="date">（1918年5月17日）</p>
<p>　　这本小册子收集了两篇报纸上的文章：一篇收自1918年3月12日《中央执行委员会消息报》，另一篇收自1918年5月9―11日《真理报》。<sup><a href="#045-bz1" id="045-bzref1">FN1</a></sup>这两篇文章从不同的角度论述了这本小册子的标题所表明的同一个问题。</p>
<p class="sign">作者<br>
1918年5月17日于莫斯科</p>
