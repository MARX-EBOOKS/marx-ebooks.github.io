<h1>人民委员会关于糖用甜菜种植贷款的决定<sup><a href="#z97" id="zref97"><b>97</b></a></sup></h1>
<p class="date">（1918年4月17日）</p>
<p>　　将供农民种植甜菜用的定金2000万卢布拨给最高国民经济委员会支配，以便最高国民经济委员会采取一切必要措施，保证这笔款项合理使用和及时归还。</p>
<p class="sign">人民委员会主席<br>
　　<b>弗·乌里扬诺夫（列宁）</b></p>
<table class="src rt"><tbody><tr><td>
载于1945年《列宁文集》俄文版第35卷<br>
译自《列宁全集》俄文第5版第36卷第225页<br>
</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref97" id="z97"><b>97</b></a> 关于拨发种植甜菜的预支款问题是糖业总委员会提出的。1918年4月17日，人民委员会讨论了最高国民经济委员会关于执给糖业总委员会2000万卢布的申请后，批准了列宁提出的决定草案。——[209]。<br>
</div></aside>
