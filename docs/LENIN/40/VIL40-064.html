<h1>对制定加强和发展农民农业经济的措施的法令草案的意见</h1>
<p class="date">（1920年12月4日）</p>
<h4 id="h64-0" style="text-align: center">给委员会委员的指示</h4>
<p>　（1）增加农民协助委员会代表的人数……</p>
<p>　（2）根据农业人民委员部的第6条的规定来确定农民协助委员会参加的办法。</p>
<p>　（3）限制播种委员会颁布行政决定的权力：无论县、省一级或区域一级要颁布这种决定，都必须事先把要采取的措施提交农民协助委员会开会讨论。</p>
<p>　（4）删去回收种子这一条，种子储备的保管方式由地方机关来确定。</p>
<p>　（5）删去第7部分——关于征收……</p>
<p>　（6）把草案的大部分写入工作细则。</p>
