<h1>给亚美尼亚革命军事委员会主席的电报<sup><a href="#z48" id="zref48"><b>48</b></a></sup></h1>
<p class="date">（1920年12月2日）</p>
<p class="ct">　　埃里温　　亚美尼亚革命<br>
　　军事委员会主席卡西扬同志</p>
<p>　　谨通过您向摆脱了帝国主义压迫的劳动人民的苏维埃亚美尼亚表示祝贺。我相信您一定会全力促成亚美尼亚、土耳其、阿塞拜疆劳动者之间兄弟般的团结。</p>
<p class="sign">人民委员会主席　　列宁<br>
　　1920年12月2日于莫斯科</p>
<table class="src rt"><tbody><tr><td>
载于1920年12月4日《真理报》第273号<br>
译自《列宁全集》俄文第5版第42卷第54页</td></tr></tbody></table>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref48" id="z48"><b>48</b></a>  亚美尼亚苏维埃政权建立后，亚美尼亚革命军事委员会于1920年11月30日给列宁发了致敬电。这封电报是列宁给亚美尼亚革命军事委员会的回电。——56。<br>
</p>
