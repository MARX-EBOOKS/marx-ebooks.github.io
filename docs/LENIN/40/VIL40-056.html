<h1>劳动国防委员会关于改善工人供应的决定<sup><a href="#z150" id="zref150"><b>150</b></a></sup></h1>
<p>　　1921年2月28日</p>
<p>　　劳动国防委员会决定立即采取紧急措施，改善对贫苦工人的粮食和日用必需品的供应，为此拨出数额为1000万金卢布的款项并立即派代表团去国外购买此类物品——代表团中应该有全俄工会中央理事会的代表参加。</p>
<p class="sign">劳动国防委员会主席　弗·乌里扬诺夫（列宁）</p>
