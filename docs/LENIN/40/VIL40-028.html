<h1>对俄共（布）中央全会关于创办专门的生产性机关报的决定草案的补充<sup><a href="#z62" id="zref62"><b>62</b></a></sup></h1>
<p class="date">（1920年12月20日）</p>
<p>　（1）指示《消息报》和《真理报》改成生产性比政治性更强的机关报，并引导俄罗斯联邦的所有报纸作同样的改变；</p>
<p>　（2）把《贫苦农民报》改为生产性报纸，该报必须登载具体材料，并担负密切农民和工人的关系、农业和工业的关系的任务。</p>

载于1959年《列宁文集》俄文版第36卷<br>

<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref62" id="z62"><b>62</b></a>  这两点补充写入了1920年12月20日俄共（布）中央全会通过的关于创办专门的生产性机关报问题的决定。——94。<br>　　</div></aside>
