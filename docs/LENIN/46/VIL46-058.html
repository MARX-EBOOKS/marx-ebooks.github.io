<h1>
致A.卡恩<sup><a href="#z274" id="zref274"><b>274</b></a></sup></h1>
<p>　　4月3日于克拉科夫</p>
<p>　　阁下：</p>
<p>　　感谢您电告“信因故未发”。为了新的调解尝试，目前我不得不采用一切“斗争方法”来对付对方。因此，我请求在接到我的通知以前不要采取任何正式步骤。</p>
<p>　　我希望最近能弄到一些重要文件给您。据我看，这些文件会改变您所谓“法律地位把握不大”的想法。</p>
<p>　　恩……</p>
<p>　　附言：请把您给蔡·<sup><a href="#bz1" id="bzref1">FN1</a></sup>的信的草稿寄给我。</p>
<p>　　1913年4月3日发出</p>
<p>　　原文是德文</p>
<p>　　译自《列宁文集》俄文版第38卷第94—95页
</p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 大概指蔡特金。——编者注</div></aside></body>
