<h1>
致德国社会民主党吊唁奥·倍倍尔逝世</h1>
　　（8月13日和17日之间）
<p>　　惊悉国际革命社会民主主义运动的一位最卓越的领袖不幸逝世，深表哀悼。</p>
<p>　　受俄国社会民主工党中央委员会的委托</p>
<p>　　列宁</p>
<p>　　从波罗宁发往柏林</p>
<p>　　原文是德文</p>
<p>　　载于1913年8月17日《前进报》第211号</p>
<p>　　译自《列宁全集》俄文第5版第48卷第206页
</p>
