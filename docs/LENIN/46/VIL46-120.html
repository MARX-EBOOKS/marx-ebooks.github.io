<h1>
致《钟声》杂志编辑部
</h1>
　　（4月26日）
<p>　　附言：我没有同尤尔凯维奇谈过，但是应当说明，我对鼓吹乌克兰工人分离出去，组成单独的社会民主主义组织的行为，感到无比愤慨。</p>
<p>　　致社会民主党的敬礼！</p>
<p>　　列宁</p>
<p>　　写于克拉科夫</p>
<p>　　载于1937年《列宁文集》俄文版第30卷</p>
<p>　　译自《列宁全集》俄文第5版第48卷第283页
</p>
