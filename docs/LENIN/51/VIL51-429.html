<h1>576.致瓦·米·米哈伊洛夫并转俄共（布）中央政治局</h1>
<p class="date">10月28日</p>
<p>
　　致米哈伊洛夫同志</p>
<p>　　请在政治局通过。</p>
<p>　　秘密</p>
<p>　　注意</p>
<p>　　这里指的是5—10亿瑞典克朗的款项。</p>
<p>　　我已指定一个预备委员会（罗蒙诺索夫、拉德琴柯、李维诺夫），请在该委员会作出肯定性结论之后加以批准。</p>
<p>　　我们还要加上舍印曼（财政人民委员部），但他不必去参加谈判。<sup><a href="#429-bz1" id="429-bzref1">FN1</a></sup></p>
<p>　　列宁</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第314页
</p>
