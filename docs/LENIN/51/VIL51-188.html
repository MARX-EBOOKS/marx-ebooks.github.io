<h1>240.给米·康·弗拉基米罗夫的电报</h1>
<p class="date">（8月17日）</p>
<p>　　乌克兰粮食人民委员部　弗拉基米罗夫</p>
<p>　　抄送：辛菲罗波尔　乌克兰疗养院中央管理局、粮食特别委员会</p>
<p>　　据辛菲罗波尔消息，克里木疗养院疗养人员的食品供应情况</p>
<p>　　非常困难，特别是粮食。只有乌克兰能给予帮助。请设法以最快速度给辛菲罗波尔乌克兰疗养院中央管理局发去10车皮粮食（其中部分为面粉），2车皮饲料。请将你们采取的措施通知布留哈诺夫和我。</p>
<p>　　人民委员会主席</p>
<p>　　发往哈尔科夫</p>
<p>　　载于1960年《苏共历史问题》杂志第2期</p>
<p>　　译自《列宁全集》俄文第5版第53卷第127—128页
</p>
