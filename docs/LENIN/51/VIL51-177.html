<h1>
224.给俄共（布）彼尔姆省委的电报</h1>
<p class="date">（8月12日）</p>
<p>　　给俄共（布）彼尔姆省委的电报　（8月12日）</p>
<p>　　彼尔姆　俄共省委</p>
<p>　　请在省委会议上宣读米雅斯尼科夫的两篇文章和我给他的复信。<sup><a href="#z172" id="zref172"><b>172</b></a></sup>莫托维利哈区委也照此办理。请米雅斯尼柯夫把我的复信打两份，一份给我，一份给省委。</p>
<p>　　列宁</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第115页
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref172" id="z172"><b>172</b></a>
指Г.И.米雅斯尼科夫写给俄共（布）中央的报告、他的文章《伤脑筋的问题》和列宁1921年8月5日给他的回信（见《列宁全集》第2版第42卷第84—90页）。——201。<br>
</p>
