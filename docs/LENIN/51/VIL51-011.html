<h1>
11.致尼·彼·哥尔布诺夫<sup><a href="#z7" id="zref7"><b>7</b></a></sup></h1>
<p class="date">（6月30日）</p>
<p>　　哥尔布诺夫同志：请弄清是否能给予帮助和给予什么样的帮助。请千方百计地给予帮助。（这个印刷厂是否已列入李可夫实行集体供应的六个厂之内？斯莫尔亚尼诺夫是否要到那里去看一看？）</p>
<p>　　列宁</p>
<p>　　6月30日</p>
<p>　　载于1932年《列宁文集》俄文版第20卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第5页
</p>

<span class="style2">注　　释</span><br><br>

</p>
