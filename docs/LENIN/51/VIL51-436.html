<h1>585.给秘书的指示</h1>
<p class="date">（10月）</p>
<p>
　　分发通知的情况极为紊乱。</p>
<p>　　要定一个明确的制度，书面的（要由哥尔布诺夫签署），并征得布里奇金娜的同意：</p>
<p>　　（a）由中央委员会书记在某限期内通知某人，</p>
<p>　　（b）由人民委员会的秘书们</p>
<p>　　（aa）用电话通知全体（或某些）人民委员，限期；</p>
<p>　　（bb）书面通知全体，等等。</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第317—318页
</p>
