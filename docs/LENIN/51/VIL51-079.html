<h1>81.致列·波·克拉辛</h1>
<p class="date">（7月16日）</p>
<p>　　克拉辛同志： </p>
<p>　　戈尔登贝格不愿出国。不愿做文字工作。</p>
<p>　　他希望在经济工作中发挥作用，心情非常迫切。要求去对外贸易人民委员部。</p>
<p>　　请同他谈谈。</p>
<p>　　请在莫斯科为他安排过得去的物质条件。此事请叶努基泽办理。请尽力办到。</p>
<p>　　致共产主义的敬礼！</p>
<p>　　列宁</p>
<p>　　载于1932年《列宁文集》俄文版第20卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第36页
</p>
