<h1>
35.给图拉、阿列克辛、塔鲁萨和科洛姆纳县劳动委员会的电报　</h1>
<p class="date">（10月6日）</p>
<p>
　　图拉、阿列克辛、塔鲁萨和科洛姆纳</p>
<p>　　县劳动委员会</p>
<p>　　兹命令立即招募20名抹灰工并把他们派到卡希拉参加卡希拉电站的建筑工作。请报告执行情况。</p>
<p>　　人民委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第344页
</p>
