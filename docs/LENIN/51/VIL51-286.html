<h1>
374.致瓦·亚·斯莫尔亚尼诺夫</h1>
<p class="date">（不晚于9月17日）</p>
<p>　　斯莫尔亚尼诺夫同志：</p>
<p>　　责成您，如您要离开，则责成尼·彼·哥尔布诺夫，根据人民委员会和劳动国防委员会的文件在最短期内写一份材料，列出就挖掘机问题作出和制定的</p>
<p>　　措施、</p>
<p>　　命令、</p>
<p>　　决议。<sup><a href="#z304" id="zref304"><b>304</b></a></sup></p>
<p>　　劳动国防委员会主席　列宁</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第199页
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref304" id="z304"><b>304</b></a>
由劳动国防委员会办公厅主任助理贝·亨·扎克斯写的关于挖掘机问题的材料，于1921年9月26日送交列宁。——338。<br>
</p>
