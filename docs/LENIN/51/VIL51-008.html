8.致鲁勉采夫博物院　</h1>
<p class="date">（6月28日）</p>
<p>
　　请把黑格尔《逻辑学》一书借给我暂时用一下。现派自行车兵拉丘金同志前去取书。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1940年1月20日《汽笛报》第16号</p>
