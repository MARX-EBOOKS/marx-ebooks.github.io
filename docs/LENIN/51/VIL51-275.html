<h1>
358.致伊·色·色诺芬托夫</h1>
<p class="date-l">　　1921年9月13日</p>
<p>　　色诺芬托夫同志：请马上检查一下</p>
<p>　　给罗蒙诺索夫的电报发了没有？<sup><a href="#z294" id="zref294"><b>294</b></a></sup></p>
<p>　　是怎样写的？（请把副本送我）</p>
<p>　　究竟是何时发的？</p>
<p>　　请对方火速回答，是否收到，何时收到（电复）。</p>
<p>　　致共产主义的敬礼！</p>
<p>　　列宁</p>
<p>　　译自《列宁文集》俄文版第38卷第392页
</p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref294" id="z294"><b>294</b></a> 给在伦敦的尤·弗·罗蒙诺索夫的电报于同一天发出（见本卷第359号文献）。——325。</div></aside></body>
