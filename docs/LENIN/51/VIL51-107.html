<h1>
131.致格·瓦·契切林　</h1>
<div class="date">（7月25日）</div>
　　契切林同志：应提请组织局通过（并由政治局批准）大致如下的决定：
<p>　　（1）委托美舍利亚科夫抓紧；</p>
<p>　　（2）指定一个负责人，负责迅速印刷；</p>
<p>　　（3）给报刊指示；</p>
<p>　　（4）委托舍印曼抓紧；</p>
<p>　　（5）委托叶努基泽对所有这些问题负责。</p>
<p>　　致共产主义的敬礼！</p>
<p>　　列宁</p>
<p>　　7月25日</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第64页
</p>
