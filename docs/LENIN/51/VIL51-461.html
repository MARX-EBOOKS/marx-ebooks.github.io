<h1>
15　给燃料总管理局的电话<sup><a href="#z486" id="zref486"><b>486</b></a></sup></h1>
<p>　　燃料总管理局</p>
<p>　　1921年8月12日</p>
<p>　　命令你们在一周内给梅舍格铸铁厂运送1000普特焦炭，供铸造卡希拉工程急需的铸件之用。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1930年1月21日《工人报》第17号</p>
<p>　　译自《列宁全集》俄文第5版第53卷第336页
</p>
