<h1>
29.给燃料总管理局的电话</h1>
<p class="date">（9月27日）</p>
<p>
　　燃料总管理局</p>
<p>　　命令你们火速给卡希拉工程局供应1000普特焦炭。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　1921年9月27日</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第342页
</p>
