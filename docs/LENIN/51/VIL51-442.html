<h1>592.致约·斯·温什利赫特</h1>
<p class="date">（11月2日）</p>
<p>　　致温什利赫特同志</p>
<p>　　据劳动国防委员会得到的消息，卡希拉工程局从国外进口的设备被堆置在莫斯科海关。<sup><a href="#442-bz1" id="442-bzref1">FN1</a></sup></p>
<p>　　此事已由斯莫尔亚尼诺夫同志转全俄肃反委员会经济部作为今年10月19日第14717号案件进行调查。</p>
<p>　　请下令严查。</p>
<p>　　结果请报劳动国防委员会办公厅。</p>
<p>　　劳动国防委员会主席</p>
<p>　　弗·乌里扬诺夫（列宁）</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第320页
</p>
