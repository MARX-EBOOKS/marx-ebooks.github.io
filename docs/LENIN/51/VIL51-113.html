<h1>138.致米·马·鲍罗廷</h1>
<p class="date">（7月26日）</p>
<p>
　　致鲍罗廷同志</p>
<p>　　鲍罗廷同志：您写的东西很有意思。我看您应当（正如您自己所设想的那样）把它加工成一篇文章供《共产国际》杂志发表，或者写成一本小册子。</p>
<p>　　收集全部材料。去掉同共产党人的论战。写成阐述性的，而不是论战性的，那就十分有用了。<sup><a href="#113-bz1" id="113-bzref1">FN1</a></sup></p>
<p>　　致共产主义的敬礼！</p>
<p>　　列宁</p>
<p>　　7月26日</p>
<p>　　载于1959年《列宁文集》俄文版第36卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第68—69页
</p>

</p>
