<h1>23.给科洛姆纳厂的电报</h1>
<p class="date">（9月7日）</p>
<p>
　　急</p>
<p>　　戈卢特维诺站　科洛姆纳厂　叶列宁同志</p>
<p>　　抄送：加肯工程师</p>
<p>　　卡希拉　卡希拉工程局</p>
<p>　　鉴于卡希拉电站工程的施工亟待完成，命令突击加班完成该工程的全部订货。请报告执行情况。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第339页
</p>
