<h1>
18.给尼·尼·瓦什科夫的电话<sup><a href="#z489" id="zref489"><b>489</b></a></sup></h1>
<p class="date">（8月22日）</p>
<p>　　最高国民经济委员会电力局　瓦什科夫</p>
<p>　　为了把电流从科茹霍沃变电站输送至市内，您采取了哪些措施，请速告。</p>
<p>　　人民委员会主席　列宁</p>
<p>　　载于1933年《列宁文集》俄文版第23卷</p>
<p>　　译自《列宁全集》俄文第5版第53卷第337页
</p>
