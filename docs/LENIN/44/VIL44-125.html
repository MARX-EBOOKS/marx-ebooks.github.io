<h1>
191.致亚·尼·波特列索夫　</h1>
<p class="date">1903年1月27日</p>
<p>
　　关于邦契的信收到了，明天就转给列·格·。看来，除了邦契这个“人物”（大婶认为他的人品极为差劲）之外，我们从“清理”中真是一无所获，也丝毫没有“沾光”。根据《生活》杂志第6期判断，一切都掌握在库克林先生手中。</p>
<p>　　伯尔尼在等着尤利去——这是我们得到的最新消息。</p>
<p>　　祝一切都好！</p>
<p>　　列宁</p>
<p>　　从伦敦发往蒙特勒（瑞士）</p>
<p>　　载于1930年《列宁文集》俄文版第13卷</p>
<p>　　译自《列宁全集》俄文第5版第46卷第260页
</p>
