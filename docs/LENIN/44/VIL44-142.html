<h1>236.致格·瓦·普列汉诺夫</h1>
<p class="date">1903年11月14日</p>
<p>
　　尊敬的格奥尔吉·瓦连廷诺维奇：</p>
<p>　　今天我妻子在寄新材料时已把各项事情详细地写信告诉您了。</p>
<p>　　我已着手写那篇土地问题的文章<sup><a href="#142-z372" id="142-zref372"><b>372</b></a></sup>。我想大约在星期二可以写完。</p>
<p>　　忠实于您的　弗·乌里扬诺夫</p>
<p>　　从日内瓦发往洛桑</p>
<p>　　载于1928年《“劳动解放社”文集》第6辑</p>
<p>　　译自《列宁全集》俄文第5版第46卷第325页
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#142-zref372" id="142-z372"><b>372</b></a> 指《民粹派化的资产阶级和惊慌失措的民粹派》一文（见《列宁全集》第2版第8卷第72—80页）。——396。<br>
</p>
