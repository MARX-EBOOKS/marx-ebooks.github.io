<body> <h6 class="h7" id="h97-1"> b. Praktische Philosophie </h6> <p>Zur Philosophie des Geistes ist jedoch auch das Praktische zu <i>rechnen</i>. Hieraus bestimmt sich schon der Begriff des Praktischen überhaupt, - der Wille. Dies hat Aristoteles in mehreren Werken behandelt, die wir besitzen. </p>
