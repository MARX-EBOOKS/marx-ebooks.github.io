<body> <h5 id="h22-1"> D. </h5> <p>Die Gottheit - die Macht, die Rechte, die die Vernunft erteilt hat, auszuführen, geltend zu machen, durch diese Bestimmung muß die Erkenntnis aller anderen Eigenschaften derselben bestimmt sein. <a id="s1-103"></a></p>
