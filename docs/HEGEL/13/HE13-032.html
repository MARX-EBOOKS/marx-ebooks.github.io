<body> <h3 id="h32-1"> Drittes Kapitel: Das Kunstschöne oder das Ideal </h3> <p>In Rücksicht auf das Kunstschöne haben wir drei Hauptseiten zu betrachten:</p>
<p><i>erstens</i> das Ideal als solches, </p>
<p><i>zweitens</i> die Bestimmtheit desselben als Kunstwerk, </p>
<p><i>drittens</i> die hervorbringende Subjektivität des Künstlers. </p>
