<p id="an2000917785X"></p><h3 id="h64-1">B. Spezifizierendes Maß</h3>
<p>Dasselbe ist</p>
<p><i>erstlich</i> eine Regel, ein Maß äußerlich gegen das bloße Quantum;</p>
<p><i>zweitens</i> spezifische Quantität, welche das äußerliche Quantum bestimmt; <i><a id="S398"></a> drittens</i> verhalten sich <i>beide Seiten</i> als <i>Qualitäten</i> von spezifischer Quantitätsbestimmtheit gegeneinander als <i>ein</i> Maß.<a id="S399"></a></p>
