<body> <h6 id="h19-1"> Dritter Abschnitt<br> Ideenlehre </h6> <p class="h6para">§ 84</p>
<p>Die Idee ist der adäquate Begriff, in welchem die Objektivität und Subjektivität gleich ist oder das Dasein dem Begriff als solchem entspricht. Sie faßt das wahrhafte Selbstleben in sich. Die Idee ist teils Leben, teils Erkennen, teils Wissenschaft. <a id="s4-29"></a></p>
