<body> <h5 id="h110-1"> Zweiter Teil<br> Das Wesen </h5> <p class="h6para">§ 33 [33]</p>
<p>Das Wesen ist das aus seiner Unmittelbarkeit in sich zurückgenommene Sein, dessen Bestimmungen in einfacher Einheit aufgehoben sind. </p>
