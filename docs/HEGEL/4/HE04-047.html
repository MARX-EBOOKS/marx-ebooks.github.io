<body> <h5 id="h47-1"> [Zweiter Ansatz]<br> Geisteslehre </h5> <h6 id="h47-2"> Bewußtsein[s]- und Seelenlehre </h6> <p>I. Der Geist nach den verschiedenen Arten seines <i>Gegenstandes</i>; II. nach den verschiedenen Arten seiner <i>Tätigkeit</i>. </p>
<p>I. Von den Arten des Bewußtseins.</p>
<p>II. Von den Arten der inneren Tätigkeit des Geistes.</p>
