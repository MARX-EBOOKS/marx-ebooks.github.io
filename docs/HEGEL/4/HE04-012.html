<body> <h6 class="h8" id="h12-1"> 3. Wechselwirkung </h6> <p class="h6para">§ 53</p>
<p>Die Substanz ist daher als Ursache nur auf und in sich selbst tätig und steht nur in Wechselwirkung mit sich, oder sie ist das Allgemeine. <a id="S4-21"></a></p>
