<body> <h6 class="h7" id="h35-1"> III. Das Denken </h6> <p class="h6para">§ 163</p>
<p>Das Denken ist die Tätigkeit des Geistes in seiner unabhängigen, sich selbst gleichen Einfachheit, welche <i>aus</i> und <i>in sich</i> <a id="s4-53"></a> <i>selbst</i> Bestimmungen setzt, die den Charakter der Sichselbstgleichheit und Allgemeinheit haben. </p>
