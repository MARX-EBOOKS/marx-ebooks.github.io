<body> <h6 id="h99-1"> II. Idee der Erkenntnis und des Guten </h6> <p class="h6para">§ 70</p>
<p>In dieser Idee tritt der Begriff und die Wirklichkeit auseinander. Jener einerseits, für sich leer, soll seine Bestimmung und Erfüllung von der Wirklichkeit, andererseits [soll] diese aus der selbständigen Bestimmung von jenem ihre Bestimmung erhalten. </p>
