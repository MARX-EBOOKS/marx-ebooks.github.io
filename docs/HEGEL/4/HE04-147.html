<body> <h6 id="h147-1"> Religionslehre </h6> <p>I. Sein Gottes; alle Dinge [gehen] in ihn zurück und aus ihm hervor - Grund ist die Wahrheit - [dem] steht die sinnliche Denkart entgegen. </p>
<p>II. Begriff. Sein.</p>
<p>III. Seine Gestalt, Religion.</p>
