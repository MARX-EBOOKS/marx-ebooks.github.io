<h1>阿穆塞特炮</h1>
<p>　　<b>阿穆塞特炮</b>——一种过去在山地使用的发射一磅重圆形炮弹的轻型小炮，这种小炮曾受到萨克斯元帅的高度评价，但是现在已经完全不使用了。</p>
