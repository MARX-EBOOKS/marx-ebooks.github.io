<h1>
马克思致恩格斯
</h1>  
<div align="right" class="quote">
曼彻斯特<br>
1862年11月20日[于伦敦]<br>
</div>
亲爱的恩格斯：<br>
<p>　　十英镑银行券的前半截已经收到，<b>衷心感谢</b>，为此赶忙通知你。</p>
<p>　　要是墨西哥人（“最下等的人”！）把癞蛤蟆<sup><a href="#170-bz1" id="170-bzref1">FN1</a></sup>再揍一顿就好了，而这些狗东西——假激进资产者——现在甚至在巴黎谈起“旗帜的荣誉”来了！</p>
<p>　　如果斯宾斯在小战争中赢不了北部人，那末什么也无济于事；甚至连麦克累伦的拙劣的军事艺术也帮不了忙！</p>
<p>　　祝好。</p>
<div align="right">你的　<b>卡·马·</b></div>

<p class="footnote">
<span class="style2"><b>脚  注</b></span><br><br>
<a href="#170-bzref1" id="170-bz1">FN1</a> 法国人。——编者注<br>
</p>
