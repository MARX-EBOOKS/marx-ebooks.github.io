<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1862年11月20日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　十英镑银行券的前半截已经收到，<b>衷心感谢</b>，为此赶忙通知你。</p>
<p>　　要是墨西哥人（“最下等的人”！）把癞蛤蟆<sup><a href="#bz1" id="bzref1">FN1</a></sup>再揍一顿就好了，而这些狗东西——假激进资产者——现在甚至在巴黎谈起“旗帜的荣誉”来了！</p>
<p>　　如果斯宾斯在小战争中赢不了北部人，那末什么也无济于事；甚至连麦克累伦的拙劣的军事艺术也帮不了忙！</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 法国人。——编者注<br>
</p>
