<h1>马克思致世界工业博览会理事</h1>
<table class="add rt"><tbody>
<tr><td>
威廉·什瓦尔茨<br>
伦敦<br>
1862年8月19日于伦敦西北区哈佛斯托克小山梅特兰公园路格拉弗顿坊9号<br>
</td></tr></tbody></table>
<p>阁下：</p>
<p>　　本人是维也纳<b>《新闻报》驻伦敦通讯员</b>，特请惠寄一张采访证，以便参观博览会。</p>
<p>　　一个月以前，《新闻报》编辑部已约请我撰写几篇关于博览会的<b>一般</b>报道，但因其他事务缠身，只有现在才能着手做这件事。<sup><a href="#z566" id="zref566"><b>566</b></a></sup></p>
<p class="sign">忠实于阁下的　<b>卡尔·马克思</b>博士</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref566" id="z566"><b>566</b></a> 伦敦世界工业博览会理事会为答复这封信而于1862年8月27日给了马克思一张长期出入证，使他可以以《新闻报》通讯员身分自由采访博览会。——第629页。<br>
</p>
