<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1860年9月13日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　只要有任何可能，希望你在星期六以前寄一篇文章来。</p>
<p>　　附上戚美尔曼对我提出的问题<sup><a href="#056-bz1" id="056-bzref1">FN1</a></sup>所作的法律上的结论（你要在下星期<b>寄还</b>给我）。</p>
<p>　　此外，为了消遣，将埃卡留斯交给我的一封信抄寄给你。</p>
<p class="rt">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#056-bzref1" id="056-bz1">FN1</a> 见本卷第84页。——编者注<br>
</p>
