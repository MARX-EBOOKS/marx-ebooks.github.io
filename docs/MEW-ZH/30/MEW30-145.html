<h1>
马克思致恩格斯
</h1><br>  
<div align="right" class="quote">
曼彻斯特<br>
<p>  [1862年]7月21日[于伦敦]</p>
</div><br>
亲爱的恩格斯：<br>
<p>  到弗莱里格拉特那里去过了，<b>一切都顺利</b>。</p>
<p>  伊戚希<sup><a href="#145-bz1" id="145-bzref1">FN1</a></sup>——他的虚荣一定使你发笑——下星期走。你有可能，就星期五来。莱茵哈特昨天也来过了，他已经做了商人。</p>
<p>  祝好。</p>
<div align="right">你的　<b>卡·马·</b></div><br>
<p>  你对于麦克累伦有什么看法？</p>
<br>

<p class="quote">
<span class="style2"><b>脚  注</b></span><br><br>
<a href="#145-bzref1" id="145-bz1">FN1</a> 拉萨尔。——编者注<br>
</p>
