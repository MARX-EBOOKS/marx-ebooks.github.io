<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
　　[1862年]7月21日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　到弗莱里格拉特那里去过了，<b>一切都顺利</b>。</p>
<p>　　伊戚希<sup><a href="#145-bz1" id="145-bzref1">FN1</a></sup>——他的虚荣一定使你发笑——下星期走。你有可能，就星期五来。莱茵哈特昨天也来过了，他已经做了商人。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>
<p>　　你对于麦克累伦有什么看法？</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#145-bzref1" id="145-bz1">FN1</a> 拉萨尔。——编者注<br>
</p>
