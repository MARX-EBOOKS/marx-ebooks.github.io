<h1>马克思致贝尔塔兰·瑟美列</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1860年]11月21日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的瑟美列：</p>
<p>　　由于我的妻子患很重的病（<b>神经热</b>），我没能在星期日同您会面，也没能在那以后的某一天去拜访您。波克罕先生告诉我，他在上星期日见到了您。</p>
<p>　　《<b>奥格斯堡报</b>》<sup><a href="#bz1" id="bzref1">FN1</a></sup>上提到您的那篇文章，是住在我附近的一个朋友比斯康普博士写的。</p>
<p>　　我的妻子和我向您致良好的祝愿。</p>
<p class="sign">忠实于您的　<b>卡·马克思</b></p>
<p>　　11月18日的《<b>星期日邮报</b>》杂志刊登了一封注明“<b>1860年11月14日于维也纳</b>”的信，这封信完全是按您的公开声明的精神写的。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 《总汇报》。——编者注<br>
</p>
