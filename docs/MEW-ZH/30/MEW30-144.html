<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
　　[1862年]7月11日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　拉萨尔来这里已经两天了；他打算在这里逗留几个星期。你必须到这里来住几天，因为你和沃尔弗收到他的著作后一直没有给他写信，他本来就很“委屈”。况且你原来也打算到这里来参观几天博览会。</p>
<p>　　因我正紧张写书<sup><a href="#bz1" id="bzref1">FN1</a></sup>，就写这寥寥数笔。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 见本卷第251页。——编者注<br>
</p>
