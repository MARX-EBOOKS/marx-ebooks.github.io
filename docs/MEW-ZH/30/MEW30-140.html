<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
　　[1862年6月6日左右于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　现在才告诉你两英镑已经收到，请原谅。这个星期缠得我完全抽不出时间。房东和其他半打魔鬼把我折腾坏了。</p>
<p>　　附上拉萨尔写的书<sup><a href="#bz1" id="bzref1">FN1</a></sup>两本（一本给你，一本给鲁普斯）。对书的意见望告诉我。</p>
<p>　　接到施特芬来信，回信以后，日内就把信寄给你。他在波士顿。看来情绪很不好。魏德迈被提升为陆军中校。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 斐·拉萨尔：《文学史家尤利安·施米特先生》。——编者注</div></aside>
