<h1>马克思致恩格斯</h1>
<div align="right" class="quote">
曼彻斯特<br>
　　[1860年]7月21日[于伦敦]</div>
<p>亲爱的恩格斯：</p>
<p>　　帕麦斯顿将于星期一晚上提出关于英国防御工事的提案；这是一个大骗局。如果你能在星期三以前（因为我要在星期三把这篇东西<b>从这里</b>寄出）就这件事给我为《<b>论坛报</b>》写一篇短文<sup><a href="#046-bz1" id="046-bzref1">FN1</a></sup>，那就太好了。</p>
<p>　　祝好。</p>
<div align="right">你的　<b>卡·马·</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#046-bzref1" id="046-bz1">FN1</a> 弗·恩格斯《不列颠的国防》。——编者注<br>
</p>
