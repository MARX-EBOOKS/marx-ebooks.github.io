<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1862年8月12日左右于曼彻斯特]</td></tr></tbody></table>
<p>　　附上智者男爵<sup><a href="#bz1" id="bzref1">FN1</a></sup>名下的期票一张。<b>你必须</b>写信通知他签字日期，支付日期，并告诉他，到期将收到钱，但期票要延期到1月1日，那时我再付给他十五英镑的差额。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<p class="ct"><b>[马克思的附注]</b></p>
<p>　　1862年8月12日签字（期限三个月）。1862年8月12日</p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 拉萨尔。——编者注</div></aside>
