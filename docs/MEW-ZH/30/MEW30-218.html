<h1>马克思致恩格斯(1864年5月23日)</h1>
<p class="rt">曼彻斯特</p>
<h4 id="h218-0" style="text-align: center"><u>领取威廉·沃尔弗遗赠的遗产的委托书</u><sup><a href="#218-bz1" id="218-bzref1">FN1</a></sup></h4>
<div class="ct"></div>
<p class="sign">1864年5月23日于伦敦西北区哈佛斯托克小山梅特兰公园路莫丹那别墅1号</p>
<p>　　兹委托您，作为我的全权代表，采取一切必要的步骤，来执行我们共同的朋友威廉·沃尔弗的遗志。</p>
<p class="sign"><b>哲学博士　卡尔·马克思</b></p>
<center><b>[在信封上写的是]</b></center><br>
<p>　　<b>曼彻斯特</b>牛津街特隆克利夫小林坊6号</p>
<p>　　弗里德里希·恩格斯先生收</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#218-bzref1" id="218-bz1">FN1</a> 见本卷第652―657页。——编者注<br>
</p>
