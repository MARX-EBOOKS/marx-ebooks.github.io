<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1861年]12月5日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　由于有很多麻烦事，没有及早给你回信。我妻子病很重。我今天晚上给你写信，因为白天要写文章。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>
