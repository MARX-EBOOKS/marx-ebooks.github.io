<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1869年8月16日于曼彻斯特<br>
</td></tr></tbody></table>
<p>亲爱的摩尔：</p>
<p>　　昨天晚上我收到电报，说我母亲星期三晚上才能去奥斯坦德。因为我现在要等家里一封更详细说明情况的信，还因为其他原因，我明天还得留在这里，所以我今天打电报告诉你，我只能星期三来。我还担心，如果那时拉法格一家来了，那我就不能在你那个本来已有人满之患的家里住宿，如果是这样，我想知道你家附近有没有可以安身的地方。</p>
<p>　　杜西的牙拔掉了。医生断定，三个牙根中有一个发了炎，所以只好拔掉。现在已经不疼了。</p>
<p>　　我打算乘中央铁路公司三点三十分的车。火车到达伦敦的时间是八点五十分。</p>
<p>　　致良好的祝愿。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
</body>
