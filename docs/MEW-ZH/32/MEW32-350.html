<h1>马克思致路德维希·库格曼</h1>
<table class="add rt"><tbody>
<tr><td>
汉诺威<br>
1869年10月12日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的库格曼：</p>
<p>　　匆匆写几行，因为小杜西和恩格斯刚刚来到。你从这封短信可以知道，我们昨天白天已顺利到达英国。</p>
<p>　　我们在海上和陆地都有一些奇遇，小燕妮会写信详告。</p>
<p>　　谨向全家衷心问好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p>　　特别向伯爵夫人和小猫头鹰<sup><a href="#bz1" id="bzref1">FN1</a></sup>问好。恩格斯、拉法格、马克思夫人等也向她们问好。小家伙<sup><a href="#bz2" id="bzref2">FN2</a></sup>又好些了。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 库格曼的夫人盖尔特鲁黛和女儿弗兰契斯卡。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 沙尔·埃蒂耶纳·拉法格。——编者注<br>
</p>
