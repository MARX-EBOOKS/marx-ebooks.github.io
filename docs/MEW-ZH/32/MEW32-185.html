<h1>马克思致恩格斯</h1>
<div align="right" class="quote">
曼彻斯特<br>
1869年5月1日[于伦敦]</div>
<p>亲爱的弗雷德：</p>
<p>　　这里附上给我们比利时书记<sup><a href="#185-bz1" id="185-bzref1">FN1</a></sup>的一封信，你看了随信附上的法国人支部的机关报《蟋蟀报》，就会看懂这封信；布鲁塞尔按照法国人支部的榜样成立了一个支部，日内瓦也成立了一个（未来委员会），总共有几十个人在皮阿的领导之下。</p>
<p>　　我的妻子还是病得很厉害，但是她仍然认为，她星期二可以去巴黎。</p>
<p>　　我又是在托马斯<sup><a href="#185-bz2" id="185-bzref2">FN2</a></sup>的鸣声之前，即在邮局就要关门之前给你写信。但愿明天我终于能给你写得详细些。</p>
<p>　　祝好。</p><div align="right">你的　<b>卡·马·</b></div>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#185-bzref1" id="185-bz1">FN1</a> 贝尔纳。——编者注<br>
<a href="#185-bzref2" id="185-bz2">FN2</a> 大概指伦敦韦斯明斯特钟楼的钟。——编者注<br>
</p>
