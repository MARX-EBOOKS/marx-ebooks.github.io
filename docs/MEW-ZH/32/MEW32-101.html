<h1>
恩格斯致马克思
</h1>
<div align="right" class="quote">
伦敦<br>
1868年10月6日于曼彻斯特</div>
亲爱的摩尔：<br>
<p>　　附上列斯纳的信、账单和五英镑。我将设法至少使<b>这些</b>账陆续还清。</p>
<p>　　其他东西我还没有来得及看，因为今天忙得要命。明天把信件寄还给你。</p>
<p>　　向你的夫人和女孩子们，也向拉法格致良好的祝愿。</p><div align="right">你的　<b>弗·恩·</b></div>
