<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1868年7月14日<sup><a href="#bz1" id="bzref1">FN1</a></sup>于曼彻斯特<br>
</td></tr></tbody></table>
<p>亲爱的摩尔：</p>
<p>　　再寄上五英镑银行券两张：S/K92566和93517，曼彻斯特，1867年1月14日。</p>
<p>　　我不知道文章是否来得及写好。星期天吃饭的时候，我左眼结膜的微血管破了，从那时起眼睛便很敏感，因此我现在完全不能在灯光下写字；不过我想很快就会好的。</p>
<p>　　别忘了订四五十份《双周》上发表的文章的<b>单印本</b><sup><a href="#bz2" id="bzref2">FN2</a></sup>，我们好广泛散发。</p>
<p>　　致良好的祝愿。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>

</p>
