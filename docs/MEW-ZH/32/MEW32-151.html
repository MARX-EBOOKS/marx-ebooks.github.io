<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1869年2月15日[于伦敦]</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　随信附上威斯特伯立债务事件的材料等等。小书你可以留下，附上的英文信请务必寄还。我告诉过波克罕，我需要为一个<b>在荷兰的熟人</b>打听些情况。</p>
<p>　　不要忘记把福斯特的《对外汇兑》<sup><a href="#151-bz1" id="151-bzref1">FN1</a></sup>尽快给我寄来。我读完后立即归还。这里弄不到这本书。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#151-bzref1" id="151-bz1">FN1</a> 约·莱·福斯特《商业汇兑原则概论》。——编者注<br>
</p>
