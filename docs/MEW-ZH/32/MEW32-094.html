<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1868年9月25日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　你能否在星期六早晨以前给我寄五英镑来？一个商人刚才来我这里说，他正面临破产，如果星期六以前弄不到一定数量的款项给他的债权人，他就要遭受巨大损失。</p>
<p class="rt">你的　<b>卡·马·</b></p>
