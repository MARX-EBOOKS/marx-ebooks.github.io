<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1868年6月24日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　很遗憾，现已确诊，两个女孩患的都是猩红热，而小杜西患的还是恶性的。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>
