<h1>
马克思致恩格斯
</h1>
<div align="right" class="quote">
曼彻斯特<br>
1868年6月24日于伦敦</div>
亲爱的弗雷德：<br>
<p>　　很遗憾，现已确诊，两个女孩患的都是猩红热，而小杜西患的还是恶性的。</p>
<p>　　祝好。</p><div align="right">你的　<b>卡·马·</b></div>
