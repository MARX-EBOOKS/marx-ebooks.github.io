<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1869年4月7日[于伦敦]</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　附上小威廉的信。阅后请寄回。关于《农民战争》，我应该怎样给他写回信？</p>
<p>　　施特龙刚刚来到。好吧，再见。</p>
<p class="rt">你的　<b>卡·马·</b></p>
