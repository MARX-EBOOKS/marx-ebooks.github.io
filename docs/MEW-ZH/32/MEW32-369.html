<h1>马克思致路德维希·库格曼</h1>
<div align="right" class="quote">
汉诺威<br>
[1870年5月5日左右于伦敦]</div>
亲爱的库格曼：<br>
<p>　　讨厌的咳嗽使我目前不能写信，因此只能在此对你寄来的美好的生日礼物表示衷心的感谢。<sup><a href="#369-bz1" id="369-bzref1">FN1</a></sup></p><div align="right">　　忠实于你的　<b>卡尔·马克思</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#369-bzref1" id="369-bz1">FN1</a> 见本卷第489页。——编者注<br>
</p>
