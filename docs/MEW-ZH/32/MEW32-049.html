<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>曼彻斯特<br>
1868年5月27日于伦敦</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　二十五英镑收到，谢谢。</p>
<p>　　我将于星期五十一点三十分从金兹-克罗斯出发。</p>
<p>　　祝好。</p>
<p class="rt">你的  <b>卡·马·</b></p>
