<h1>
马克思致恩格斯
</h1><br>  
<div align="right" class="quote">曼彻斯特<br>
1868年5月27日于伦敦</div><br>
亲爱的弗雷德：<br>
<p>二十五英镑收到，谢谢。</p>
<p>我将于星期五十一点三十分从金兹-克罗斯出发。</p>
<p>祝好。</p>
<div align="right">你的<p><b>卡·马·</b></p></div>
