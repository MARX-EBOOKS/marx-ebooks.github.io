<h1>辟谣</h1>
<p>　　杜蒙先生的<b>文化流氓无产阶级</b>以最动人的消极抵抗态度对待“新莱茵报”给它的所有闷棍，以“新莱茵报”编辑所<b>没有</b>写过的文章为凭向警察告发他们，企图以此来进行报复。于是，根据12月25日的“科伦日报”，<b>弗莱里格拉特</b>便成了纽约出版的“德意志快邮报”上那篇科伦通讯的作者，<b>因此</b>他也就参加了11月3日为祝贺“科伦日报”老板们而举办的虚嚣乐会。“科伦日报”的编辑显然是不甘心让“<b>马尔泰泽</b>”专美于前的。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
