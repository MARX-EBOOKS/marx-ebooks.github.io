<h1>马克思致燕妮·龙格<sup><a href="#z210" id="zref210"><b>210</b></a></sup></h1>
<p class="ct"><b>阿尔让台</b></p>
<table class="rt"><tbody><tr><td>
　　1881年8月20日于伦敦<br>
　　西北区梅特兰公园路41号<br>
</td></tr></tbody></table>
<p>我亲爱的：</p>
<p>　　上面歪歪曲曲潦草的字你大概看不清楚写了些什么<sup><a href="#bz1" id="bzref1">FN1</a></sup>。但重要的是：妈妈和海伦昨晚顺利到达了。</p>
<table class="src rt"><tbody><tr><td>

</td></tr></tbody></table>

<span class="style2">注　　释</span><br><br>
<a href="#zref210" id="z210"><b>210</b></a> 这封短信马克思写在1881年8月20日他的夫人给女儿燕妮·龙格的信的末尾（见本卷第528―529页）。——第478页。<br>
</p>
