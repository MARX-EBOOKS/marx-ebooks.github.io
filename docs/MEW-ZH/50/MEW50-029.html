<h1>
致伦敦德意志工人共产主义教育协会委员会
</h1><br>  
<div align="right" class="quote">
<p>[18]91年12月1日[于伦敦]</p>
<p>瑞琴特公园路122号</p>
</div><br>
<p>我衷心感谢你们为我七十一岁生日给我的贺信。</p>
<p>致以真诚的敬礼</p>
