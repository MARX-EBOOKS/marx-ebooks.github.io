<h1>恩格斯致保尔·辛格尔<sup><a href="#z234" id="zref234"><b>234</b></a></sup></h1>
<p class="ct"><b>柏林</b></p>
<p>[<b>片断</b>]</p>
<p class="sign">[1894年12月26日和29日之间于伦敦]</p>
<p>　　其实，你们的条件是非常有利的。如果英国工人能够成立劳动介绍所，责成资产者或者在仲裁法庭上为自己拒绝录用工人辩护，或者录用工人，那末他们会高兴得跳得比圣保罗大教堂还高。</p>

载于1895年1月1日第1号《前进报。柏林人民报》<br>
