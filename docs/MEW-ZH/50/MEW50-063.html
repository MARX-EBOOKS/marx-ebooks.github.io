<h1>马克思致爱德华·瓦扬</h1>
<p class="ct"><b>伦敦</b></p>
<p class="sign">[18]72年4月4日[于伦敦]</p>
<p>亲爱的瓦扬：</p>
<p>　　明晚7时等您来吃饭；还有……<sup><a href="#bz1" id="bzref1">FN1</a></sup>和几位朋友。</p>
<p class="sign">永远是您的　<b>卡尔·马克思</b></p>
<p>　　如果您把维尔塔尔的书<sup><a href="#bz2" id="bzref2">FN2</a></sup>借给我（我不知道书名），就非常感谢您了。书中有我们关于法国内战的宣言<sup><a href="#bz3" id="bzref3">FN3</a></sup>的法译文。</p>
<table class="src rt"><tbody><tr><td>
第一次用原文发表于1927年《社会史国际评论》第17卷第1―2部分<br>
原文是法文<br>
</td></tr></tbody></table>
