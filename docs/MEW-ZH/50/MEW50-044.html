<h1>
马克思致爱德华·弥勒－捷列林格
</h1>
<p>　　
<center><b>布勒斯劳</b></center></p>
<div align="right">　　1849年5月6日于汉堡</div>
亲爱的捷列林格：<br>
<p>　　兹向您介绍持信人、我们在德国的重要鼓动家之一布龙先生。</p>
<div align="right"><table border="0" cellpadding="0" cellspacing="0"><tr><td style="line-height: 200%">
　　完全忠实于您的　<b>卡尔·马克思</b>博士<br>
第一次发表于1974年《史学杂志》第4期<br>
原文是德文<br>
</td></tr></table></div>
