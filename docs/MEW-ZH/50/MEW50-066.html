<h1>恩格斯致“施马尔特”公司</h1>
<p class="ct"><b>莱斯特</b><br>
<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p>[<b>草稿</b>]</p>
<p class="sign">[1872年7月3日于伦敦]</p>
<p>　　格[拉泽]先生是个非常可敬的人，在布鲁塞尔很有名气，所以我相信，您会发现他在商务上永远是一个非常正派和讲信誉的人。据我所知，他没有丧失资产，假如我必须同他共事，我会毫不犹豫地给他开立一二百镑以内的信贷帐户。</p>
<table class="src rt"><tbody><tr><td>
第一次发表于《马克思恩格斯全集》俄文第2版第50卷<br>
原文是英文<br>
</td></tr></tbody></table>

</p>
