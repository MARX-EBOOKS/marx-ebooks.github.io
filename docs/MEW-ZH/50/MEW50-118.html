<h1>恩格斯致阿德尔海德·德沃夏克和尤利乌斯·波普</h1>
<p>　　
<center><b>维也纳</b></center></p>
<p class="rt">[1894年2月于伦敦]</p>
<p>　　请您们，亲爱的阿德尔海德和波普，接受我的衷心的祝贺<sup><a href="#120-z232" id="120-zref232"><b>232</b></a></sup>；在我们周围有的是好榜样，我若不是一匹老跛马，谁晓得，我就不会再套上轭。</p>
<p class="rt">您的　老<b>弗·恩格斯</b></p>
<table class="src rt"><tbody><tr><td>第一次发表于《弗里德里希·恩格斯1820―1970。报告。讨论会。文件》1971年汉诺威版<br>
原文是德文<br>
</td></tr></tbody></table>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#120-zref232" id="120-z232"><b>232</b></a> 恩格斯祝贺阿德尔海德·德沃夏克和尤利乌斯·波普1894年2月初举行婚礼。——第500页。<br>
</p>
