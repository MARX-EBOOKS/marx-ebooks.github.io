<h1>恩格斯致恩玛·恩格斯</h1>
<p>　　
<center><b>圣莫里茨</b></center></p>
<sup><a href="#117-bz1" id="117-bzref1">FN1</a></sup><br>
<div align="right">　　[18]93年8月23日于阿尔普纳赫施达特</div>
<p>亲爱的恩玛：</p>
<p>　　我今天在此地，明天要到伯尔尼高地，一周后返回苏黎世。我希望你们大家在恩格丁健康愉快。</p>
<p>　　向你们大家问好</p>
<center><b>[恩格斯在明信片上亲笔写的地址：]</b></center><br>
<p>　　巴门（恩格耳斯基尔亨）的海尔曼·恩格斯太太</p>
<p>　　贝来维旅馆</p>
<p>　　圣莫里茨恩格丁浴场</p>
<div align="right"><table border="0" cellpadding="0" cellspacing="0" class="quote"><tr><td style="line-height:150%;">
第一次用原文发表于《工人运动史论丛》1979年第1期<br>
原文是德文<br>
</td></tr></table></div>
