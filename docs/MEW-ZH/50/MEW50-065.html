<h1>恩格斯致莫尔斯沃思</h1>
<p class="ct"><b>莱斯特</b></p>
<p>[<b>草稿</b>]</p>
<p class="sign">[1872年6月5日于伦敦]</p>
<p>　　……<sup><a href="#bz1" id="bzref1">FN1</a></sup>格拉泽先生的信誉是完全可以信赖的，我毫不怀疑，您在同他的一切交易活动中总是可以证实此人的品质。至于他的资产，我无法提供任何确切的情况。但是，我完全相信他订货不会超过他的抵偿能力，我会毫不犹豫地向他提供一定数额，比如说100英镑和更多的信贷。我认为，开始时先把您的信贷限制在200英镑，然后随着交易的达成和您对他有了进一步的了解，还可以增加数额，您尽可以放心。</p>
<p>　　假如我处于您的地位，我就这样做。</p>

第一次发表于《马克思恩格斯全集》俄文第2版第50卷<br>
