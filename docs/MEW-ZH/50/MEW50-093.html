<h1>马克思致约翰·斯温顿</h1>
<p class="ct"><b>伦敦</b><br>
<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<table class="rt"><tbody><tr><td>
　　1880年8月15日于兰兹格特<br>
　　坎伯兰路10号<br>
</td></tr></tbody></table>
<p>阁下：</p>
<p>　　今天我刚收到您的信。我同我的家属都在这里，要是您有空到兰兹格特来，我非常高兴。<sup><a href="#z207" id="zref207"><b>207</b></a></sup></p>
<p class="sign">您的真挚的　<b>卡尔·马克思</b></p>
<p class="ct"><b>克思在明信片上亲笔写的地址：]</b></p>
<p>　　伦敦滨河路诺福克街12号</p>
<p>　　约翰·斯温顿先生收</p>
<table class="src rt"><tbody><tr><td>
第一次用原文和日文发表于《马克思〈资本论〉出版经过》1971年东京版<br>
原文是英文<br>
</td></tr></tbody></table>
