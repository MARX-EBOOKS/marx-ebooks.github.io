<h1>马克思致莫雷尔</h1>
<p class="sign">[约1875年秋于伦敦]</p>
<p>莫雷尔先生：</p>
<p>　　请您通过您的邻居泰斯先生告诉我，我交给您的三册《资本论》<sup><a href="#bz1" id="bzref1">FN1</a></sup>情况怎样。</p>
<p>　　祝好</p>
<p class="sign"><b>卡尔·马克思</b></p>
