<h1>马克思致阿舍尔公司<sup><a href="#z164" id="zref164"><b>164</b></a></sup></h1>
<p class="ct"><b>伦敦</b></p>
<p class="sign">[18]72年2月13日[于伦敦]</p>
<p>阁下：</p>
<p>　　随信附上我手头仅有的一份《成立宣言》<sup><a href="#bz1" id="bzref1">FN1</a></sup>。</p>
<p class="sign">忠实于您的　<b>卡尔·马克思</b></p>
<table class="src rt"><tbody><tr><td>
第一次发表于《马克思恩格斯全集》俄文第2版第50卷<br>
原文是英文<br>
</td></tr></tbody></table>

<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 马克思《国际工人协会成立宣言》。——编者注</div></aside>

<div><a href="#zref164" id="z164"><b>164</b></a> 这封信是马克思对阿舍尔公司（在1872年2月12日信中提出的）关于寄一份英文版《国际工人协会成立宣言》的请求的答复。——第440页。<br>　</div></aside>
