<h1>马克思致爱德华·弥勒－捷列林格</h1>
<p>　　
<center><b>布勒斯劳</b></center></p>
<p class="sign">1849年5月6日于汉堡</p>
<p>亲爱的捷列林格：</p>
<p>　　兹向您介绍持信人、我们在德国的重要鼓动家之一布龙先生。</p>
<p class="sign">完全忠实于您的　<b>卡尔·马克思</b>博士</p>
