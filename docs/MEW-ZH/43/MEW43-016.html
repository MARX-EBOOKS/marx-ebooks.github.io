<h1>他的继任者</h1>
<p>　　<b>科伦</b>9月9日。于是，人们就认为有希望成立瓦尔德克―洛贝尔图斯内阁了。我们对此并不相信。国王<sup><a href="#bz1" id="bzref1">FN1</a></sup>很难屈从这些先生们提出的要求，特别是他的科伦之行<sup><a href="#z26" id="zref26"><b>26</b></a></sup>以来更是如此。可见，除了同议会公开决裂、同革命公开决裂，选择拉多维茨和芬克以外，别无他法。——而接着会发生什么，就不必说了。</p>
