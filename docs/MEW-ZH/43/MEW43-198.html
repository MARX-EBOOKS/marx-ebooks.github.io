<h1>警察署长关于拒绝马克思申请取消驱逐其出境的政府命令的通知</h1>
<p>　　巴黎市</p>
<p>　　圣热尔门郊区地段</p>
<p>　　警察署长</p>
<p>　　百合花路普鲁士侨民马克思先生</p>
<p class="sign">　　1849年8月16日于巴黎<br>
圣热尔门郊区地段</p>
<p>先生：</p>
<p>　　为了执行警察局长<sup><a href="#bz1" id="bzref1">FN1</a></sup>先生的命令，我谨通知您：内政部长<sup><a href="#bz2" id="bzref2">FN2</a></sup>先生认为不须批准您要求改变他的决定的申请。因此，我责成您立即离开巴黎，前往摩尔比安省居住。</p>
<p>　　谨致敬意</p>
<p class="rt">圣热尔门郊区地段警察署长<br>
　　　　　　　　　　杜尔朗</p>
