<h1>《新科伦报》编辑部启事</h1>
<p>　　前《新莱茵报》主编卡尔·马克思先生在离开此地以前决定，将现在仍不断寄给《新莱茵报》的通讯，转给《新科伦报》使用。我们谨请各位尊敬的通讯员注意，请把通讯稿直接寄到本报，以节省时间。</p>
<p class="rt"><b>《新科伦报》编辑部</b></p>
<p><table class="src rt"><tr><td>载于1849年6月1日《新科伦报》第124号</td></tr></table></p>
<p>原文是德文</p>
