<h1>*逮捕莫尔的尝试</h1>
<p>　　<b>科伦</b>上午十一时。</p>
<p>　　今晨，第二十九团的一队士兵被派往“伊姆克兰茨”旅馆逮捕莫尔。但士兵被驱退，莫尔在工人们的帮助下已安全隐藏起来。</p>
