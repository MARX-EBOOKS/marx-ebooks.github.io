<h1>259.致鲍列斯拉夫·安东尼·恩捷约夫斯基</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1895年6月28日于伊斯特勃恩市<br>
皇家大校场4号<br>
</td></tr></tbody></table>
<p>尊敬的同志：</p>
<p>　　您今年6月25日来信已转寄此地，对您提出的询问，谨答复如下：我丝毫不反对您将《共和国》周报上刊载的我那篇文章翻译出来并以您所说的形式发表。<sup><a href="#z418" id="zref418"><b>418</b></a></sup></p>
<p>　　致敬意。</p>
<p class="sign"><b>弗·恩格斯</b></p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref418" id="z418"><b>418</b></a> 指恩格斯的文章《工人阶级同波兰有什么关系？》，这篇文章的波兰文译文载于1895年7月《黎明》杂志第7期，标题是《工人阶级和波兰问题》（《Klasa　robotnicza　a　Kwestya　polska》）。——第467页。<br>
</p>
