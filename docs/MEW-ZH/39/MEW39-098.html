<h1>98.致彼得·拉甫罗维奇·拉甫罗夫　</h1>
<table class="add rt"><tbody>
<tr><td>
巴黎<br>
1894年1月10日于伦敦<br>
西北区瑞琴特公园路122号<br>
</td></tr></tbody></table>
<p>亲爱的拉甫罗夫：</p>
<p>　　感谢您6日的明信片。附去的信里有私人的消息，我认为它是重要的，因此不希望这封信遭到丢失。您得知拉波波特先生的确切地址后，请即将此信转他，至盼。此事不必着急，一个星期也不要紧。</p>
<p>　　第三卷<sup><a href="#bz1" id="bzref1">FN1</a></sup>手稿的三分之一已付排（二十章）。其余的我正在最后校订。如果一切顺利，9月份可以出书。</p>
<p>　　我希望您的健康状况不比我差，如果是这样，我们俩都没有什么可抱怨的了。</p>
<p class="sign">完全是您的　<b>弗·恩格斯</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 指《资本论》。——编者注<br>
</p>
