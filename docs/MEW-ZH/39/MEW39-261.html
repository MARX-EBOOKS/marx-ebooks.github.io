<h1>
261.致保尔·拉法格
</h1><br>  
<div align="right" class="quote">
勒－佩勒<br>
[1895年6月29日于伊斯特勃恩]<br>
</div><br>
<p>  如果山不到穆罕默德那里去，穆罕默德就到山那里去。如果保尔不愿意到伊斯特勃恩来，伊斯特勃恩就到他那里去。所以说，穆罕默德没有能够实现的，保尔在转瞬之间就能实现。特此证明。</p><div align="right"><table border="0" cellpadding="0" cellspacing="0"><tr><td style="line-height: 200%">
<p>  <b>弗·恩格斯</b></p>
<p>  杜西</p>
<p>  爱德华</p>
<p>  劳拉</p>
<p>  1895年6月29日</p>
</td></tr></table></div><br>
