<h1>22.致托马斯·库克父子商店</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>草稿</b>]<br>
[1893年3月3日以后于伊斯特勃恩]<br>
</td></tr></tbody></table>
<p>尊敬的先生们：</p>
<p>　　你们3日的信已经给我转寄到这里。<sup><a href="#z65" id="zref65"><b>65</b></a></sup></p>
<p>　　提及的那位先生<sup><a href="#bz1" id="bzref1">FN1</a></sup>，是一位年青的医生，维也纳大学（奥地利）的教师，他在这所大学里获得了学位，工作很有成绩。一位著名的奥地利议会议员<sup><a href="#bz2" id="bzref2">FN2</a></sup>把他介绍给我，并作了很好的评价。所以我相信，他将是你们的一位很理想的顾客。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 路德维希·弗赖贝格尔。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 别涅斯托费尔。——编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref65" id="z65"><b>65</b></a> 1893年3月1日左右至17日恩格斯在伊斯特勃恩休养。——第45、46、48、51、53、58页。<br>
</p>
