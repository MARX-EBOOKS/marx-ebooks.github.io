<h1>158.致爱德华·伯恩施坦</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1894年9月18日星期二[于伦敦]<br>
</td></tr></tbody></table>
<p>　　我们今天晚上回到这里。<sup><a href="#z243" id="zref243"><b>243</b></a></sup>男爵要求给他一些关于国际的“未发表的东西”。我刚刚翻遍了旧文件，找到一些多多少少合适的东西；你能否来取一趟转给他？从男爵的来信看，时间很紧迫。明天从十点大概到一点我在城里，然后又在家里，但路易莎知道这东西放在什么地方。</p>
<p>　　我们大家向吉娜和孩子们<sup><a href="#bz1" id="bzref1">FN1</a></sup>问好。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 伯恩施坦的妻子和养子养女。——编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref243" id="z243"><b>243</b></a> 恩格斯从1894年8月14日至9月18日在伊斯特勃恩休养。——第273、279、283、284、360页。<br>
</p>
