<h1>264.致爱德华·伯恩施坦</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1895年7月4日于伊斯特勃恩市<br>
皇家大校场4号<br>
</td></tr></tbody></table>
<p>亲爱的爱德：</p>
<p>　　来信收到。谢谢。一切如旧，也就是说，心情随着身体状况的好坏而变化无常。工作还根本不用想，只能写写最必要的信。昨天劳拉走了，路易莎又到这里来了；她和我衷心问候你，问候孩子们和吉娜。<sup><a href="#bz1" id="bzref1">FN1</a></sup></p>
<p class="sign">你的　<b>弗·恩·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 伯恩施坦的养子养女和妻子。——编者注<br>
</p>
