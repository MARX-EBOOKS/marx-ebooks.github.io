<h1>237.致哈利·奎尔奇<sup><a href="#z390" id="zref390"><b>390</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>草稿</b>]<br>
1895年4月2日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的同志：</p>
<p>　　今年我不得不断然谢绝邀我参与报纸杂志的3月18日专刊以及五一专刊的一切请求，因此我不能破例为《正义报》作“访问谈话”。然而这决不是说我根本拒绝同您<b>私下里</b>友好地讨论英国国内外运动的发展和目前状况，如果您愿意的话。</p>
<p>　　如果这符合您的心意，如果您肯告知您何日何时光临，我将设法在家等候。</p>
<p class="sign">忠实于您的</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref390" id="z390"><b>390</b></a> 这封信稿写在哈·奎尔奇1895年4月1日给恩格斯的信的下端。奎尔奇在信中要求恩格斯为《正义报》五一专刊发表一篇关于工人运动现状的谈话。——第433页。<br>
</p>
