<h1>马克思致爱德华·弥勒－捷列林格<sup><a href="#205-z415" id="205-zref415"><b>415</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>副本</b>]<br>
1850年1月1日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的捷列林格：</p>
<p>　　恩格斯、载勒尔、维尔特、维利希和我将不出席1月3日举行的集会，原因如下：</p>
<p>　　1.被邀请的政治流亡者的名单是任意确定的。例如，其中就没有康·施拉姆和斐·沃尔弗。</p>
<p>　　2.数年来一直领导伦敦德国民主派的工人一个也没有被邀请。</p>
<p class="sign">你的　<b>卡·马克思</b></p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#205-zref415" id="205-z415"><b>415</b></a> 马克思的这封信是为了答复班贝尔格尔、弥勒－捷列林格和鲁道夫·施拉姆1849年12月30日写信邀请他参加德国流亡者的集会而写的。——第544页。<br>
</p>
