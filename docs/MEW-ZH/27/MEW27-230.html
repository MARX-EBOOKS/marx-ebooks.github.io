<h1>马克思致海尔曼·贝克尔<sup><a href="#z431" id="zref431"><b>431</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
科伦<br>
1851年4月9日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的贝克尔：</p>
<p>　　附上金克尔派的一篇可笑的拙劣文章。这里为同盟<sup><a href="#bz1" id="bzref1">FN1</a></sup>筹集了十五先令。还差十先令，这笔款子已经有人认捐，但是钱还没有拿到。我将按照你的建议行事。请让我负担一英镑吧。应该付五先令的那个会员的生活状况更加恶化，这笔钱拿不到了……</p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 共产主义者同盟。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref431" id="z431"><b>431</b></a> 马克思的这封信的原件没有找到。本文是科伦共产党人案件的起诉书中所引用的一段。——第572页。</div></aside>
