<h1>马克思致亨利希·伯恩施太因</h1>
<table class="add rt"><tbody>
<tr><td>
巴黎<br>
[1844年秋于巴黎]<br>
</td></tr></tbody></table>
<p>阁下：</p>
<p>　　如果您能于星期二以前了解到，弗兰克是否同意承担<b>出版</b>反对鲍威尔的小册子<sup><a href="#bz1" id="bzref1">FN1</a></sup>，我将十分感激。</p>
<p>　　他怎样决定，对我都<b>无所谓</b>。我随时可以在国外找到出版商。但恰好我很想把这本<b>每一个</b>字都有意义的小册子就近出版，亲自校对。</p>
<p>　　无论如何请您立即回信。</p>
<p>　　我也准备为您效劳。</p>
<p class="sign">忠实于您的　<b>马克思</b>博士</p>
<p>　　又及：因为这本小册子是<b>反对鲍威尔</b>的，一般来说，其中为书报检查机关所不容许的东西是不多的，所以我不认为，这本小册子在德国推销会有很大困难。</p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 卡·马克思和弗·恩格斯《神圣家族》。——编者注</div></aside>
