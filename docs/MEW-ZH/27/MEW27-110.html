<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1851年8月20日左右于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　你最好先把蒲鲁东的书<sup><a href="#bz1" id="bzref1">FN1</a></sup>读完，因为我很快就要用它。杜罗的书<sup><a href="#bz2" id="bzref2">FN2</a></sup>，我已经把我要用的东西都摘录下来了。</p>
<p>　　顺便说一句：<b>请你还是给新奥尔良的费舍写封信吧</b>。（李卜克内西现在同他经常通信。）因为金克尔，卢格之流正好想要从新奥尔良得到经济上的帮助，这样做就更加重要。因此你可别忘了给他写封信，他在给李卜克内西的信中就埋怨你不写信给他。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 比·约·蒲鲁东《十九世纪革命的总观念》。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 杜罗·德·拉·马尔《罗马人的政治经济学》。——编者注<br>
</p>
