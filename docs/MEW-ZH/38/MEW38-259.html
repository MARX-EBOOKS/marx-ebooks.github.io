<h1>附录4.致某人<sup><a href="#z464" id="zref464"><b>464</b></a></sup>
</h1>
<table class="add rt"><tbody>
<tr><td>
[1892年12月底于伦敦]<br>
</td></tr></tbody></table>
<p>　　向一八九三年致敬！</p>
<p>　　希望和欢乐与它一起重新来临。</p>
<p>　　愿它始终快乐光明，</p>
<p>　　这一祝愿来自最忠实于您的人。</p>
<p class="sign"><b>弗·恩·</b></p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref464" id="z464"><b>464</b></a> 这封信是一首诙谐诗，作者不详。恩格斯的签名是用铅笔写的。——第572页。</div></aside>
