<h1>196.致帕斯夸勒·马尔提涅蒂<sup><a href="#z376" id="zref376"><b>376</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
贝内万托<br>
1892年8月22日于赖德<br>
</td></tr></tbody></table>
<p>　　……我估计，关于父姓勒夫累的公爵夫人<sup><a href="#bz1" id="bzref1">FN1</a></sup>是发生了什么误会。我没有听到爱琳娜·马克思-艾威林夫人什么时候谈过这位太太。艾威林夫人现在在挪威；她回来后，我问她一下，然后告诉您。</p>
<p class="sign">您的　<b>弗·恩格斯</b></p>
<p>（伦敦的地址不变）</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 卡扬尼埃洛公爵夫人。——编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref376" id="z376"><b>376</b></a> 这几行字是恩格斯写在一张明信片上的，明信片贴邮票的一角残缺。——第433页。<br>
</p>
