<h1>122.致海尔曼·恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
巴门<br>
1892年2月17日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的海尔曼：</p>
<p>　　假如你能在4月30日<b>以前</b>把我的往来账的抄本寄来，我将十分满意。这样的话，就请你写个<b>明信片</b>通知我，提到的股息是否已收到，有多少。这就再好也没有了。</p>
<p>　　从昨天起，我们这里的天气是入冬以来最好的，有雪，很冷，简直象在德国一样。我今天到里士满去看了一个年老多病的朋友<sup><a href="#bz1" id="bzref1">FN1</a></sup>，然后到城里去了一趟。天气使我精神大为振奋，我后来喝的啤酒也好象特别好喝。向恩玛<sup><a href="#bz2" id="bzref2">FN2</a></sup>和所有其他的人问好。</p>
<p class="sign">你的　<b>弗里德里希</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 乔·朱·哈尼。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 恩玛·恩格斯。——编者注<br>
</p>
