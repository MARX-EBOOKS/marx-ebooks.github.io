<h1>168.致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
斯图加特<br>
1892年6月27日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　我们优秀的肖莱马已于今晨安静地去世了。明天我就动身去那里。<sup><a href="#z330" id="zref330"><b>330</b></a></sup></p>
<p>　　悼文<sup><a href="#bz1" id="bzref1">FN1</a></sup>将在《前进报》上发表。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 弗·恩格斯《卡尔·肖莱马》。编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref330" id="z330"><b>330</b></a> 1892年6月29日―7月2日，恩格斯去曼彻斯特参加了卡·肖莱马的葬礼。——第376、377、393页。</div></aside>
