<h1>4.致斯塔尼斯拉夫·门德尔森</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1891年1月13日星期二于[伦敦]西北区瑞琴特公园路122号<br>
</td></tr></tbody></table>
<p>亲爱的门德尔森公民：</p>
<p>　　上星期天<sup><a href="#bz1" id="bzref1">FN1</a></sup>，我们曾约定在您认为方便的日期和时间光临敝舍，共进便餐，当时谈得十分匆忙，为了不发生误会，看来，我应该把所要讲的话重述一遍。</p>
<p>　　后天，星期四下午六时，我在家等候您、门德尔森夫人和约德科公民。对约德科我可能说得不够明确。因此，烦您再次以我的名义邀他届时光临。</p>
<p>　　我和考茨基夫人向门德尔森夫人致良好的祝愿。</p>
<p class="sign">忠实于您的　<b>弗·恩格斯</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 1月11日。——编者注<br>
</p>
