<h1>18.致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
斯图加特<br>
1891年2月21日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的考茨基：</p>
<p>　　首先，衷心祝贺你添了一个男孩<sup><a href="#bz1" id="bzref1">FN1</a></sup>。我想，分娩一定很顺利，哺乳也很正常。请向你的夫人<sup><a href="#bz2" id="bzref2">FN2</a></sup>转致衷心的祝贺。愿你们的儿子给你们带来很多愉快。</p>
<p>　　倍倍尔的信现奉还。今天，我必须看《反布伦坦诺》<sup><a href="#bz3" id="bzref3">FN3</a></sup>第一印张的校样。不然的话，本来是可以给你写一封信的。现在你只好再等一等了。</p>
<p>　　衷心问好，明后天再写。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<div><a href="#bzref2" id="bz2">FN2</a> 路易莎·考茨基，父姓龙施佩尔格。——编者注</div>
