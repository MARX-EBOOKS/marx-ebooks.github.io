<h1>163.致路德维希·肖莱马</h1>
<table class="add rt"><tbody>
<tr><td>
达姆斯塔德<br>
1892年6月16日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的肖莱马先生：</p>
<p>　　您本月7日的来信已收到。龚佩尔特9日也告诉我说，他收到了您的一封短信。关于卡尔<sup><a href="#163-bz1" id="163-bzref1">FN1</a></sup>的情况，他写道：</p>
<blockquote>　　“他仍然没有任何疼痛的感觉，吃得不少，睡眠一般也不错。最近几天，他一直处于冷漠状态中，刚刚发生的事，他马上就忘了。”</blockquote>
<p>　　其他方面没有变化。在那以后，从龚佩尔特那里就再也没有得到任何消息，因此我可以相信，没有发生什么重大变化。就写这么几句，免得您挂念。</p>
<p>　　我和考茨基夫人衷心问候您和您全家。</p>
<p class="sign">您的　<b>弗·恩格斯</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#163-bzref1" id="163-bz1">FN1</a> 卡尔·肖莱马。——编者注<br>
</p>
