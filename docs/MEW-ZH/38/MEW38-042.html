<h1>42.致瓦列里·符卢勃列夫斯基</h1>
<div align="right" class="quote">
尼斯<br>
[<b>草稿</b>]<br>
1891年4月9日[于伦敦]</div>
亲爱的符卢勃列夫斯基：<br>
<p>　　请原谅我，望您不要坚持您在5日的来信中谈到的委托。我没有任何权利干预我几乎毫不了解的波兰党的内部事务，也没有任何权利干预门德尔森公民的私事。我觉得，在这种情况下，我再进行干预，只能妨碍达到您预想的结果。我看，从您本身的利益着想，您最好和门德尔森直接商谈。您尽管这样做，丝毫不必担心他收不到您寄往西北区海德公园公寓1号的信，据我所知，他现在已搬到那里去了。</p>
<p>　　希望您获得成功，并很快能告诉我更好的消息。</p>
<div align="right">　　仍然忠实于您的</div>
</body>
