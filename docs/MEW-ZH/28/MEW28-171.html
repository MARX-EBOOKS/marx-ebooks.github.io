<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1854年7月6日星期四[于曼彻斯特]<br>
</td></tr></tbody></table>
<p>亲爱的马克思：</p>
<p>　　希望五英镑已经收到。附上为明天写的一篇关于战争的第一阶段的文章<sup><a href="#bz1" id="bzref1">FN1</a></sup>。</p>
<p>　　如果这些家伙真要把法国士兵送到波罗的海，那末他们至少必须占领阿兰群岛。这是上策。</p>
<p>　　附上一首宗教诗歌。我想知道：</p>
<p>　　（1）<b>它是哪一世纪的</b>？</p>
<p>　　（2）<b>作者是谁</b>？</p>
<p>　　请马上回答。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 弗·恩格斯《多瑙河战争》。——编者注</div></aside>
