<h1>马克思致卡尔·布林德</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1853年9月26日于[伦敦]索荷区第恩街28号<br>
</td></tr></tbody></table>
<p>亲爱的布林德：</p>
<p>　　关于巴登的卑鄙作法的消息<sup><a href="#bz1" id="bzref1">FN1</a></sup>，使我妻子和我感到很突然，虽然本来就没有指望那里会干什么好事。对涉及你和你全家的一切，我们非常同情。</p>
<p>　　至于琼斯，我担心他到外地去了。我已经有好几个星期没有看到他了。不过我今天还是要去打听一下，看他是否同意，同时了解他有没有收到你的信。详细情况，你明天就能知道。我全家向你全家衷心问好。</p>
<p class="sign">你的　<b>卡·马克思</b></p>
<p>　　我早就想抽空到你那里去一趟，但总是有许多不愉快的琐事缠身。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 见本卷第295、602页。——编者注<br>
</p>
