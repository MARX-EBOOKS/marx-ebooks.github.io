<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1852年8月9日]星期一晚[于曼彻斯特]<br>
</td></tr></tbody></table>
<p>亲爱的马克思：</p>
<p>　　我做了一件蠢事。《每日新闻》在它的邮船时刻表上并没有指明星期三有一条美国船要启航，我为商人所固有的那种星期天的懒散所误，今天才从一张商业通报上知道，实际上后天有一条船要开。我开始了工作<sup><a href="#bz1" id="bzref1">FN1</a></sup>，不过什么也没有搞成。今天晚上品得要来我这里，如果我再送他回家，那末，要在截邮以前的几个小时里搞出一点东西，就成问题了。所以，我和你都受骗了。不过要我相信资产阶级报纸上的商业消息的事情再也不会发生了。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 看来是指把马克思的《宪章派》一文译成英文。——编者注</div></aside>
