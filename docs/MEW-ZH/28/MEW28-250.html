<h1>马克思致阿道夫·克路斯<sup><a href="#z517" id="zref517"><b>517</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
华盛顿<br>
1852年8月初于伦敦]<br>
</td></tr></tbody></table>
<p>　　……为什么对科伦人<sup><a href="#bz1" id="bzref1">FN1</a></sup>的审判又没有举行，这个秘密现在被发现了。主要证人、叛徒、汉堡的豪普特逃到巴西去了。第二个重要证人裁缝帮工也溜走了。这样，在政府那里连一点证据的影子也没有了。这个卑鄙的政府以拖延审前羁押来为自己的失败进行报复……</p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 被捕并在科伦受审的共产主义者同盟盟员。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref517" id="z517"><b>517</b></a> 这封信只找到克路斯1852年10月15日给魏德迈的信中所引用的一小段。——第545页。</div></aside>
