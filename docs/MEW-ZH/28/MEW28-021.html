<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1852年4月14日于伦敦索荷区第恩街28号<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　只写给你这两行，告诉你，小孩子<sup><a href="#021-bz1" id="021-bzref1">FN1</a></sup>今天一点一刻死去了。</p>
<p class="rt">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#021-bzref1" id="021-bz1">FN1</a> 马克思的女儿弗兰契斯卡·马克思。——编者注<br>
</p>
