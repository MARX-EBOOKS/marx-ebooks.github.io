<h1>马克思致恩格斯</h1>
<div align="right" class="quote">
曼彻斯特<br>
1852年10月20日于伦敦索荷区第恩街28号</div>
亲爱的恩格斯：<br>
<p>　　介绍持信人普莱耶耳上校来见你。虽然我自己不认识他，但他是由你认识的班迪亚上校“竭诚”推荐的。</p>
<div align="right">你的　<b>卡·马克思</b></div>
