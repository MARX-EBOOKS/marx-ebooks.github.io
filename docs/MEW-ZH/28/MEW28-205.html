<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1855年4月6日于[伦敦]索荷区第恩街28号<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　可怜的穆希<sup><a href="#bz1" id="bzref1">FN1</a></sup>已经不在世了。今天五、六点钟的时候他在我的怀中睡着了（真正睡着了）。我永远不会忘记，你的友谊在这个可怕的时刻怎样减轻了我们的痛苦。我对孩子有多大的悲伤，你是理解的。我的妻子向你致最友好的问候。如果我到曼彻斯特去，可能带她一起去一星期，那时我们自然是住在旅馆里（或者租一个房间）。无论如何要设法帮助她度过最初的一段日子。</p>
<p class="sign">你的　<b>卡·马克思</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 埃德加尔·马克思。——编者注</div></aside>
