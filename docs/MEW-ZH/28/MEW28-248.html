<h1>马克思致哥特弗利德·金克尔<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>草稿</b>]<br>
1852年7月22日于[伦敦]索荷区萨顿街5号《人民报》办事处<br>
</td></tr></tbody></table>
<p>约·哥·金克尔博士先生：</p>
<p>　　据悉，您在辛辛那提当着安内克或其他人的面似乎竟敢作出如下声明：“马克思和恩格斯……”</p>
<p>　　期待您立即作出解释。</p>
<p>　　沉默将被视为承认。</p>
<p class="sign"><b>卡·马·</b>博士</p>
