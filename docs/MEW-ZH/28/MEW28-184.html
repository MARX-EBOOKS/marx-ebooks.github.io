<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1854年10月25日于[伦敦]索荷区第恩街28号<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　附上克路斯的信。</p>
<p>　　施瑙费尔死了。</p>
<p>　　皮佩尔在伦敦郊区肯特郡埃耳森当住校教员，负担各项工作。</p>
<p>　　如果你星期五以前能赶出一篇军事文章，那就太好了。现在应当对联军的作战作出应有的估计了。</p>
<p>　　毕尔格尔斯小姐的事情很滑稽。你已经听说了，她离开科伦之前，带了一个孩子，把这孩子当作拉萨尔的儿子。</p>
<p>　　邮件要发走了，因此——</p>
<p>　　祝你健康。</p>
<p class="rt">你的　<b>卡·</b></p>
</body>
