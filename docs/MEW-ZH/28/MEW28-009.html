<h1>马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1852年2月6日星期五于[伦敦]索荷区第恩街28号<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　我刚刚接到你的文章<sup><a href="#009-bz1" id="009-bzref1">FN1</a></sup>。</p>
<p>　　我只给你写几行，因为时间很紧迫，去美国的邮件就要寄走，我只有在这以后才能外出打听关于“李希特尔”<sup><a href="#009-bz2" id="009-bzref2">FN2</a></sup>的情况。</p>
<p>　　如果现在你能将这两英镑邮汇<b>给我</b>，我将非常高兴。下星期我可以收到一些钱，那时我将用你的名义把这两英镑交给皮佩尔。但是对我来说，下星期初能有这两英镑，是很重要的，而对他却无关紧要，因为他暂时还富裕。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#009-bzref1" id="009-bz1">FN1</a> 弗·恩格斯《德国的革命和反革命》第十篇。——编者注<br>
<a href="#009-bzref2" id="009-bz2">FN2</a> 见本卷第15―16页。——编者注<br>
</p>
