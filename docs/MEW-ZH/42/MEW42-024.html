<h1>*笔记本中的札记<sup><a href="#023-z146" id="023-zref146"><b>146</b></a></sup></h1>
<p>　　
<b>　　神灵的利己主义者同利己主义的人相对立。</b></p>
<p>　　革命时期关于古代国家的误解。</p>
<p>　　“概念”和<b>“实体”。</b></p>
<p>　　革命——现代国家起源的历史。</p>
