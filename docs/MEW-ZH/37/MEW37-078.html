<h1>78.致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
维也纳<br>
1889年2月7日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　关于手稿的事根本<b>不必着急</b><sup><a href="#bz1" id="bzref1">FN1</a></sup>。因此，怎样对你们最合适，你们就怎样安排。最近我还要全力以赴地搞第三卷<sup><a href="#bz2" id="bzref2">FN2</a></sup>（到现在为止大约完成了三分之一）。从今天起，巴黎<b>每天</b>出版《平等报》，作为《人民呼声报》的续刊。除了瓦扬和他的一派之外，参加的人有拉法格、盖得、杰维尔，大概还有别的人。马隆也必定参加。其他一切问题下次再谈。今天我只想立即答复你提出的主要问题。我和尼姆衷心问候路易莎。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<div class="style2">脚　　注</div>
