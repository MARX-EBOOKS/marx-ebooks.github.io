<h1>29.致海尔曼·施留特尔</h1>
<table class="add rt"><tbody>
<tr><td>
霍廷根―苏黎世<br>
1888年5月10日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的施留特尔先生：</p>
<p>　　您到这里来的事怎样了？从爱德那里我们只知道，<b>他</b>要路过巴黎并在那里耽搁一些日子。关于其他人他没有明确说。因此，我们在这里心中无数，什么也干不了。</p>
<p>　　请您和其他人商量好并且告诉我们，你们什么时候一起来，我指的是您、莫特勒和陶舍尔，并告诉我们，在这期间我们在这里是否能够为你们做些什么。还请通知我们，你们乘哪班火车<b>在这里哪个站</b>下车，这样好去接你们。否则可能造成很大的混乱，而且还可能白花不少钱。</p>
<p>　　衷心问候你们大家。</p>
<p class="rt">您的　<b>弗·恩格斯</b></p>
</body>
