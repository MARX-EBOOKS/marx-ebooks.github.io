<h1>165.致海尔曼·施留特尔</h1>
<table class="add rt"><tbody>
<tr><td>
纽约<br>
1890年1月15日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　白恩士要我转告，他不认识提到的那个人<sup><a href="#bz1" id="bzref1">FN1</a></sup>，可见，这无论如何是一个令人怀疑的人。</p>
<p>　　这里流行性感冒蔓延，但是我们至今没有感染。其他没有什么新闻。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
