<h1>43.致爱德华·伯恩施坦</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1888年8月9日[于“柏林号”轮船<br>
（利物浦——昆兹敦<sup><a href="#bz1" id="bzref1">FN1</a></sup>）]<br>
</td></tr></tbody></table>
<p>亲爱的爱德：</p>
<p>　　我从来没有觉得柏林象在这艘“柏林号”上这样漂亮。如果近卫军尉官们<sup><a href="#bz2" id="bzref2">FN2</a></sup>知道这里的饭菜是多么丰盛而味美，那他们马上就会拿陆上的（或沙上的<sup><a href="#bz3" id="bzref3">FN3</a></sup>）柏林来换取水上的柏林。过两个半小时我们将到达昆兹敦，然后驶向大洋。衷心问候你的夫人、施留特尔夫妇、莫特勒夫妇和陶舍尔。</p>
<p class="sign">你的　老<b>将军</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 现名科夫。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 暗指威廉二世。——编者注<br>
<a href="#bzref3" id="bz3">FN3</a> 以柏林为中心的勃兰登堡边区有德意志帝国沙箱（《Streusandbüchse》）之称。——编者注<br>
</p>
