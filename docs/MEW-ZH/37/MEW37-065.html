<h1>65.致弗里德里希·阿道夫·左尔格</h1>
<table class="add rt"><tbody>
<tr><td>
霍布根<br>
1888年12月15日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　赶快转告施佩耶尔：列斯纳找到了他的妻妹。他们还住在老地方，她答应立即写信给施佩耶尔夫妇，可是我不想把这个消息耽搁了。</p>
<p>　　第三卷<sup><a href="#bz1" id="bzref1">FN1</a></sup>花的力气比我想象的要多，有一章我必须全部重写，而另一章只有一个标题，我只得自己写。<sup><a href="#z107" id="zref107"><b>107</b></a></sup>不过工作有进展，这将使经济学家先生们大为震惊。我的眼睛好些了，我还是觉得比去年7月的时候要年轻五岁。</p>
<p>　　向你的夫人问好。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
