<h1>191.致帕斯夸勒·马尔提涅蒂</h1>
<div align="right" class="quote">
贝内万托<br>
1890年5月24日[于伦敦]</div>
[亲爱的朋友：]<sup><a href="#191-bz1" id="191-bzref1">FN1</a></sup><br>
<p>　　[衷心]祝贺您被[宣告]无罪！到底等到了！这对于您和您的[家庭]是何等高兴呀！您的[家庭]所受的苦难一点也不[比您]自己少！我当即给安·拉布里奥拉写了几句表示谢意的[话]，并通过他也向洛利尼致谢。</p>
<p>　　现在您的新生活开始了。同您在大洋彼岸开始新生活相比，它将更加美好和充满希望。</p>
<p>　　致最友好的问候。</p><div align="right">　　您的　<b>弗·恩·</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#191-bzref1" id="191-bz1">FN1</a> 此信是写在明信片上的；贴邮票的一角被撕掉。方括号内的文字系复原的部分。——编者注<br>
</p>
