<h1>32.致海尔曼·施留特尔</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1888年6月15日于[伦敦]<br>
瑞琴特公园路122号<br>
</td></tr></tbody></table>
<p>亲爱的施留特尔：</p>
<p>　　星期天两点半你和陶舍尔是否愿意光临，到我这儿吃饭？</p>
<p class="sign">您的　<b>弗·恩格斯</b></p>
