<h1>248.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1859年11月17日于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　如果你在明天来不及把关于摩洛哥的文章写完，还可以拖到<b>星期六</b>（即取道科克<sup><a href="#bz1" id="bzref1">FN1</a></sup>）。我今天在写（因为星期二没有写）苏伊士问题。摩洛哥的事必须写，不然他们不得不从《泰晤士报》转载。<sup><a href="#z426" id="zref426"><b>426</b></a></sup></p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 爱尔兰的一港口。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref426" id="z426"><b>426</b></a> 马克思关于苏伊士问题，即关于与苏伊士运河的建设——这个时期英法在这个问题上的矛盾很尖锐——有关的事件的文章，《纽约每日论坛报》编辑部没有发表。<br>
　　关于恩格斯论述摩洛哥事件的文章，见注417。——第485页。</div></aside>
