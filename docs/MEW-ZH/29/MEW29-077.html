<h1>77.恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1857年]9月10日星期四[于赖德]<br>
</td></tr></tbody></table>
<p>亲爱的马克思：</p>
<p>　　附上《卞尼格先》和《巴克莱》<sup><a href="#bz1" id="bzref1">FN1</a></sup>。关于拿破仑的将领，我写得稍微详细一些，明后天寄上。《军队》即将完成。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 卡·马克思和弗·恩格斯《卞尼格先》、《巴克莱－德－托利》。——编者注<br>
</p>
