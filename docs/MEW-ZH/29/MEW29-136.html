<h1>136.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1858年]3月15日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　《缅甸》、《贝雷斯福德》<sup><a href="#bz1" id="bzref1">FN1</a></sup>和《曼彻斯特卫报》收到了。你没有告诉我，是否收到了我那封附有纽约来信<sup><a href="#bz2" id="bzref2">FN2</a></sup>的信以及其他情况。在邮局目前的情况下，知道这一点是重要的。所以请你写两行来。</p>
<p>　　下次详谈。</p>
<p class="sign">你的　<b>卡·马·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 弗·恩格斯《缅甸》；卡·马克思和弗·恩格斯《贝雷斯福德》。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 指弗·康姆的信（见本卷第284页）。——编者注<br>
</p>
