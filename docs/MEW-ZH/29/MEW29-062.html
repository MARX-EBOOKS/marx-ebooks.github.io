<h1>62.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1857年]7月3日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　我又写几句是为了推翻前一个便条。№Ⅱ是正六点到的。过去从来没有一封信到得这么晚，所以为了防止可能发生的灾祸，我就写了便条。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
