<h1>147.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1858年]5月1日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　我在星期四下午两点半乘北方大铁路的火车从伦敦出发，七点到达曼彻斯特。<sup><a href="#z263" id="zref263"><b>263</b></a></sup></p>
<p class="sign">你的　<b>卡·马·</b></p>
<p>　　从昨天起我又好多了，本来我打算从星期一就认真着手工作。但是，同医生一商量，他认为我还是需要休息一星期左右，所以我把一切事情都搁下了。</p>

<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref263" id="z263"><b>263</b></a> 马克思大约从5月6日至24日在曼彻斯特住在恩格斯那里。在此期间，马克思为了恢复健康，进行体育锻炼和骑马，同时还写《资本》这一章。——第315、539页。<br>
</p>
