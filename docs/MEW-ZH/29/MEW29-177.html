<h1>177.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1859年1月8日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德里克：</p>
<p>　　附上弗莱里格拉特的信（我曾写信告诉他关于金克尔事件的一些情况）、《海尔曼》周报的广告<sup><a href="#z298" id="zref298"><b>298</b></a></sup>、维利希先生的信。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref298" id="z298"><b>298</b></a> 马克思寄给恩格斯的《海尔曼》周报的广告，是一份预告这家周报即将出版的宣传性质的说明书，上面的日期是1858年12月24日，并有金克尔的签名。——第368页。<br>
</p>
