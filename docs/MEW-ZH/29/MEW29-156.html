<h1>156.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1858年]7月25日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　你从附上的弗莱里格拉特的信中可以看到，又有了新的困难。不过，“新的”条件对我来说，实际上要比旧的好，因为名义上的期限是三个月，实际上却要六个月以后才付款，而且少付百分之十。</p>
<p>　　不管怎样，请立即给我回信。事情紧迫。如果事情能这样办妥，我无论如何要立刻把妻子送到附近的海滨疗养地去住几个星期，那时再看怎样对待我的老太太<sup><a href="#156-bz1" id="156-bzref1">FN1</a></sup>，——自然，这一切只有在最紧迫的要求和缓之后才行。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#156-bzref1" id="156-bz1">FN1</a> 马克思的母亲罕丽达·马克思。——编者注<br>
</p>
