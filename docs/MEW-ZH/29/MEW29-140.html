<h1>140.恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[于曼彻斯特]<br>
</td></tr></tbody></table>
<p>亲爱的摩尔：</p>
<p>　　寄上五英镑银行券一张，号码写在下面<sup><a href="#bz1" id="bzref1">FN1</a></sup>。《骑兵》正在写；在蒙森的《罗马史》中我又发现一些好材料（汉尼拔的骑兵）。可惜，关于七年战争很难找到什么材料。</p>
<p>　　昨天寄给你的《卫报》想必已收到了。这是唯一有巴黎通讯或者说总还有点意思的报纸。</p>
<p>　　匆匆草此，已七点半了，店员正等着关门。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 该信原稿中银行券号码没有保留下来。——编者注</div></aside>
