<h1>31.马克思致弗兰茨·敦克尔</h1>
<div align="right" class="quote">
柏林<br>
1859年3月17日[于伦敦]</div>
阁下：<br>
<p>　　我现用信件寄回校样<sup><a href="#288-bz1" id="288-bzref1">FN1</a></sup>，因为本地邮局通知我，校样可从柏林迳寄伦敦，而从伦敦到柏林则应按信件寄递。</p>
<p>　　<b>第三十二页</b>：我忘记把最后几行“英国的经济学和法国的……经济学之间的一个更深刻的<b>经济</b>对立”一句话改为“一个更深刻的<b>原则</b>对立……”<sup><a href="#288-z478" id="288-zref478"><b>478</b></a></sup>。</p>
<p>　　也许<b>我记错了</b>，好象正文以及第一条注释里的前几句都从第三十三页错误地移到第三十二页上去了。</p>
<div align="right">　　忠实于您的　<b>卡·马·</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#288-bzref1" id="288-bz1">FN1</a> 《政治经济学批判》一书。——编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#288-zref478" id="288-z478"><b>478</b></a> 见《马克思恩格斯全集》中文版第13卷第44页。——第567页。<br>
</p>
