<h1>27.马克思致弗兰茨·敦克尔</h1>
<div align="right" class="quote">
柏林<br>
1859年2月23日于伦敦</div>
<p>阁下：</p>
<p>　　随函寄上《序言》<sup><a href="#284-bz1" id="284-bzref1">FN1</a></sup>。</p>
<div align="right">　　忠实于您的　<b>卡尔·马克思</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#284-bzref1" id="284-bz1">FN1</a> 《政治经济学批判》一书的序言。——编者注<br>
</p>
