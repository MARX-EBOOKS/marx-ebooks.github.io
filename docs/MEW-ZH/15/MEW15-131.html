<h1>
卡·马克思弗·恩格斯<br>译后记
</h1>
<div style="text-align: center;">
<p class="date"></p></div>
<div style="text-align: center;">
<p class="date"></p></div>
<div align="right">
本卷中有关1861—1865年美国内战的文章，凡已收入“马克思恩格斯论美国内战”一书（人民出版社1955年版，朱鸿恩译）的，都核对英文原文和德文原文，并参考其他版本和译本，对译文重新作了校订。“英国的政治”和“中国记事”两文，原收入“马克思恩格斯论中国”一书（人民出版社1961年版），现根据英文原文和德文原文作了校订。其他文章，在译校过程中也都核对原文，并参考了其他版本和译本。<br>
　　参加本卷译校工作的是徐若木、高叔眉、单志澄、韩文臣、刘功勋、谢惇；参加资料工作的是刘功勋、王锦文、冯如馥、陈家英、陈瑞林。<br>
<p align="right">中共中央马克思恩格斯列宁斯大林著作编译局</p></div>
