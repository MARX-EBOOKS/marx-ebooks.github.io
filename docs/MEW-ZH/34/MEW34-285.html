<h1>恩格斯关于他的妻子莉·白恩士逝世的讣告</h1>
<p>　　我现在通知我在德国的朋友们，昨天夜间死神从我这里夺走了我的妻子<b>莉迪亚·白恩士</b>。</p>
<table class="sign"><tbody><tr><td>
<b>弗里德里希·恩格斯</b><br>
　　　1878年9月12日于伦敦<br>
</td></tr></tbody></table>
