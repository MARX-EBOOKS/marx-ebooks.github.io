<h1>恩格斯致恩斯特·德朗克</h1>
<div align="right" class="quote">
利物浦<br>
[<b>副本</b>]<br>
1876年10月20日[于伦敦]</div>
<center><b>致德朗克</b></center><br>
<p>　　我的妹夫布兰克写信给我说，他完全拒绝你提出的那笔交易。他还说，他同欣斯贝格―费舍公司彻底断绝关系已经三年，这是完全属实的。</p>
<p>　　我很抱歉，这件事情毫无成果，因为我本来是非常愿意尽我的力量为你帮忙的。</p>
