<h1>马克思致麦克斯·奥本海姆</h1>
<table class="add rt"><tbody>
<tr><td>
布拉格<br>
1876年9月9日[于卡尔斯巴德]<br>
</td></tr></tbody></table>
<p>亲爱的朋友：</p>
<p>　　我和我的女儿<sup><a href="#bz1" id="bzref1">FN1</a></sup>非常感谢您的盛情来信。她曾经发高烧，在床上躺了三天，现在仍然被关在家里；但是由于小弗累克勒斯博士的迅速诊治，一切危险已经过去。星期三以前我们未必能够前往布拉格。我一定在动身的前一天通知您。</p>
<p>　　好吧，很快就会见面。</p>
<p class="sign">您的　<b>卡尔·马克思</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 爱琳娜·马克思。——编者注<br>
</p>
