<h1>马克思致某人</h1>
<table class="add rt"><tbody>
<tr><td>
1878年11月4日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的朋友：</p>
<p>　　如果您能够将附上的信件安全送到<b>莱比锡酿造街11号李卜克内西夫人</b>处，我将非常感激。此信涉及李卜克内西一家的“肚子问题”，而我信不过德国的邮政。<sup><a href="#z401" id="zref401"><b>401</b></a></sup></p>
<p class="sign">忠实于您的　<b>卡尔·马克思</b></p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref401" id="z401"><b>401</b></a> 马克思写这封信是因为1878年10月21日实施了反社会党人非常法（见注139）。马克思1878年11月4日给娜塔利亚·李卜克内西的信，她于11月14日收到。信中说的大概是关于马克思和恩格斯打算安排李卜克内西为伦敦《白厅评论》周刊写稿，以赚取稿酬（参看本卷第342页）。——第324页。<br>
</p>
