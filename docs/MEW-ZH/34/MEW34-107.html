<h1>马克思致麦克斯·奥本海姆</h1>
<table class="add rt"><tbody>
<tr><td>
布拉格<br>
1876年9月12日于卡尔斯巴德“日耳曼尼亚”<br>
</td></tr></tbody></table>
<p>亲爱的朋友：</p>
<p>　　衷心感谢您的亲切关怀；幸好我的女儿<sup><a href="#bz1" id="bzref1">FN1</a></sup>已经痊愈。她还算幸运。她差一点就会得肺炎，她的医生小弗累克勒斯博士的迅速诊治，使她避免了一场长时间的危险疾病。</p>
<p>　　然而由于这件事，我们必需在这里呆到星期五<sup><a href="#bz2" id="bzref2">FN2</a></sup>，以便作病后疗养。我们十点四十七分从卡尔斯巴德出发，下午五点五十分到达布拉格（国家铁路车站）。</p>
<p>　　好吧，再见。</p>
<p class="sign">友好地忠实于您的　<b>卡尔·马克思</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 爱琳娜·马克思。——编者注</div>
