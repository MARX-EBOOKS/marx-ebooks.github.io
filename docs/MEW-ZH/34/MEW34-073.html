<h1>
马克思致麦克斯·奥本海姆
</h1>
<div align="right" class="quote">
布拉格<br>
1875年9月9日于卡尔斯巴德“日耳曼尼亚”</div>
亲爱的朋友：<br>
<p>　　我将在星期六（11日）三点五十七分动身，八点五十分到达布拉格国家铁路车站。</p>
<p>　　我单独一人，没有旅伴<sup><a href="#073-bz1" id="073-bzref1">FN1</a></sup>，因此只需要一间卧室。</p>
<p>　　收到《<b>布拉格旅行指南</b>》，感谢之至。</p><div align="right">　　友好地忠实于您的　<b>卡尔·马克思</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#073-bzref1" id="073-bz1">FN1</a> 爱琳娜·马克思。——编者注<br>
</p>
