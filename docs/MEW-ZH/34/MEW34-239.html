<h1>马克思致阿基尔·洛里亚</h1>
<table class="add rt"><tbody>
<tr><td>
曼都亚<br>
1879年12月3日于伦敦西北区梅特兰公园路41号<br>
</td></tr></tbody></table>
<p>阁下：</p>
<p>　　我的健康状况曾使我不得不离开伦敦一个时期。今天回来后，见到您11月23日的来信和您的著作<sup><a href="#bz1" id="bzref1">FN1</a></sup>。现在就赶快告诉您已经收到并向您表示感谢。</p>
<p class="sign">忠实于您的　<b>卡尔·马克思</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 阿·洛里亚《地租和地租的自然消失》。——编者注<br>
</p>
