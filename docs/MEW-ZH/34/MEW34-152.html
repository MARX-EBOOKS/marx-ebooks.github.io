<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1877年4月21日于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的朋友：</p>
<p>　　明天（星期日）我们等候您来进餐（两点钟）。</p>
<p>　　匆匆草此。马克思夫人向您问好。</p>
<p class="rt">您的　<b>卡·马·</b></p>
