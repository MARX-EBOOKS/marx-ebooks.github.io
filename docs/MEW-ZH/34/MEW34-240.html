<h1>马克思致某人<sup><a href="#240-z470" id="240-zref470"><b>470</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1879年12月11日[于伦敦]<br>
</td></tr></tbody></table>
<p>阁下：</p>
<p>　　您可否在下星期日两点钟到我这里来吃饭？</p>
<p class="rt">忠实于您的　<b>卡尔·马克思</b></p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#240-zref470" id="240-z470"><b>470</b></a> 这封信收在布罗歇收藏的名人真迹集中。——第405页。<br>
</p>
