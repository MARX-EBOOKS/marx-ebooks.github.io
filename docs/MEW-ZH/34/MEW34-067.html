<h1>恩格斯致帕特里克·约翰·科耳曼<sup><a href="#z223" id="zref223"><b>223</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>草稿</b>]<br>
1875年5月20日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　至于您的请求，遗憾的是我现在没有可能<b>给任何人</b>作保。我这样做过一次，那一次的经验使我再也不干这种事了。如果我有力量在别的方面给您一些帮助，我将乐于这样做，但是目前我毫无给您效劳的可能。</p>
<p class="ct">[<b>恩格斯后来在科耳曼的信封上作的注</b>]</p>
<p>　　科耳曼，1875年。国际时期的麦克唐奈拥护者。</p>

<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref223" id="z223"><b>223</b></a> 这封信是恩格斯对科耳曼1875年5月19日来信的答复的草稿。恩格斯的答复写在科耳曼来信的最后一页上面。科耳曼在来信中说，他决定从事商业，并请求恩格斯当他的保证人。——第137页。<br>
</p>
