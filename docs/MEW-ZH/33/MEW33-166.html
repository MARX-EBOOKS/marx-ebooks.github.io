<h1>106.恩格斯致恩利科·比尼亚米<sup><a href="#z308" id="zref308"><b>308</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
洛迪<br>
1871年10月13日于伦敦<br>
</td></tr></tbody></table>
<p>《人民报》编辑公民：</p>
<p>　　总委员会委托我将下列决议<sup><a href="#bz1" id="bzref1">FN1</a></sup>寄上，请贵报予以发表。</p>
<p>　　请接受我崇高的敬意。</p>
<p class="sign">意大利书记　<b>弗里德里希·恩格斯</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 弗·恩格斯 《总委员会关于开除杜朗的决议》。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref308" id="z308"><b>308</b></a>  这封附函是恩格斯连同总委员会关于开除杜朗的决议（见《马克思恩格斯全集》中文版第17卷第469页）一起寄出的。这是恩格斯给《人民报》编辑恩·比尼亚米的第一封信，该信曾和决议一并发表于1871年10月19日《人民报》第122号。——第303页。</div></aside>
