<h1>马克思致约翰·菲力浦·贝克尔<sup><a href="#z151" id="zref151"><b>151</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
日内瓦<br>
1870年9月14日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的贝克尔：</p>
<p>　　附上给《平等报》的总委员会宣言<sup><a href="#bz1" id="bzref1">FN1</a></sup>。明天你将收到由我翻译的<b>德文本</b>（因为这篇东西我开始是用英文写的）。德文本上有几句关于德国的话，是专门对工人说的；英文本没有来得及加进去。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 卡·马克思《国际工人协会总委员会关于普法战争的第二篇宣言》。——编者注</div></aside>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref151" id="z151"><b>151</b></a> 这封信是用国际工人协会总委员会的公用笺写的。——第158、195、199、273、328、353、401、416、420、430页。</div></aside>
