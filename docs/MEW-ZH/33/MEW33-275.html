<h1>215.马克思致路德维希·库格曼</h1>
<table class="add rt"><tbody>
<tr><td>
汉诺威<br>
1872年8月26日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的库格曼：</p>
<p>　　代表们到了海牙要佩带天蓝色的花结，以便前往迎接的人能够认出他们。</p>
<p>　　如果无人迎接——<b>私人地址是</b>：雅各-卡斯街148号布鲁诺·李贝尔斯。<b>代表大会的正式会址是</b>：伦巴特街协和剧院。</p>
<p>　　匆匆。</p>
<p class="rt">你的　<b>卡·马·</b></p>
</body>
