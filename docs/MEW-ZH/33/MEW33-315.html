<h1>
255.马克思致欧根·奥斯渥特
</h1>
<div align="right" class="quote">
伦敦<br>
1873年9月20日[于伦敦]</div>
亲爱的奥斯渥特：<br>
<p>　　我已给符卢勃列夫斯基写了信，他出生于立陶宛，他的<b>俄</b>语和波兰语一样好。</p>
<p>　　如果他不同意，我心目中还有另外一个俄国人（不是波兰人）。</p>
