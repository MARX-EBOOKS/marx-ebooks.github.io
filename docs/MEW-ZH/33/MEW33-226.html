<h1>166.马克思致海尔曼·荣克</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1872年3月7日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的荣克：</p>
<p>　　我找不到韦梅希的支部<sup><a href="#z436" id="zref436"><b>436</b></a></sup>的章程。请看一下是否在您那里。</p>
<p>　　致兄弟般的敬礼。</p>
<p class="sign">您的　<b>卡·马克思</b></p>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref436" id="z436"><b>436</b></a>  指1871年法国人支部（见注322）解散后建立的一个小组。由于该小组的章程同国际共同章程的原则相抵触，总委员会没有接纳该小组加入国际。——第420页。</div></aside>
</body>
