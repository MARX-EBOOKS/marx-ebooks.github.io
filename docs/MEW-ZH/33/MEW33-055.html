<h1>恩格斯致马克思</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1874年]8月12日星期三于兰兹格特</td></tr></tbody></table>
<p>亲爱的摩尔：</p>
<p>　　《农民战争》<sup><a href="#bz1" id="bzref1">FN1</a></sup>已收到，谢谢。</p>
<p>　　假如你还没有动笔写信，那就请你立即写几行来，谈谈你的健康状况。燕妮<sup><a href="#bz2" id="bzref2">FN2</a></sup>从龙格处得知你的腿有毛病，对此十分不安，昨天她说打算到你那里去。海洋对她有显著的好处，海水浴效果良好，据我判断，咳嗽已好；遗憾的是，她还有些失眠，我建议她采取我认为最好的办法，即午饭后略睡一会儿，她做得很有成效。</p>
<p>　　你如能常给她写信，那总是好的，你知道，她是多么想念你。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 弗·恩格斯《德国农民战争》。——编者注</div>
