<h1>62.马克思致燕妮·龙格<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
阿尔让台<br>
1882年2月23日[于阿尔及尔]<br>
</td></tr></tbody></table>
<p>亲爱的孩子：</p>
<p>　　气候一直很好；我住在阿尔及尔城堡外小山上的一所非常舒适的别墅里。现在我需要的唯一的东西，就是安静；但愿很快恢复健康。</p>
<p>　　吻所有的孩子们；问候龙格。</p>
<p class="sign">深深爱你的　<b>老尼克</b></p>
<p class="ct">[<b>马克思在明信片的背面写着</b>]</p>
<p>　　（法国）巴黎阿尔让台镇梯也尔林荫路11号沙尔·龙格夫人</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 这封信是用明信片写的。——编者注<br>
</p>
