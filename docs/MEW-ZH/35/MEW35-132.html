<h1>59.恩格斯致彼得·拉甫罗维奇·拉甫罗夫<sup><a href="#bz1" id="bzref1">FN1</a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1882年2月18日于[伦敦]瑞琴特公园路122号<br>
</td></tr></tbody></table>
<p>亲爱的拉甫罗夫先生：</p>
<p>　　非常遗憾，今天午饭后没有碰到您；不过我希望，假使您今天晚上能收到这张明信片的话，可否劳驾明天，即星期天下午七、八点之间到我这里来一下。您可以在我这里见到一些朋友。我们大家都很高兴和您见面。</p>
<p class="sign">您的　<b>弗·恩格斯</b></p>
<p class="ct">[<b>恩格斯在明信片的背面写着</b>]</p>
<p>　　西中央区托登楠大院路阿尔弗勒德街13号彼·拉甫罗夫先生</p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 这封信是用明信片写的。——编者注</div></aside>
