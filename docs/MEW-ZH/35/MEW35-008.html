<h1>8.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
布里德林顿码头<br>
1881年8月16日[于阿尔让台]<br>
</td></tr></tbody></table>
<p>亲爱的恩格斯：</p>
<p>　　我们明天必须动身，因为我收到梅特兰小姐的信，说杜西<b>病得很厉害</b>，不让梅特兰小姐继续照看她，也不找医生看，等等。或许，甚至很可能得琳蘅陪妈妈<sup><a href="#bz1" id="bzref1">FN1</a></sup>去伦敦；而我必须立即（也就是说明天）到那里去。</p>
<p class="sign">你的　<b>卡·马·</b></p>
<p>　　关于杜西的情况我当即写信给唐金医生了；但可能他已不在伦敦。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 燕妮·马克思。——编者注<br>
</p>
