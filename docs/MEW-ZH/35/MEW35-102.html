<h1>29.马克思致卡尔·希尔施</h1>
<table class="add rt"><tbody>
<tr><td>
巴黎<br>
1881年8月<sup><a href="#bz1" id="bzref1">FN1</a></sup>6日于阿尔让台镇梯也尔林荫路11号<br>
</td></tr></tbody></table>
<p>亲爱的希尔施：</p>
<p>　　我在这里已经将近两个星期了；既没有去巴黎游览，也没有拜访任何熟人。我妻子的状况不允许这样做。</p>
<p>　　由于她日益虚弱，我也许得比原先的计划大大提前离去，所以我想（如果没有意外事情干扰的话）明天一早就同琳蘅和琼尼去巴黎。我将去看你，如果你的时间允许的话，还打算让你陪陪我们。</p>
<p>　　问候考布。</p>
<p class="sign">你的　<b>卡·马克思</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>

</p>
