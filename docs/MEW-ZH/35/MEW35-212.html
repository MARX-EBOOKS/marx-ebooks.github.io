<h1>
139.恩格斯致弗里德里希·列斯纳
</h1>
<div align="right" class="quote">
伦敦<br>
1883年3月15日于伦敦</div>
亲爱的列斯纳：<br>
<p>　　我们的老马克思于昨天下午三时平静而安详地长眠了。致死的原因首先大概是内出血。</p>
<p>　　葬礼将在星期六十二时举行，杜西请你务必参加。</p>
<p>　　匆匆草此。</p><div align="right">　　你的　<b>弗·恩格斯</b></div>
