<h1>54.马克思致阿马利亚·丹尼尔斯</h1>
<table class="add rt"><tbody>
<tr><td>
科伦<br>
1882年1月12日于威特岛[文特诺尔]圣博尼费斯花园1号<br>
</td></tr></tbody></table>
<p>我亲爱的丹尼尔斯夫人：</p>
<p>　　就是在我给您写信的那一天，我的女儿<sup><a href="#bz1" id="bzref1">FN1</a></sup>在她从伦敦带来的文件中还发现了我的一张比较旧的照片。当时我立即把它装在现随信附上的信封里寄往科伦，但“帝国邮局”把它退还给我了。劳驾请通知我<b>您的准确地址</b>。</p>
<p>　　然后我再把这个罪证寄给您。致衷心的问候。</p>
<p class="sign">忠实于您的　<b>卡·马克思</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 爱琳娜·马克思。——编者注<br>
</p>
