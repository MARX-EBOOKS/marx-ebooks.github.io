<h1>50.恩格斯致列甫·尼古拉也维奇·加特曼</h1>
<p class="date"><sup><a href="#123-bz1" id="123-bzref1">FN1</a></sup> </p>
<table class="sign"><tbody><tr><td>
伦敦<br>
[<b>草稿</b>]<br>
[1881年12月底于伦敦]<br>
</td></tr></tbody></table>
<p>　　我这里有一封从美国寄给你的信，但是嘱咐我把这封信只交给你本人。你能来取信吗？</p>
<p class="rt">你的</p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
