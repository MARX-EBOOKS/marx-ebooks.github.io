<h1>27.恩格斯致《自由》编辑部</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[<b>草稿</b>]<br>
1881年7月22日[于伦敦]<br>
</td></tr></tbody></table>
<p class="ct"><b>致《自由》编辑部</b></p>
<p>　　有人<sup><a href="#bz1" id="bzref1">FN1</a></sup>从美国给我介绍了一位诺里斯·阿·克洛斯先生，《纽约星报》驻爱尔兰记者，这位先生写信给我说：</p>
<blockquote>　　“如果莫斯特先生愿意向纽约公众作某种声明，我很乐意为他提供这种机会。”</blockquote>
<p>　　对此，我答复他说：</p>
<p>　　如果您想要和莫斯特先生建立联系，您可以按伦敦西区托登楠大院路252号的地址给《自由》编辑写信，他会告诉您在目前情况下有没有这种可能。</p>
<p>　　特此奉告。</p>
<p class="sign">忠实于您的　<b>弗·恩·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 弗里德里希·泰奥多尔·库诺。——编者注<br>
</p>
