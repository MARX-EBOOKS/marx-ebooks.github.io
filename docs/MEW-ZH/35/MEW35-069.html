<h1>69.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1882年12月18日[于文特诺尔]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　手稿<sup><a href="#bz1" id="bzref1">FN1</a></sup>寄还；<b>非常好</b>！</p>
<p>　　医生<sup><a href="#bz2" id="bzref2">FN2</a></sup>刚才又来过；不能说我感到有好转，宁可说恰好相反。外面不冷，但是有雨，潮湿，所以医生坚持，不出现好天气，他就不能让我出去；否则，他说他不承担责任。</p>
<p>　　真见鬼！必须有耐性！</p>
<p>　　祝好。</p>
<p class="sign"><b>摩尔</b></p>

<div class="style2">脚　　注</div>

<div><a href="#bzref2" id="bz2">FN2</a> 威廉森。——编者注</div></aside>
