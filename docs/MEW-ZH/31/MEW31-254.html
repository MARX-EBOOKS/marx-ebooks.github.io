<h1>36.马克思致海尔曼·荣克</h1>
<table class="add rt"><tbody>
<tr><td>伦敦<br>
[1865年]9月30日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的荣克：</p>
<p>　　明天（星期日）我等您来吃午饭（完全是家常便饭）。我也邀请了德·巴普和贝克尔<sup><a href="#bz1" id="bzref1">FN1</a></sup>。务请<b>以我的名义</b>邀请一下<b>考布</b>。今天上午我忙于各种事务，所以不能写两封信。</p>
<p>　　致兄弟般的敬礼。</p>
<p class="sign"><b>卡·马克思</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 约翰·菲力浦·贝克尔。——编者注</div></aside>
