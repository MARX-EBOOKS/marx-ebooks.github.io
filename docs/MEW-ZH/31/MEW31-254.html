<h1>
36.马克思致海尔曼·荣克
</h1>
<div align="right" class="quote">伦敦<br>
[1865年]9月30日[于伦敦]</div>
亲爱的荣克：<br>
<p>　　明天（星期日）我等您来吃午饭（完全是家常便饭）。我也邀请了德·巴普和贝克尔<sup><a href="#254-bz1" id="254-bzref1">FN1</a></sup>。务请<b>以我的名义</b>邀请一下<b>考布</b>。今天上午我忙于各种事务，所以不能写两封信。</p>
<p>　　致兄弟般的敬礼。</p>
<div align="right">　　<b>卡·马克思</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#254-bzref1" id="254-bz1">FN1</a> 约翰·菲力浦·贝克尔。——编者注<br>
</p>
