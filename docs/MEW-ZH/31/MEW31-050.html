<h1>50.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1865年4月22日星期六[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　附上从《莱茵报》上剪下的拙劣的东西。</p>
<p>　　明天再给你详细写信。今天我疲倦得要死，一方面是因为深夜工作（不是实践方面的），另一方面是因为我吃了阿魏<sup><a href="#bz1" id="bzref1">FN1</a></sup>。</p>
<p>　　如果我能象德朗克那样把铜变成黄金，也许他就满意了。现在，资产阶级报刊抢登对诽谤的反声明，这个时机无论如何必须加以利用，因为一旦斗争严重化，它们大概就想赞成诽谤了。</p>
<p>　　祝好。向莉希夫人致良好的祝愿。</p>
<p class="sign">你的　<b>摩尔</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 药名。——译者注</div></aside>
