<h1>1.马克思致恩格斯</h1>
<div align="right" class="quote">
曼彻斯特<br>
1864年11月2日[于伦敦]</div>
<p>亲爱的恩格斯：</p>
<p>　　你很久不来信使我感到不安。我料想你已经回来了。<sup><a href="#001-z1" id="001-zref1"><b>1</b></a></sup>为什么得不到你一点消息？</p>
<p>　　我有许多重要事情要告诉你，一有你的音信，我马上就写信给你。</p>
<p>　　祝好。</p>
<div align="right">你的　<b>卡·马·</b></div>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#001-zref1" id="001-z1"><b>1</b></a> 恩格斯在1864年9―10月间到什列斯维希－霍尔施坦去了一趟。——第5页。<br>
</p>
