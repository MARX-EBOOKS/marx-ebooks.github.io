<h1>96.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
[1866年3月16日]于马尔吉特兰塞尔街5号<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　我昨天晚上来到这里。今天（洗完温海水澡）在户外散步了一整天，刚回到住所（紧靠大海），以便在邮局关门以前把我的住址寄给你。明天你将得到较详细的报道。你的关于波兰的第一篇文章<sup><a href="#096-bz1" id="096-bzref1">FN1</a></sup>将不在这个星期，而在下个星期发表。这里的空气太好了。</p>
<p>　　祝好。</p>
<p class="rt">你的　<b>卡·马·</b></p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#096-bzref1" id="096-bz1">FN1</a> 弗·恩格斯《工人阶级同波兰有什么关系？》一组文章中的第一篇。——编者注<br>
</p>
