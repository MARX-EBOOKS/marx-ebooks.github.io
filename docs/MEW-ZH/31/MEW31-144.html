<h1>
144.马克思致恩格斯
</h1>  
<div align="right" class="quote">
曼彻斯特<br>
1867年2月25日[于伦敦]<br>
</div>
亲爱的弗雷德：<br>
<p>　　非常感谢你寄来的二十英镑。</p>
<p>　　附上库格曼医生的信。</p>
<p>　　现在我只能给你写这几行字，因为房东的代理人正在这里，我对他不得不扮演巴尔扎克喜剧中的梅尔卡岱<sup><a href="#144-bz1" id="144-bzref1">FN1</a></sup>的角色。讲到巴尔扎克，我建议你读一读他的《不出名的杰作》和《言归于好的麦尔摩特》。这两本小杰作充满了值得玩味的讽刺。</p>
<p>　　祝好。</p>
<div align="right">你的　<b>卡·马·</b></div>
<br>

<p class="footnote">
<span class="style2"><b>脚  注</b></span><br><br>
<a href="#144-bzref1" id="144-bz1">FN1</a> 巴尔扎克的喜剧《生意人》中的主角。——编者注<br>
</p>
