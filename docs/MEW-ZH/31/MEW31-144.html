<h1>144.马克思致恩格斯</h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1867年2月25日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的弗雷德：</p>
<p>　　非常感谢你寄来的二十英镑。</p>
<p>　　附上库格曼医生的信。</p>
<p>　　现在我只能给你写这几行字，因为房东的代理人正在这里，我对他不得不扮演巴尔扎克喜剧中的梅尔卡岱<sup><a href="#bz1" id="bzref1">FN1</a></sup>的角色。讲到巴尔扎克，我建议你读一读他的《不出名的杰作》和《言归于好的麦尔摩特》。这两本小杰作充满了值得玩味的讽刺。</p>
<p>　　祝好。</p>
<p class="sign">你的　<b>卡·马·</b></p>

<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 巴尔扎克的喜剧《生意人》中的主角。——编者注</div></aside>
