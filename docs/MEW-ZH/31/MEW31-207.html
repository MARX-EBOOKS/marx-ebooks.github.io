<h1>207.马克思致恩格斯<sup><a href="#z409" id="zref409"><b>409</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
曼彻斯特<br>
1867年11月29日[于伦敦]<br>
</td></tr></tbody></table>
<p>　　你看，我是多么健忘。刚才寄给你一封信，没有把库格曼的信附进去。</p>

<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref409" id="z409"><b>409</b></a> 这封信马克思写在库格曼1867年11月25日给恩格斯的一封信上。——第400页。</div></aside>
