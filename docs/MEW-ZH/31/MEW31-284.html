<h1>
66.马克思致保尔·拉法格
</h1>
<div align="right" class="quote">
伦敦<br>
1866年12月7日[于伦敦]</div>
亲爱的拉法格：<br>
<p>　　星期一以前必须结束的工作，占去了我全部时间，因此无法立即给您回信。如果您觉得我写给您的独白太尖锐，因而感到委屈，那末请您原谅。您不要生气，即使在您有理的时候。</p>
<p>　　祝好。</p>
<div align="right">　　<b>卡尔·马克思</b></div>
</body>
