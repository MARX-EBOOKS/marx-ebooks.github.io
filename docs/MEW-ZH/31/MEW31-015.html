<h1>15.马克思致恩格斯</h1>
<div align="right" class="quote">
曼彻斯特<br>
1864年12月22日[于伦敦]</div>
亲爱的弗雷德里克：<br>
<p>　　十分匆忙。请将贝克尔的信寄回。<sup><a href="#015-bz1" id="015-bzref1">FN1</a></sup>但愿你没有遗失。</p>
<p>　　恭贺新年！</p>
<div align="right">你的　<b>卡·马·</b></div>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#015-bzref1" id="015-bz1">FN1</a> 见本卷第38页。——编者注<br>
</p>
