<h1>《莱茵报》编辑部关于停止发表《摩泽尔记者的辩护》续篇的声明<sup><sup><a href="#z189" id="zref189"><b>189</b></a></sup></sup></h1>
<p>　　鉴于《特里尔日报》提出询问，本报编辑部认为有必要声明，发表摩泽尔通讯的续篇遇到了阻碍，而这种阻碍既不能归因于记者，也不能归因于本报编辑部。</p>
<p class="sign">《莱茵报》编辑部</p>
<table class="src rt"><tbody><tr><td>
卡·马克思写于1843年2月8―21日之间<br>
载于1843年2月25日《特里尔日报》第55号<br>
原文是德文<br>
中文根据《马克思恩格斯全集》1975年历史考证版第1部分第1卷翻译<br>
</td></tr></tbody></table>
<aside class="footnote">
<div class="style2">注　　释</div>
<div><a href="#zref189" id="z189"><b>189</b></a> 《莱茵报》发表了《摩泽尔记者的辩护》前两部分之后，一些读者和报刊密切关注着《莱茵报》继续发表该文的续篇。这篇编辑部声明是马克思为回答《特里尔日报》的询问而写的。——431。</div></aside>
