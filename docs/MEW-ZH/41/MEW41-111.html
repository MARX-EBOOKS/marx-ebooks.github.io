<h1>[一年制志愿兵弗里德里希·恩格斯的品行证书]</h1>
<h3 id="h111-0">品行证书</h3>
<p>　　持证人一年制志愿兵<b>弗里德里希·恩格斯</b>，近卫炮兵旅第十二步兵连炮手，杜塞尔多夫专区爱北斐特区巴门人，现年二十一岁零十个月，服役已满一年，服役期间品德和执勤均表现优异，特此证明。</p>
<table class="sign"><tbody><tr><td>
冯·<b>韦德尔</b>，<br>
　　上尉连长<br>
</td></tr></tbody></table>
<p>　　1842年10月8日于柏林</p>
