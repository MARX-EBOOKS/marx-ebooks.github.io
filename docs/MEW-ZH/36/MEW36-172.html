<h1>致帕斯夸勒·马尔提涅蒂</h1>
<table class="add rt"><tbody>
<tr><td>
贝内万托<br>
1885年6月13日于伦敦<br>
</td></tr></tbody></table>
<p>尊敬的先生：</p>
<p>　　请费神把您的译作<sup><a href="#bz1" id="bzref1">FN1</a></sup>寄六本给我——这就足够了。</p>
<p>　　约在译稿<sup><a href="#bz2" id="bzref2">FN2</a></sup>寄走十天之后发出的信，谅已收到。</p>
<p class="sign">忠实于您的　<b>弗·恩格斯</b></p>
<p>　　同时给您寄去一册（马克思和恩格斯的）《1847年共产党宣言》。不管这个《宣言》多老，我认为永远值得一读。</p>

<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 恩格斯《家庭、私有制和国家的起源》一书的意大利文译本。——编者注<br>
<a href="#bzref2" id="bz2">FN2</a> 见本卷第315―316页。——编者注<br>
</p>
