<h1>
致帕斯夸勒·马尔提涅蒂
</h1>
<div align="right" class="quote">
贝内万托<br>
1885年6月13日于伦敦</div>
尊敬的先生：<br>
<p>　　请费神把您的译作<sup><a href="#172-bz1" id="172-bzref1">FN1</a></sup>寄六本给我——这就足够了。</p>
<p>　　约在译稿<sup><a href="#172-bz2" id="172-bzref2">FN2</a></sup>寄走十天之后发出的信，谅已收到。</p><div align="right">　　忠实于您的　<b>弗·恩格斯</b></div>
<p>　　同时给您寄去一册（马克思和恩格斯的）《1847年共产党宣言》。不管这个《宣言》多老，我认为永远值得一读。</p>

<p class="footnote">
<span class="style2"><b>脚  注</b></span><br><br>
<a href="#172-bzref1" id="172-bz1">FN1</a> 恩格斯《家庭、私有制和国家的起源》一书的意大利文译本。——编者注<br>
<a href="#172-bzref2" id="172-bz2">FN2</a> 见本卷第315―316页。——编者注<br>
</p>
