<h1>致帕斯夸勒·马尔提涅蒂</h1>
<table class="add rt"><tbody>
<tr><td>
贝内万托<br>
1887年6月20日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的朋友马尔提涅蒂：</p>
<p>　　鲍尔先生没有回信，据我从韦德那里了解，是因为他现时外出。因此，现在询问他是否收到了您的照片，是无用的。<sup><a href="#bz1" id="bzref1">FN1</a></sup>我大概很快有可能得知此事，希望在这期间您收到鲍尔本人的通知。</p>
<p>　　衷心问好。</p>
<p class="sign">您的　<b>弗·恩格斯</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 见本卷第641―642页。——编者注</div></aside>
