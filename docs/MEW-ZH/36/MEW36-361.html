<h1>致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1887年9月3日]星期六[于伦敦]<br>
</td></tr></tbody></table>
<p>　　昨晚归来。<sup><a href="#z611" id="zref611"><b>611</b></a></sup>很遗憾，明天还不能请你们吃午饭，但是欢迎你们五点钟左右到我们这里来。</p>
<p class="sign">你的　<b>弗·恩·</b></p>

<div class="style2">注　　释</div>
<div><a href="#zref611" id="z611"><b>611</b></a> 恩格斯从1887年7月23日至9月2日在伊斯特勃恩休养。——第663、664、667、669、672、674、676、677页。</div></aside>
