<h1>致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1887年12月20日于伦敦<br>
</td></tr></tbody></table>
<p>亲爱的考茨基：</p>
<p>　　今天我要到布莱顿去，争取明天晚上回来。但是由于其间可能发生什么事情，所以你们如果不是在明天而是在星期四<sup><a href="#bz1" id="bzref1">FN1</a></sup>晚上到我们这里来，那也许更可靠些。</p>
<p>　　衷心问好。</p>
<p class="sign">你的　<b>弗·恩·</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 12月22日。——编者注<br>
</p>
