<h1>致卡尔·考茨基</h1>
<div align="right" class="quote">
伦敦<br>
[1886年7月4日于伊斯特勃恩]</div>
亲爱的考茨基：<br>
<p>　　在这里不再接待别的来访者，对我来说当然是比较愉快的，因为明天肖莱马大概要来；但是听天由命吧。其实，星期三<sup><a href="#257-bz1" id="257-bzref1">FN1</a></sup>我又在伦敦了，希望在这之前吉约姆-沙克夫人在伦敦有足够的事情好做。这里从昨天起天气也很闷热，不过从海上还是不时吹来阵阵微风，星期五那天甚至还有点凉，傍晚我不穿外衣坐在户外就不行。向你妻子衷心问好。彭普斯、派尔希和穆尔坐船捕鱼去了，供晚饭时享用，当然，须得上帝不因他们亵渎了安息日而惩罚他们，不把海蛇送给他们。这里的比尔森啤酒也很出色。</p><div align="right">你的　<b>弗·恩·</b></div>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#257-bzref1" id="257-bz1">FN1</a> 7月7日。——编者注<br>
</p>
