<h1>致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1885年2月14日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的考茨基：</p>
<p>　　前天我忘记向你提了，我们跟往常一样，盼望你和你的妻子<sup><a href="#bz1" id="bzref1">FN1</a></sup>星期日（明天，15日）来吃饭，就是说，如果你们那里没有什么更好的安排的话；并希望今后每个星期日你们到我这里来作客。</p>
<p class="sign">你的　<b>弗·恩格斯</b></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 路易莎·考茨基。——编者注</div></aside>
