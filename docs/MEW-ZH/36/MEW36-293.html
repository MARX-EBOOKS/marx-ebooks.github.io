<h1>致埃·特·<sup><a href="#z529" id="zref529"><b>529</b></a></sup></h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
[1886年11月13日以前于伦敦]<br>
</td></tr></tbody></table>
<p>　　对上述询问答复如下：您所说的小册子已有了译者<sup><a href="#bz1" id="bzref1">FN1</a></sup>；由于翻译这本小册子相当困难，我当然不希望看到有未经我预先校阅的译本发表。</p>
<p class="sign">忠实于您的　<b>弗·恩格斯</b></p>
<p class="footnote">
<span class="style2">脚　　注</span><br><br>
<a href="#bzref1" id="bz1">FN1</a> 艾威林——编者注<br>
</p>
<p class="footnote">
<span class="style2">注　　释</span><br><br>
<a href="#zref529" id="z529"><b>529</b></a> 这封信是恩格斯对一个叫埃·特·的人的答复。这个人曾写信给《公益》杂志编辑部，询问恩格斯的小册子《社会主义从空想到科学的发展》是否有英译本，以及是否任何一个愿意翻译的人都可以翻译这本书。——第556页。<br>
</p>
