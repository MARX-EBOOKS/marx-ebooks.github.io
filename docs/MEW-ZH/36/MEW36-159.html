<h1>致卡尔·考茨基</h1>
<table class="add rt"><tbody>
<tr><td>
伦敦<br>
1885年4月16日[于伦敦]<br>
</td></tr></tbody></table>
<p>亲爱的考茨基：</p>
<p>　　琳蘅有一点支气管炎，医生让她躺在床上了，因此很遗憾，我们通常的星期日聚餐就不能举行了。</p>
<p>　　但愿你妻子的头痛已经痊愈。</p>
<p>　　衷心问好。</p>
<p class="rt">你的　<b>弗·恩格斯</b></p>
