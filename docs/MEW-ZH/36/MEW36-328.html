<h1>致尼古拉·弗兰策维奇·丹尼尔逊</h1>
<table class="add rt"><tbody>
<tr><td>
彼得堡<br>
1887年4月24日于伦敦<br>
</td></tr></tbody></table>
<p>尊敬的先生：</p>
<p>　　我匆匆写上几句告诉您一下，两包挂号寄来的书信<sup><a href="#bz1" id="bzref1">FN1</a></sup>和您在旧历4月7日发出的通知我邮包寄出的信，都已平安寄到。本来不必急于把这些书信寄来，但我还是非常感激您把这些珍贵的遗物信托给我。我将以极大的兴趣阅读它们，必要时要使用它们，并且随时准备奉还给您。</p>
<p class="sign">　　忠实于您的　<b>派·怀·罗舍</b><br><sup><a href="#bz2" id="bzref2">FN2</a></sup></p>
<aside class="footnote">
<div class="style2">脚　　注</div>
<div><a href="#bzref1" id="bz1">FN1</a> 指卡·马克思写给丹尼尔逊的书信。——编者注</div>
<div><a href="#bzref2" id="bz2">FN2</a> 恩格斯的化名。——编者注</div></aside>
