<h1>为纪念巴黎公社二十三周年致法国工人党全国委员会</h1>
<p class="sign">1894年3月18日于伦敦</p>
<p>　　我同你们一起为国际的3月18日的既将来临而干杯，这个日子将带来无产阶级的胜利，从而消灭阶级对抗和各民族之间的战争，并在各文明国家中实现和平和幸福。</p>
<p class="sign"><b>恩格斯</b></p>
