<h1>致伦敦德意志工人共产主义教育协会理事会</h1>
<div align="right">1895年3月11日于伦敦西北区瑞琴特公园路41号</div>
<p>尊敬的同志：</p>
<p>　　很遗憾，这次我不能参加你们的三月节日活动了。由于疾病又一次发作，虽说不严重，可是治疗要求绝对安静，所以我又要被困在家里好几个星期了。我希望，你们的节日活动不至于因我缺席而减色。</p>
<p>　　致最好的祝愿</p>
<div align="right"><table border="0" cellpadding="0" cellspacing="0"><tr><td style="line-height: 200%">
<p>您的　弗·恩格斯</p>
<p>第一次用俄文发表于“马克思恩格斯全集”1946年第1版第29卷</p>
<p>原文是德文</p>
<p>俄文是按手稿译的</p>

</td></tr></table></div></body>
