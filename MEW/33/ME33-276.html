<h1>91<br>Marx an Friedrich Adolph Sorge<br>in Hoboken</h1>
<p class="rgt">[London] 5.Sept. 1871</p>
<p>Geehrter Herr Sorge,<br>
Einliegend Aufruf<a id="A95"></a> für die refugees<sup><a href="#F1" id="ZF1">1</a></sup>. Ihre Sendung von Amerika, d.d. 23.August, ist heut angekommen.<a id="A310"></a></p>
<p class="rgt">Ihr ergebenster<br><i>Karl Marx</i></p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> Flüchtlinge</p>
