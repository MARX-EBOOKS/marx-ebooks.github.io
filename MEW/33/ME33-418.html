<h1>163<br>Marx an Hermann Jung<br>in London</h1>
<p class="rgt">[London] 7. März 72</p>
<p>Mein lieber Jung,<br>
Ich kann die Statuten der Vermersch-Sektion<a id="A468"></a> nicht finden. Bitte sehen Sie nach, ob Sie sie haben.</p>
<p class="rgt">Brüderlich Ihr<br>K. Marx</p>
<div class="que">Aus dem Englischen.</div>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 33, Berlin: Dietz Verlag 1966, S. 418.</div>
