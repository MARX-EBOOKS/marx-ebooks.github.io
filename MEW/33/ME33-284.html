<h1>97<br>Marx an Hermann Jung<br>in London</h1>
<p class="rgt">[London] 13.Sept. 71</p>
<p>Lieber Jung,</p>
<p>Wollen Sie so gut sein, von den einliegenden 3 £ 10 dem Col[onel] Naze 2 £ 15 und dem dicken Russen, den Lawrow uns gesandt, 15 sh. in meinem Namen zu geben gegen Quittung.</p>
<p class="rgt">Ihr<br><i>K.M.</i><br>1, Maitland Park Road</p>
