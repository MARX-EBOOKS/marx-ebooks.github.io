<h1>32<br>Engels an Hermann Schlüter<br>in London</h1>
<p class="rgt">122, Regent's Park Road<br>[London] 15. Juni 88</p>
<p>Lieber Schlüter,</p>
<p>Willst Du und will Tauscher mir den Gefallen tun, Sonntag mittag <i>halb drei</i> bei mir zu essen?</p>
<p class="rgt">Euer<br>F. Engels</p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 37, Berlin: Dietz Verlag 1967, S. 68.</div>
