<h1>76<br>Engels an Hermann Schlüter<br>in London</h1>
<p class="rgt">[London] 31.Jan. 89</p>
<p>Lieber Schlüter,</p>
<p>Ich hatte gehofft, Dich und Deine Frau gestern bei mir zu sehn. Ist Frau B[ernstein] mitgekommen? Wenn ja, so hoffe ich, sie und Euch einen Abend bei mir zu sehn, spätestens Sonntag.</p>
<p>Beste Grüße.</p>
<p class="rgt">Dein<br><i>F. Engels</i></p>
