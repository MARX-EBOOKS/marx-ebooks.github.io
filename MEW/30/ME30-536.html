<h1>36<br>Engels an Emil Engels<br>in Barmen</h1>
<p class="rgt">Manchester, 25. April 1860</p>
<p align="ctr">Telegramm</p>
<p>Übereinstimme teilweise mit Brief vom Sonnabend – werde Freitagabend mit bestimmter Vollmacht dort sein – Abreise Donnerstag morgen – Hoffe Blank dort zu treffen.</p>
<p class="zitat">Aus dem Englischen.</p>
