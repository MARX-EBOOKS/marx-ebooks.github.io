<h1>64<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">[London] 11. Okt. 1860</p>
<p>Dear Frederick,</p>
<p>Ich bin sehr beschäftigt diesen Augenblick. Schreibe Dir am Sonnabend. Broschüre von Braß<a id="A135"></a> einiges Gute drin.<br>
Wo möglich, schick mir ein paar Instruktionszeilen (bis Sonnabend) über Garibaldis grand battle.<a id="A131"></a></p>
<p class="rgt">Dein<br>
<i>K.M.</i></p>
