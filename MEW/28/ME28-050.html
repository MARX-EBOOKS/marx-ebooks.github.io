<h1>21<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">14. April 1852<br>28, Dean Street, Soho, London</p>
<p>Lieber Frederic,</p>
<p>Ich schreibe Dir nur diese 2 Zeilen, um anzuzeigen, daß das kleine Kind<sup><a href="#F1" id="ZF1">1</a></sup> heute ¼ nach 1 Uhr gestorben ist.</p>
<p class="rgt">Dein<br>K.M.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> Marx' Töchterchen Franziska</p>
</aside>
