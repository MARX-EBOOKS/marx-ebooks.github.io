<h1>195<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">[London] 24. Januar [1855]</p>
<p>Dear Engels!</p>
<p>Du wirst aus der heutigen „Times“ ersehn, daß <i>nichts</i> über das Parlament zu berichten. Wichtige Debatte erst <i>Donnerstag abend</i>. Bleibt also nichts übrig, als „<i>irgendwelches sujet</i>“ vorzunehmen.</p>
<p>Salut.</p>
<p class="rgt">Dein<br>K.M.</p>
