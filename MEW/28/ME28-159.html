<h1>73<br>
Marx an Engels<br>in Manchester</h1>
<p class="rgt">20. Oktober 1852<br>28, Dean Street, Soho, London</p>
<p>Lieber Engels!</p>
<p>Ich empfehle Dir bestens den Überbringer dieser Zeilen, Oberst Pleyel. Ich kenne ihn zwar nicht persönlich, aber er wird „aufs beste“ empfohlen durch Oberst Bangya, den Du ja kennst.</p>
<p class="rgt">Dein<br>
<i>K. Marx</i></p>
