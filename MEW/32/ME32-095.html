<h1>49<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">London, 27. Mai 1868</p>
<p>Dear Fred,</p>
<p>Thanks for £ 25.</p>
<p>Abreise: Freitag von Kings Cross 11.30.</p>
<p>Salut.</p>
<p class="rgt">Dein<br>K.M.</p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 32, Berlin: Dietz Verlag 1965, S. 95.</div>
