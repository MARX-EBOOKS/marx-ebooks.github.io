<h1>54<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">London, 24 June [1868]</p>
<p>Lieber Fred,</p>
<p>Leider hat sich die Krankheit beider Mädchen als Scarlatina<sup><a href="#F1" id="ZF1">1</a></sup> ausgewiesen, bei Tussychen namentlich in sehr bösartiger Form.</p>
<p>Salut.</p>
<p class="rgt">Dein<br>K.M.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> Scharlach</p>
</aside>
