<h1>69<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">[London] 19.Okt.1865</p>
<p>Dear Fred,</p>
<p>Ich bin morgen nachmittag about<sup><a href="#F1" id="ZF1">1</a></sup> 4.40 in Manchester und werde mich nach Deiner offiziellen Wohnung verfügen.<a id="A193"></a></p>
<p class="rgt">Dein<br>K.M.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> ungefähr</p>
