<h1>15<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">[London] 22. Dez. 64</p>
<p>Lieber Frederick,</p>
<p>In aller Eile. Schick mir Beckers Brief<sup><a href="#F1" id="ZF1">1</a></sup> zurück. Ich hoffe, Du hast ihn nicht verloren.<br>Prost Neujahr!</p>
<p class="rgt">Dein<br>K.M.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> Siehe vorl. Band, S. 36</p>
