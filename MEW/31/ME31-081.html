<h1>34<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">[London, vor dem 22. Februar 1865]</p>
<p>Lieber Frederick,</p>
<p>Einliegend zum <i>Sonntagsvergnügen</i> und <i>pour la bonne bouche</i><sup><a href="#F1" id="ZF1">1</a></sup> geheime Beiträge zur <i>crème bonapartiste</i>.<a id="A109"></a><br>
Du mußt die Zettel aufheben. My compliments to Mrs. Lizzie.</p>
<p class="rgt">Dein<br>
K.M.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> als Leckerbissen</p>
</aside>
