<h1>68<br>Marx an Ludwig Kugelmann<br>in Hannover<br>(Telegramm)</h1>
<p class="rgt">Hamburg, 16. April 1867</p>
<p align="ctr">Doktor L. Kugelmann<br>Hannover</p>
<p>Ich komme heute Abend gegen neun.</p>
<p class="rgt">Marx</p>
