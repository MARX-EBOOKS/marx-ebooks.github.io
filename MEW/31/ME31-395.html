<h1>207<br>Marx an Engels<br>in Manchester<a id="A449"></a></h1>
<p class="rgt">[London, 29. November 1867]</p>
<p>Du siehst, wie verteufelt vergeßlich ich bin. Eben schick' ich den Brief, ohne Kugelmann<a id="A446"></a> einzulegen.</p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 31, Berlin: Dietz Verlag 1965, S. 395.</div>
