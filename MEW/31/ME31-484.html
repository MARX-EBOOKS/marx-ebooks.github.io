<h1>37<br>Marx an Salomon Fuld<br>in Frankfurt a. Main<a id="A518"></a></h1>
<p class="rgt">London, 9.Nov. 1865</p>
<p>Geehrter Herr Doktor,<br>Da ich die Privatadresse meiner Tante verloren habe, nehme ich mir die Freiheit, den einliegenden Brief zur Beförderung an Madame Bab.Blum Ihnen zu überschicken.</p>
<p class="rgt">Hochachtungsvoll<br>Dr. K. Marx</p>
