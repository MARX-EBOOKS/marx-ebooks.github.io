<h1>321<br>Engels an die Fédération socialiste révolutionnaire<br>du centre du Parti ouvrier<br>in Paris<a id="A741"></a></h1>
<p class="rgt">London, 18.März [1887]</p>
<p>Bürger,<br>Von ganzem Herzen feiere ich mit Ihnen den achtzehnten März.</p>
<p class="rgt">F. Engels</p>
<p class="zitat">Nach: „Le Socialiste“,<br>vom 26.März 1887.<br>Aus dem Französischen.</p>
