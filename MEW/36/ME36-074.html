<h1>41<br>Engels an Karl Kautsky<br>in London<a id="A117"></a></h1>
<p class="rgt">[London, 1. Dezember 1883]</p>
<p>Lieber Kautsky,</p>
<p>Was ist mit Ihnen los, daß Sie sich weder bei Tussy noch bei mir sehn lassen?</p>
<p class="rgt">Ihr<br>F. E.</p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 36, Berlin: Dietz Verlag 1967, S. 74.</div>
