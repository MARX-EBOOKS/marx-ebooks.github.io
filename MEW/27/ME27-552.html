<h1>92<br>Marx an Roland Daniels<br>in Köln</h1>
<p class="rgt">[London, Mai 1851]</p>
<blockquote>... Die Kommunisten haben zu zeigen, daß nur unter kommunistischen Verhältnissen die schon erreichten technologischen Wahrheiten praktisch werden können...</blockquote>
<p class="zitat">Nach: Brief von Roland Daniels an Marx vom 1. Juni 1851.</p>
