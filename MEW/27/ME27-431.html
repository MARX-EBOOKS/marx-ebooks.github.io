<h1>18<br>Marx an Heinrich Börnstein<br>in Paris</h1>
<p class="rgt">[Paris, Herbst 1844]</p>
<p>Verehrter Herr!</p>
<p>Schicken Sie mir die Blätter von Feuerbach zurück, sobald Sie dieselben abgedruckt.<a id="A356"></a></p>
<p class="rgt">Ihr ergebner<br><i>Marx</i></p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 27, Berlin: Dietz Verlag 1959, S. 431.</div>
