<h1>35<br>Marx an Moses Heß<br>in Brüssel</h1>
<p class="rgt">[Brüssel] 2. September [1847]</p>
<p>Lieber Heß!</p>
<p>Melde Dir, heute in der <i>Chaussée d'Etterbeck</i>, im Grand Salon, auch Palais royal benamst.</p>
<p class="rgt"><i>Marx</i></p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 27, Berlin: Dietz Verlag 1965, S. 468.</div>
