<h1>133<br>Engels an Charles Longuet<br>in Argenteuil<br>(Telegramm)</h1>
<p class="rgt">London, 14. März [1883]</p>
<p>Marx verschied plötzlich diesen Nachmittag um drei Uhr; Brief folgt.</p>
<p class="rgt"><i>Engels</i>, London</p>
<div class="que">Aus dem Englischen.</div>
