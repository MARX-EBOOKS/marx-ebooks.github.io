<h1>20<br>Marx an Friedrich Adolph Sorge<br>in Hoboken<a id="A244"></a></h1>
<p class="rgt">London, 2. Juni 1881</p>
<p>Lieber Sorge,</p>
<p>Ich empfehle Dir sehr herzlich den Überbringer dieser Karte, meinen Freund Hartmann<sup><a href="#F1" id="ZF1">1</a></sup>.</p>
<p class="zitat">Nach: „The New-York Herald“ Nr. 16455,<br>
vom 10. September 1881.<br>
Aus dem Englischen.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> L. N. Hartmann</p>
</aside>
