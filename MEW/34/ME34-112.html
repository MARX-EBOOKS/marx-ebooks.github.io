<h1>52<br>Engels an Marx<br>in London<a id="A196"></a></h1>
<p class="rgt">[London, nach dem 8. Oktober 1879]</p>
<p>Hast Du dem edlen B[arry] nicht die Noten geschickt, die ich in den „Fraser“ gelegt?<a id="A197"></a> ich legte sie vor Pumps’ Augen hinein und zwar so, daß sie von außen sichtbar waren. Wo nicht, schick’s ihm.</p>
<p class="rgt">Dein<br>F. E.</p>
