<h1>183<br>Marx an einen Unbekannten<br>in London<a id="A528"></a></h1>
<p class="rgt">[London] 11. Dez. 79</p>
<p>Werter Herr,<br>Würden Sie nächsten Sonntag um 2 Uhr zum Mittagessen kommen?</p>
<p class="rgt">Ihr ergebener<br><i>Karl Marx</i></p>
<div class="que">Aus dem Englischen.</div>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 34, Berlin: Dietz Verlag 1966, S. 428.</div>
