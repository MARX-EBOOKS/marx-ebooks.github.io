<h1>216<br>Marx an Carl Hirsch<br>in London<a id="A576"></a></h1>
<p class="rgt">[London] 29. Dez. 1880</p>
<p>Lieber Hirsch,</p>
<p>Sei so gut, Dich einzufinden nächsten Freitag abend (7 Uhr) zu Dinner und Feier des Neujahrs.</p>
<p>Salut.</p>
<p class="rgt">K.M.</p>
<div class="que">Quelle: Marx/Engels: Werke, Bd. 34, Berlin: Dietz Verlag 1966, S. 485.</div>
