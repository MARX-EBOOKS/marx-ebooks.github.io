<h1>136<br>Marx an Carl Hirsch<br>in Paris</h1>
<p class="rgt">[London] 26 June 1878</p>
<p>Lieber Hirsch,</p>
<p>Ich kann hier Buchers Antwort in der „Norddeutschen Allgemeinen“ nicht auftreiben. Sie soll auch in der „Frankfurter“ abgedruckt stehn.<a id="A438"></a><br>
Bitte schicken Sie umgehend.</p>
<p class="rgt">Ihr treu ergebner<br>
<i>Karl Marx</i></p>
