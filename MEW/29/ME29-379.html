<h1>174<br>Marx an Engels<br>in Manchester</h1>
<p class="rgt">London, 28. Dez. 58</p>
<p>Prost Neujahr!<br>Für Lupus ditto.<br>How with Servia?<sup><a href="#F1" id="ZF1">1</a></sup><a id="A327"></a><br>Salut.</p>
<p class="rgt"><i>K. Marx</i></p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="fni"><a href="#ZF1" id="F1">1</a> Wie ist es mit Serbien?</p>
</aside>
