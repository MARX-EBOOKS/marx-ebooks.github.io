<h1>255<br>Engels an Karl Henckell<br>in Zürich<a id="A579"></a></h1>
<p class="rgt">[London, Ende 1892]</p>
<p>Das Lied vom Dampf, das eine, zwar vergangene, aber doch auch in Deutschland durchgemachte Vorstufe der Arbeiterbewegung charakterisiert.</p>
<aside class="fn"><div class="fnt">Fußnoten</div>
<p class="zitat">Nach: Buch der Freiheit. Gesammelt und herausgegeben von Karl Henckell. Berlin 1893.</p>
</aside>
